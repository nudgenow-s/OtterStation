<head>
<meta charset="UTF-8">

<script src="i18n/en.js"></script>
<script src="i18n/i18n-core.js"></script>
<script>
// ★ 语言切换悬浮按钮（风格与 main.html 的 i18n-engine.js 一致：左下角悬浮圆角按钮）
(function () {
  function mountLangToggle() {
    if (document.getElementById('i18n-toggle-btn')) return; // 防止重复挂载
    var btn = document.createElement('div');
    btn.id = 'i18n-toggle-btn';
    var curLang = (window.I18N && window.I18N.getLang) ? window.I18N.getLang() : 'zh';
    btn.innerHTML = curLang === 'zh' ? 'EN' : '中文';
    Object.assign(btn.style, {
       position: 'fixed',
       top: 'calc(env(safe-area-inset-top, 0px) + 14px)',
       right: '16px',
       background: 'var(--orange, #FF6B35)',
       color: '#fff', padding: '6px 14px', borderRadius: '20px',
       fontSize: '11px', cursor: 'pointer', zIndex: '99999',
       fontWeight: 'bold', boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
       fontFamily: "'PingFang SC','Helvetica Neue',sans-serif",
    });
    document.body.appendChild(btn);
    btn.onclick = function () {
      var next = ((window.I18N && window.I18N.getLang) ? window.I18N.getLang() : 'zh') === 'zh' ? 'en' : 'zh';
      if (window.I18N && window.I18N.switchLang) {
        window.I18N.switchLang(next);
        btn.innerHTML = next === 'zh' ? 'EN' : '中文';
      } else {
        // 兜底逻辑未加载成功时，只能刷新页面重试（不会崩溃，但也无法真正切换）
        console.warn('[i18n] 语言引擎未就绪，无法切换语言');
      }
    };
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mountLangToggle);
  } else {
    mountLangToggle();
  }
})();
</script>
<script>
// ★ 兜底防御：若上面三个 i18n 文件因路径/部署问题未能加载（404等），
//   window.t / window.tMonth / window.I18N 会是 undefined，
//   后续所有 t('xxx') 调用都会抛 ReferenceError 导致整页白屏。
//   这里做安全兜底：没加载成功时，t() 直接返回 key 本身，tMonth() 返回月份数字，
//   页面仍可正常运行（只是暂时显示中文 key 名而非译文），不会白屏。
if (typeof window.t !== 'function') {
  console.warn('[i18n] i18n-core.js 未成功加载，已启用兜底 t()。请检查 i18n/ 目录是否已正确部署到服务器。');
  window.t = function(key, params) {
    if (!params) return key;
    return key.replace(/\{(\w+)\}/g, (m, k) => (params[k] !== undefined ? params[k] : m));
  };
  window.tMonth = function(idx) { return String(idx + 1) + '月'; };
  window.I18N = { getLang: () => 'zh', setLang: () => {}, switchLang: () => {}, applyDOM: () => {}, getAvailableLangs: () => ['zh'] };
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (e) => {

}
</script>

/* ── SNAKE TRACK ── */

<script>
// ════════════════════════════════════════════════════════════════════════════
//  主题
// ════════════════════════════════════════════════════════════════════════════
(function applyTheme() {
  try {
    var cfg = IndustryAdapter.getCurrent();
    if (cfg && cfg.theme) {
      var root = document.documentElement;
      root.style.setProperty('--orange',    cfg.theme);
      root.style.setProperty('--orange-dk', cfg.theme.replace(')', ', 0.8)').replace('rgb', 'rgba') || '#7A1828');
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', cfg.theme);
    }
  } catch(e) {}
})();

// ════════════════════════════════════════════════════════════════════════════
//  Engine — 核心数据引擎
// ════════════════════════════════════════════════════════════════════════════
const Engine = (function () {
  const KEYS = {
    history:   'otter_history',
    inventory: 'otter_inventory',
    sales:     'otter_sales',
    restock:   'otter_restock',
  };

  function load(key) {
    try { return JSON.parse(localStorage.getItem(key)) || null; }
    catch (e) { return null; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function getHistory()          { return load(KEYS.history) || {}; }
  function saveHistory(h)        { save(KEYS.history, h); }
  function getDay(dateKey)       { return getHistory()[dateKey] || null; }
  function setDay(dateKey, data) {
    const h = getHistory();
    h[dateKey] = Object.assign(h[dateKey] || {}, data);
    saveHistory(h);
  }

  function getInventory()   { return load(KEYS.inventory) || []; }
  function saveInventory(v) { save(KEYS.inventory, v); }

  function addProduct(product) {
    const inv = getInventory();
    const batchNo = inv.filter(p => p.name === product.name).length + 1;
    inv.push(Object.assign({ id: Date.now() + Math.random(), batchNo }, product));
    const cost = (parseFloat(product.costPrice)||0) * (parseFloat(product.qty)||0);
    if (cost > 0) {
      const c = parseFloat(localStorage.getItem('finance_cash')) || 0;
      localStorage.setItem('finance_cash', String(c - cost));
    }
    saveInventory(inv);
    return inv;
  }

  function updateProductQty(productId, deltaQty) {
    const inv = getInventory();
    const p   = inv.find(p => p.id == productId);
    if (!p) return false;
    p.qty = Math.max(0, (parseFloat(p.qty) || 0) + deltaQty);
    saveInventory(inv);
    return true;
  }

  function deleteProduct(productId) {
    saveInventory(getInventory().filter(p => p.id != productId));
  }

  function getBatchesByName(name) {
    return getInventory()
      .filter(p => p.name === name && parseFloat(p.qty) > 0)
      .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  }

  function getSales()   { return load(KEYS.sales) || []; }
  function saveSales(v) { save(KEYS.sales, v); }

  function recordSale(items) {
    const dateKey = new Date().toLocaleDateString();
    let total = 0, cost = 0, cashCollected = 0, arTotal = 0;
    items.forEach(item => {
      const costP    = parseFloat(item.costPrice);
      const qty      = parseFloat(item.qty);
      const origPrice = item.origSalePrice || item.salePrice;

      if (item.isRedemption) {
        // ★ 换购会计逻辑：
        //   收入 = 消费者实付 + 供应商补偿进价（权责发生制，AR确认为当期收入）
        //   成本 = 进价（正常）
        //   毛利 = 实付金额（消费者付的那部分）
        const redeemP = parseFloat(item.redemptionPrice || 0);
        total += (redeemP + costP) * qty;   // 收入 = 实付 + 进价
        cost  += costP * qty;               // 成本 = 进价
        cashCollected += redeemP * qty;     // 实收现金 = 换购价
        arTotal       += costP * qty;       // ★ 应收 = 进价（供应商补偿成本）
      } else {
        // 普通商品：收入 = 售价（含优惠后价），现金 = 售价
        total         += parseFloat(item.salePrice) * qty;
        cost          += costP * qty;
        cashCollected += parseFloat(item.salePrice) * qty;
      }
    });
    const profit = total - cost;   // 换购商品毛利 = 实付额，普通商品毛利正常
    const record = {
      id: Date.now(), date: dateKey, items, total, profit,
      cashCollected, arTotal,   // ★ 新增字段，供成功弹窗展示
      createdAt: new Date().toISOString(),
    };
    const sales = getSales(); sales.push(record); saveSales(sales);
    items.forEach(item => updateProductQty(item.productId, -parseFloat(item.qty)));
    updateDayFromSales(dateKey);
    const today = new Date().toLocaleDateString();
    const newRev = (parseFloat(localStorage.getItem('todayRev')) || 0) + profit;
    localStorage.setItem('todayRev', String(newRev));
    try {
      const dc = parseFloat(localStorage.getItem('dailyCost')) || 0;
      const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
      if (!history[today]) history[today] = {};
      history[today].revenue     = newRev.toFixed(2);
      history[today].profit      = (newRev - dc).toFixed(2);
      history[today].achievement = dc > 0 ? Math.floor((newRev / dc) * 100) : 100;
      const r = parseFloat(localStorage.getItem('monthlyRent'))   || 0;
      const s = parseFloat(localStorage.getItem('monthlySalary')) || 0;
      const o = parseFloat(localStorage.getItem('monthlyOther'))  || 0;
      const dim = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();
      history[today].costSnapshot = { rent:(r/dim).toFixed(2), salary:(s/dim).toFixed(2), other:(o/dim).toFixed(2) };
      localStorage.setItem('revenue_history', JSON.stringify(history));
    } catch(e) {}
    // ★ 现金只增加实收金额，换购差价不进现金
    localStorage.setItem('finance_cash', String((parseFloat(localStorage.getItem('finance_cash'))||0) + cashCollected));
    // ★ 自动为每个换购商品创建应收账款（金额 = 进价，供应商补偿成本）
    items.filter(i => i.isRedemption).forEach(item => {
      const ar = parseFloat(item.costPrice) * parseFloat(item.qty);
      if (ar > 0.001) {
        recordReceivable(
          item.supplierName || t('ar.defaultCounterparty'),
          ar,
          t('ar.redemptionNote', {name: item.name}),
          null
        );
      }
    });
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'sale', amount:profit, revenue:total, cashCollected, todayRev:newRev, timestamp:Date.now(),
    }));
    return record;
  }

  function updateDayFromSales(dateKey) {
    const sales   = getSales().filter(s => s.date === dateKey);
    const revenue = sales.reduce((a, s) => a + s.total, 0);
    const profit  = sales.reduce((a, s) => a + s.profit, 0);
    setDay(dateKey, { revenue, profit, grossMargin: revenue>0?Math.round(profit/revenue*100):0, variableCost: revenue-profit });
  }

  // ★ 损耗记录
  // 口径：进价成本（亏了多少本钱）
  // 影响：① 日历历史 loss/lossCount/profit ② revenue_history（realcost-history 联动）
  //       ③ finance_cash 减少  ④ 库存数量扣减
  function recordLoss(productId, qty) {
    const inv = getInventory();
    const p   = inv.find(x => x.id == productId);
    if (!p) return null;
    const lossQty  = Math.min(parseFloat(qty)||1, parseFloat(p.qty)||0);
    const lossCost = lossQty * (parseFloat(p.costPrice)||0);
    const dk       = new Date().toLocaleDateString();

    // 扣库存
    p.qty = Math.max(0, parseFloat(p.qty) - lossQty);
    saveInventory(inv);

    // 写日历历史 —— ★ 只累加 loss，不再倒扣 profit（毛利与损耗分离）
    const h = getHistory();
    if (!h[dk]) h[dk] = {};
    h[dk].loss      = (parseFloat(h[dk].loss)||0) + lossCost;
    h[dk].lossCount = (parseInt(h[dk].lossCount)||0) + 1;
    saveHistory(h);

    // 写 revenue_history（供 realcost-history 现金流页面联动）
    try {
      const rh = JSON.parse(localStorage.getItem('revenue_history'))||{};
      if (!rh[dk]) rh[dk] = {};
      rh[dk].loss      = ((parseFloat(rh[dk].loss)||0)      + lossCost).toFixed(2);
      rh[dk].lossCount = (parseInt(rh[dk].lossCount)||0)    + 1;
      localStorage.setItem('revenue_history', JSON.stringify(rh));
    } catch(e) {}

    // 注意：现金不变（进货时已付款），损耗只减少库存资产账面价值
    // 触发 main 监听
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'loss', amount:lossCost, productName:p.name, qty:lossQty, timestamp:Date.now(),
    }));

    return { productName:p.name, qty:lossQty, lossCost, dateKey:dk };
  }

  // ★ 应收账款快速登记（收银台换购后调用）
  // 写入 finance_receivables，通过 realcost_trigger 通知 history 页
  function recordReceivable(counterparty, amount, note, dueDate) {
    const entry = {
      id:           Date.now(),
      counterparty: counterparty || t('ar.defaultCounterparty'),
      amount:       parseFloat(amount) || 0,
      note:         note || '',
      date:         new Date().toLocaleDateString(),
      dueDate:      dueDate || null,
      status:       'pending',
      settledDate:  null,
    };
    // 写入本地（供 history 同域读取）
    const list = JSON.parse(localStorage.getItem('finance_receivables')||'[]');
    list.push(entry);
    localStorage.setItem('finance_receivables', JSON.stringify(list));
    // 触发 history 页的 storage 监听
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'ar', amount:entry.amount, counterparty:entry.counterparty,
      note:entry.note, dueDate:entry.dueDate, timestamp:Date.now(),
    }));
    return entry;
  }

  // ★ 补记：在指定过去日期录入销售（会计逻辑与 recordSale 相同）
  function recordSaleOnDate(items, targetDate) {
    let total = 0, cost = 0, cashCollected = 0, arTotal = 0;
    items.forEach(item => {
      const costP     = parseFloat(item.costPrice);
      const qty       = parseFloat(item.qty);
      const origPrice = item.origSalePrice || item.salePrice;
      if (item.isRedemption) {
        const redeemP  = parseFloat(item.redemptionPrice || 0);
        total         += (redeemP + costP) * qty;
        cost          += costP * qty;
        cashCollected += redeemP * qty;
        arTotal       += costP * qty;
      } else {
        total         += parseFloat(item.salePrice) * qty;
        cost          += costP * qty;
        cashCollected += parseFloat(item.salePrice) * qty;
      }
    });
    const profit = total - cost;
    const record = {
      id: Date.now(), date: targetDate, items, total, profit,
      cashCollected, arTotal, retroactive: true,
      createdAt: new Date().toISOString(),
    };
    const sales = getSales(); sales.push(record); saveSales(sales);
    items.forEach(item => updateProductQty(item.productId, -parseFloat(item.qty)));
    updateDayFromSales(targetDate);
    // 现金按实收增加
    localStorage.setItem('finance_cash',
      String((parseFloat(localStorage.getItem('finance_cash'))||0) + cashCollected));
    // 自动创建换购应收
    items.filter(i => i.isRedemption).forEach(item => {
      const ar = parseFloat(item.costPrice) * parseFloat(item.qty);
      if (ar > 0.001) recordReceivable(item.supplierName||t('ar.defaultCounterparty'), ar, t('ar.redemptionNote',{name:item.name}), null);
    });
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'retro_sale', amount:profit, date:targetDate, timestamp:Date.now(),
    }));
    return record;
  }

  function getSalesRanking() {
    const map = {};
    getSales().forEach(s => s.items.forEach(item => {
      if (!map[item.name]) map[item.name] = { name:item.name, totalQty:0, totalRevenue:0, totalProfit:0 };
      map[item.name].totalQty     += parseFloat(item.qty);
      map[item.name].totalRevenue += parseFloat(item.salePrice) * parseFloat(item.qty);
      map[item.name].totalProfit  += (parseFloat(item.salePrice)-parseFloat(item.costPrice)) * parseFloat(item.qty);
    }));
    return Object.values(map).sort((a,b) => b.totalQty-a.totalQty);
  }

  function getSoldProfitRanking() {
    const map = {};
    getSales().forEach(s => s.items.forEach(item => {
      if (!map[item.name]) map[item.name] = { name:item.name, profit:0, qty:0 };
      map[item.name].profit += (parseFloat(item.salePrice)-parseFloat(item.costPrice))*parseFloat(item.qty);
      map[item.name].qty    += parseFloat(item.qty);
    }));
    return Object.values(map).sort((a,b) => b.profit-a.profit);
  }

  function getUnitProfitRanking() {
    const map = {};
    getInventory().forEach(p => {
      const up = parseFloat(p.salePrice) - parseFloat(p.costPrice);
      if (!map[p.name] || up > map[p.name].unitProfit) {
        map[p.name] = { name:p.name, category:p.category, unitProfit:up,
          margin: parseFloat(p.costPrice)>0 ? Math.round(up/parseFloat(p.salePrice)*100):0,
          salePrice:p.salePrice, costPrice:p.costPrice };
      }
    });
    return Object.values(map).sort((a,b) => b.unitProfit-a.unitProfit);
  }

  function getExpiringProducts(days = 7) {
    const cutoff = new Date(Date.now() + days*86400000);
    return getInventory()
      .filter(p => p.expireDate && new Date(p.expireDate) <= cutoff)
      .sort((a,b) => new Date(a.expireDate)-new Date(b.expireDate));
  }

  function fmtMoney(v) {
    v = parseFloat(v) || 0;
    return v >= 10000 ? '¥'+(v/10000).toFixed(1)+'w' : '¥'+v.toFixed(2).replace(/\.00$/,'');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return (d.getMonth()+1)+'/'+d.getDate();
  }
  function daysUntil(dateStr) {
    if (!dateStr) return null;
    return Math.ceil((new Date(dateStr)-new Date())/86400000);
  }

  function getMonthStats(year, month) {
    const h = getHistory();
    let revenue=0, profit=0, days=0, totalLoss=0;
    Object.keys(h).forEach(k => {
      const d = new Date(k);
      if (d.getFullYear()===year && d.getMonth()===month) {
        revenue    += parseFloat(h[k].revenue)||0;
        profit     += parseFloat(h[k].profit)||0;
        totalLoss  += parseFloat(h[k].loss)||0;
        // 有销售或有损耗都算经营日
        if ((parseFloat(h[k].revenue)||0)>0 || (parseFloat(h[k].loss)||0)>0) days++;
      }
    });
    return {
      revenue, profit, days, totalLoss,
      netProfit: profit - totalLoss,   // ★ 毛利 - 损耗后的净值，仅供展示，不覆盖 profit
      gm: revenue>0?Math.round(profit/revenue*100):0,
    };
  }

  function getStreak() {
    const h=getHistory(), now=new Date(); let s=0;
    for (let i=0;i<365;i++) {
      const d=new Date(now); d.setDate(d.getDate()-i);
      const k=d.toLocaleDateString();
      if (h[k] && parseFloat(h[k].revenue)>0) s++;
      else if (i>0) break;
    }
    return s;
  }

  return {
    getHistory, setDay, getDay,
    getInventory, addProduct, updateProductQty, deleteProduct, getBatchesByName,
    getSales, recordSale, recordSaleOnDate, recordLoss, recordReceivable,
    getSalesRanking, getSoldProfitRanking, getUnitProfitRanking,
    getExpiringProducts, getMonthStats, getStreak,
    fmtMoney, fmtDate, daysUntil, KEYS,
  };
})();

// ── 数据迁移 ────────────────────────────────────────────────────────────────
(function runMigrations() {
  const VK='otter_db_version', CV=3;
  const cur = parseInt(localStorage.getItem(VK)||'0');
  if (cur >= CV) return;
  if (cur < 1) {
    try {
      const inv = JSON.parse(localStorage.getItem('otter_inventory'))||[];
      let ch=false;
      inv.forEach(p => { if (!('barcode' in p)) { p.barcode=null; ch=true; } });
      if (ch) localStorage.setItem('otter_inventory', JSON.stringify(inv));
    } catch(e) {}
  }
  if (cur < 2) {
    try {
      const inv = JSON.parse(localStorage.getItem('otter_inventory'))||[];
      const nm={};
      inv.sort((a,b) => new Date(a.createdAt||0)-new Date(b.createdAt||0));
      inv.forEach(p => { if (!p.batchNo) { nm[p.name]=(nm[p.name]||0)+1; p.batchNo=nm[p.name]; } });
      localStorage.setItem('otter_inventory', JSON.stringify(inv));
    } catch(e) {}
  }
  // ★ v3：商品分类从中文字符串迁移为语言无关 key（支持多语言显示）
  //   旧值 → 新 key；不在映射表里的旧值（脏数据/用户手改）一律归为 'other'
  if (cur < 3) {
    try {
      const CAT_MIGRATE_MAP = {
        '食品饮料':'foodDrink', '日用百货':'daily', '休闲零食':'snacks',
        '冷冻冷藏':'frozen',   '酒水':'alcohol',    '烟草':'tobacco',
        '其他':'other',
      };
      const CAT_VALID_KEYS = new Set(Object.values(CAT_MIGRATE_MAP));
      const inv = JSON.parse(localStorage.getItem('otter_inventory'))||[];
      let ch=false;
      inv.forEach(p => {
        if (!p.category) return;
        if (CAT_VALID_KEYS.has(p.category)) return; // 已经是新 key，不用转
        const mapped = CAT_MIGRATE_MAP[p.category];
        p.category = mapped || 'other';
        ch = true;
      });
      if (ch) localStorage.setItem('otter_inventory', JSON.stringify(inv));
    } catch(e) {}
  }
  localStorage.setItem(VK, String(CV));
})();

window.Engine = Engine;
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  BatchPicker — 批次选择弹窗
// ════════════════════════════════════════════════════════════════════════════
const BatchPicker = (function () {
  let _resolve = null, _currentBatches = [];

  function open(productName, onPick) {
    const batches = Engine.getBatchesByName(productName);
    if (!batches.length) { onPick && onPick(null); return; }
    if (batches.length === 1) { onPick && onPick(batches[0]); return; }

    document.getElementById('batch-title').textContent = t('batchPicker.titleWithName', {name: productName});
    document.getElementById('batch-sub').textContent   = t('batchPicker.subtitle', {n: batches.length});

    document.getElementById('batch-list').innerHTML = batches.map((b, i) => {
      const isFifo = i === 0;
      const inDate = b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—';
      return `
        <div class="batch-item${isFifo?' batch-fifo-row':''}" onclick="BatchPicker._pick(${i})">
          <div class="batch-item-top">
            <span class="batch-item-name">${t('common.batchN',{n:b.batchNo||(i+1)})}${isFifo?'<span class="batch-fifo-tag">'+t('batchPicker.fifoTag')+'</span>':''}</span>
            <span class="batch-item-sale">${t('batchPicker.saleLabel',{val:Engine.fmtMoney(b.salePrice)})}</span>
          </div>
          <div class="batch-item-meta">
            <span>${t('common.costPriceLabel')} ${Engine.fmtMoney(b.costPrice)}</span>
            <span>${t('batchPicker.remaining',{n:b.qty})}</span>
            <span>${t('batchPicker.inStockDate',{date:inDate})}</span>
            ${b.expireDate?'<span>'+t('batchPicker.expireLabel',{date:Engine.fmtDate(b.expireDate)})+'</span>':''}
          </div>
        </div>`;
    }).join('');

    _resolve = onPick;
    _currentBatches = batches;
    document.getElementById('batch-overlay').classList.add('open');
  }

  function _pick(idx) {
    document.getElementById('batch-overlay').classList.remove('open');
    if (_resolve) _resolve(_currentBatches[idx]);
    _resolve = null;
  }

  function close() {
    document.getElementById('batch-overlay').classList.remove('open');
    if (_resolve) _resolve(null);
    _resolve = null;
  }

  return { open, _pick, close };
})();

window.BatchPicker = BatchPicker;
function closeBatchSheet() { BatchPicker.close(); }

// ════════════════════════════════════════════════════════════════════════════
//  ★ DiscountSheet — 优惠弹窗
//  整单快捷折 + 自定义折扣 + 逐行改价，两种方式互斥
//  不修改库存原始售价，仅影响本次交易实收
// ════════════════════════════════════════════════════════════════════════════
const DiscountSheet = (function () {
  let _cart=[], _cb=null, _overrides={}, _wholePct=null;

  function open(cart, onApply) {
    _cart=cart; _cb=onApply; _overrides={}; _wholePct=null;
    // 重置 UI
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('disc-custom-inp').value='';
    // 渲染逐行列表
    document.getElementById('disc-items-list').innerHTML = cart.map((item, i) => `
      <div class="disc-item-row">
        <div class="disc-item-info">
          <div class="disc-item-name">${item.name}${item.batchNo?'<span style="font-size:11px;color:#999;margin-left:4px">'+t('common.batchN',{n:item.batchNo})+'</span>':''}</div>
          <div class="disc-item-orig">${t('discount.origPrice',{price:Engine.fmtMoney(item.salePrice),qty:item.qty})}</div>
        </div>
        <input class="disc-item-inp" type="number" step="0.01" min="0"
               placeholder="${(item.origSalePrice||item.salePrice).toFixed(2)}"
               data-idx="${i}" oninput="DiscountSheet.onItemPrice(${i},this.value)">
      </div>`).join('');
    _updatePreview();
    document.getElementById('discount-overlay').classList.add('open');
  }

  function setPct(pct) {
    _wholePct=pct; _overrides={};
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.pct)===pct));
    document.getElementById('disc-custom-inp').value=pct;
    document.querySelectorAll('.disc-item-inp').forEach(inp=>inp.value='');
    _updatePreview();
  }

  function onCustomPct() {
    const v = parseFloat(document.getElementById('disc-custom-inp').value);
    _wholePct = (v>0&&v<=100) ? v : null;
    _overrides={};
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.disc-item-inp').forEach(inp=>inp.value='');
    _updatePreview();
  }

  function onItemPrice(idx, val) {
    _wholePct=null;
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('disc-custom-inp').value='';
    const v=parseFloat(val);
    if (!isNaN(v)&&v>=0) _overrides[idx]=v; else delete _overrides[idx];
    _updatePreview();
  }

  function _effectivePrice(item, idx) {
    if (_overrides[idx]!==undefined) return _overrides[idx];
    const base = item.origSalePrice||item.salePrice;
    if (_wholePct!==null) return +(base*_wholePct/100).toFixed(2);
    return item.salePrice;
  }

  function _updatePreview() {
    let total=0, origTotal=0, cost=0;
    _cart.forEach((item,i)=>{
      const p = _effectivePrice(item,i);
      total     += p*item.qty;
      origTotal += (item.origSalePrice||item.salePrice)*item.qty;
      cost      += parseFloat(item.costPrice||0)*item.qty;
    });
    const saved=origTotal-total;
    document.getElementById('disc-total-preview').textContent=Engine.fmtMoney(total);
    document.getElementById('disc-save-lbl').textContent=saved>0.005?t('discount.saved',{val:Engine.fmtMoney(saved)}):'';

    // ★ 优惠后毛利率实时预览
    const marginEl = document.getElementById('disc-margin-lbl');
    if (marginEl) {
      if (total > 0) {
        const profit = total - cost;
        const rate   = Math.round(profit/total*100);
        const cls    = rate >= 20 ? 'g' : rate >= 0 ? 'o' : 'r';
        marginEl.className = 'disc-margin ' + cls;
        marginEl.textContent = t('discount.marginPreview', {rate: rate, val: Engine.fmtMoney(profit)});
      } else {
        marginEl.textContent = '';
        marginEl.className = 'disc-margin';
      }
    }
  }

  function apply() {
    const newCart=_cart.map((item,i)=>({
      ...item,
      origSalePrice: item.origSalePrice||item.salePrice,
      salePrice: _effectivePrice(item,i),
    }));
    document.getElementById('discount-overlay').classList.remove('open');
    if (_cb) _cb(newCart);
  }

  function reset() {
    _wholePct=null; _overrides={};
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('disc-custom-inp').value='';
    document.querySelectorAll('.disc-item-inp').forEach(inp=>inp.value='');
    _updatePreview();
  }

  function close() { document.getElementById('discount-overlay').classList.remove('open'); }

  return { open, setPct, onCustomPct, onItemPrice, apply, reset, close };
})();
window.DiscountSheet=DiscountSheet;

// ════════════════════════════════════════════════════════════════════════════
//  ★ LossSheet — 损耗记录弹窗
//  从临期货品页面呼出，记录进价损耗
// ════════════════════════════════════════════════════════════════════════════
const LossSheet = (function () {
  let _prod=null, _qty=1;

  function open(product) {
    _prod=product; _qty=1;
    document.getElementById('loss-prod-name').textContent =
      product.name + (product.batchNo ? '（'+t('common.batchN',{n:product.batchNo})+'）' : '');
    document.getElementById('loss-prod-meta').textContent =
      t('common.costPriceLabel')+' '+Engine.fmtMoney(product.costPrice)+' · '+t('inventory.currentStock',{n:product.qty});
    _render();
    document.getElementById('loss-overlay').classList.add('open');
  }

  function _maxQty() { return Math.max(1, Math.floor(parseFloat(_prod.qty)||1)); }

  function adj(d) {
    _qty = Math.max(1, Math.min(_qty+d, _maxQty()));
    _render();
  }

  // ★ 手动输入时实时响应（打字过程中不强行纠正，避免光标跳动）
  function onInput(val) {
    const v = parseInt(val, 10);
    if (!isNaN(v)) {
      _qty = v;
      _renderCalc();
    }
  }

  // ★ 失焦时校正到合法范围 [1, 库存上限]
  function onBlur() {
    const max = _maxQty();
    if (isNaN(_qty) || _qty < 1) _qty = 1;
    if (_qty > max) _qty = max;
    _render();
  }

  // ★ 一键最大值：直接设为当前库存全部数量
  function setMax() {
    _qty = _maxQty();
    _render();
  }

  function _render() {
    document.getElementById('loss-qty-val').value = _qty;
    _renderCalc();
  }

  function _renderCalc() {
    const cost = (parseFloat(_qty)||0) * (parseFloat(_prod.costPrice)||0);
    const costSpan = '<span>'+Engine.fmtMoney(cost)+'</span>';
    document.getElementById('loss-calc').innerHTML=
      t('loss.calc', {val: costSpan, qty: _qty, cost: Engine.fmtMoney(_prod.costPrice)});
  }

  function confirm() {
    if (!_prod) return;
    // ★ 提交前再校正一次，防止用户未失焦直接点确认
    const max = _maxQty();
    if (isNaN(_qty) || _qty < 1) _qty = 1;
    if (_qty > max) _qty = max;
    const result = Engine.recordLoss(_prod.id, _qty);
    document.getElementById('loss-overlay').classList.remove('open');
    // 刷新相关视图
    if (window.Dashboard&&window.Dashboard.refresh) window.Dashboard.refresh();
    const expEl=document.getElementById('view-expiring');
    if (expEl&&expEl.classList.contains('visible')) Dashboard.renderExpiring(expEl);
    // 日历节点补丁：今天若仅有损耗无销售，变为红色
    _patchTodayNode();
    _toast(t('loss.recorded', {name: result.productName, qty: result.qty, val: Engine.fmtMoney(result.lossCost)}));
  }

  function _patchTodayNode() {
    const dk  = new Date().toLocaleDateString();
    const h   = Engine.getHistory()[dk]||{};
    const hasS= parseFloat(h.revenue||0)>0;
    const hasL= parseFloat(h.loss||0)>0;
    if (!hasL||hasS) return; // 有销售时节点颜色不变
    const today=new Date().getDate();
    document.querySelectorAll('.day-node').forEach(el=>{
      const numEl=el.querySelector('.nd-num');
      if (numEl&&parseInt(numEl.textContent)===today) {
        // 移除旧颜色类，加上损耗类
        ['n-done','n-missed','n-future'].forEach(c=>el.classList.remove(c));
        el.classList.add('n-loss');
        const ico=el.querySelector('.nd-ico');
        if (ico) ico.textContent='⚠';
      }
    });
  }

  function _toast(msg) {
    let toastEl=document.getElementById('bco-toast');
    if (!toastEl){toastEl=document.createElement('div');toastEl.id='bco-toast';document.body.appendChild(toastEl);}
    toastEl.textContent=msg;toastEl.classList.add('show');
    clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.classList.remove('show'),3500);
  }

  function close() { document.getElementById('loss-overlay').classList.remove('open'); }

  return { open, adj, onInput, onBlur, setMax, confirm, close };
})();
window.LossSheet=LossSheet;

// ════════════════════════════════════════════════════════════════════════════
//  ★ ARSheet — 应收账款快速登记
//  从收银台呼出，预填差价金额；也可手动填写任意应收
// ════════════════════════════════════════════════════════════════════════════
const ARSheet = (function(){
  function open(prefill) {
    // prefill: { counterparty, amount, note, dueDate }（可选）
    prefill = prefill || {};
    document.getElementById('ar-cp').value       = prefill.counterparty || '';
    document.getElementById('ar-amt').value      = prefill.amount       || '';
    document.getElementById('ar-nt').value       = prefill.note         || '';
    document.getElementById('ar-due-inp').value  = prefill.dueDate      || _defaultDueDate();
    document.getElementById('ar-success').classList.add('hidden');
    document.getElementById('ar-overlay').classList.add('open');
  }

  function _defaultDueDate() {
    // 默认填下月末（月结场景）
    const d = new Date();
    d.setMonth(d.getMonth() + 1);
    d.setDate(new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate());
    return d.toISOString().slice(0, 10);
  }

  function confirm() {
    const cp  = document.getElementById('ar-cp').value.trim();
    const amt = parseFloat(document.getElementById('ar-amt').value);
    const nt  = document.getElementById('ar-nt').value.trim();
    const due = document.getElementById('ar-due-inp').value;
    if (!cp)        { _shake(document.getElementById('ar-cp'));  return; }
    if (!amt||amt<=0){ _shake(document.getElementById('ar-amt')); return; }
    Engine.recordReceivable(cp, amt, nt, due);
    document.getElementById('ar-success').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('ar-success').classList.add('hidden');
      document.getElementById('ar-overlay').classList.remove('open');
    }, 1800);
  }

  function _shake(el) {
    el.style.borderColor='#F44336';
    el.classList.add('shake');
    setTimeout(()=>{ el.classList.remove('shake'); el.style.borderColor=''; }, 600);
  }

  function close() { document.getElementById('ar-overlay').classList.remove('open'); }

  return { open, confirm, close };
})();
window.ARSheet = ARSheet;
function closeARSheet() { ARSheet.close(); }

// ════════════════════════════════════════════════════════════════════════════
//  ★ RedemptionSheet — 换购弹窗
//  单品模式：对购物车某一行标记换购，设置实付金额+供应商
//  整单模式：对购物车所有商品批量设置
//  确认后：cart[i].isRedemption=true, .redemptionPrice=X, .supplierName=Y
//  recordSale 会自动用原价记收入、只增实付现金、自动建AR
// ════════════════════════════════════════════════════════════════════════════
const RedemptionSheet = (function(){
  let _mode      = 'single';  // 'single' | 'all'
  let _idx       = -1;        // single 模式下的 cart index
  let _cart      = null;      // 外部 cart 引用
  let _onConfirm = null;

  function openSingle(cartRef, idx, onConfirm) {
    _mode = 'single'; _idx = idx; _cart = cartRef; _onConfirm = onConfirm;
    const item = cartRef[idx];
    const origPrice = item.origSalePrice || item.salePrice;
    document.getElementById('rs-title').textContent     = t('redeem.singleTitle');
    document.getElementById('rs-prod-name').textContent = item.name + (item.batchNo?' '+t('common.batchN',{n:item.batchNo}):'');
    document.getElementById('rs-prod-price').textContent= t('discount.origPrice',{price:Engine.fmtMoney(origPrice),qty:item.qty});
    document.getElementById('rs-supplier').value = item.supplierName || '';
    document.getElementById('rs-price').value    = item.isRedemption ? (item.redemptionPrice||'') : '1';
    _updateDiff();
    document.getElementById('redeem-overlay').classList.add('open');
    document.getElementById('rs-price').focus();
  }

  function openAll(cartRef, onConfirm) {
    _mode = 'all'; _idx = -1; _cart = cartRef; _onConfirm = onConfirm;
    const totalOrig = cartRef.reduce((a,c)=>(a+(c.origSalePrice||c.salePrice)*c.qty),0);
    document.getElementById('rs-title').textContent     = t('redeem.allTitle');
    document.getElementById('rs-prod-name').textContent = t('redeem.allProductCount', {n: cartRef.length});
    document.getElementById('rs-prod-price').textContent= t('redeem.allOrigTotal', {val: Engine.fmtMoney(totalOrig)});
    document.getElementById('rs-supplier').value = cartRef[0]?.supplierName || '';
    document.getElementById('rs-price').value    = '';
    _updateDiff();
    document.getElementById('redeem-overlay').classList.add('open');
  }

  function onPriceChange() { _updateDiff(); }

  function _updateDiff() {
    const diffEl  = document.getElementById('rs-diff-val');
    const hintEl  = document.getElementById('rs-diff-hint');
    if (!_cart) return;

    if (_mode === 'single') {
      const item = _cart[_idx];
      // ★ 供应商补偿 = 进价（与消费者实付金额无关）
      const ar = parseFloat(item.costPrice) * item.qty;
      diffEl.textContent = Engine.fmtMoney(ar);
      hintEl.textContent = t('redeem.singleHint', {cost: Engine.fmtMoney(item.costPrice), qty: item.qty});
    } else {
      // ★ 整单模式：各商品进价合计
      const totalAR = _cart.reduce((a,c) => a + parseFloat(c.costPrice) * c.qty, 0);
      diffEl.textContent = Engine.fmtMoney(totalAR);
      hintEl.textContent = t('redeem.allHint');
    }
  }

  function confirm() {
    const supplier = document.getElementById('rs-supplier').value.trim();
    const price    = parseFloat(document.getElementById('rs-price').value);
    if (!supplier) { _shake(document.getElementById('rs-supplier')); return; }
    if (isNaN(price) || price < 0) { _shake(document.getElementById('rs-price')); return; }

    if (_mode === 'single') {
      _cart[_idx].isRedemption  = true;
      _cart[_idx].redemptionPrice = price;
      _cart[_idx].supplierName    = supplier;
    } else {
      _cart.forEach(item => {
        item.isRedemption   = true;
        item.redemptionPrice = price;
        item.supplierName    = supplier;
      });
    }
    document.getElementById('redeem-overlay').classList.remove('open');
    if (_onConfirm) _onConfirm(_cart);
  }

  function clearItem(cartRef, idx, onConfirm) {
    cartRef[idx].isRedemption   = false;
    cartRef[idx].redemptionPrice = null;
    cartRef[idx].supplierName    = null;
    if (onConfirm) onConfirm(cartRef);
  }

  function close() { document.getElementById('redeem-overlay').classList.remove('open'); }
  function _shake(el) {
    el.style.borderColor='#F44336'; el.classList.add('shake');
    setTimeout(()=>{el.classList.remove('shake');el.style.borderColor='';},600);
  }

  return { openSingle, openAll, onPriceChange, confirm, clearItem, close };
})();
window.RedemptionSheet = RedemptionSheet;
function closeRedeemSheet() { RedemptionSheet.close(); }
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════

const BARCODE_API = 'https://retail.nudgenow.xyz';
const BarcodeScanner=(function(){

  function _dd(c){const n=Date.now();if(c===_lf&&n-_lt<1500)return;_lf=c;_lt=n;_beep();_ss(t('scanner.detected',{code:c}));_stop();if(_od)_od(c);}
  function _beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(1800,ctx.currentTime);g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.12);}catch(e){}}

  function _is(){if(document.getElementById('bco-styles'))return;const s=document.createElement('style');s.id='bco-styles';s.textContent=`#barcode-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;}#barcode-overlay.open{display:flex;animation:bcoFadeIn .2s ease;}@keyframes bcoFadeIn{from{opacity:0}to{opacity:1}}#bco-inner{display:flex;flex-direction:column;align-items:center;padding:20px 16px 28px;width:100%;max-width:380px;}#bco-header{text-align:center;margin-bottom:14px;}#bco-title{color:#fff;font-size:19px;font-weight:900;}#bco-hint{color:rgba(255,255,255,.6);font-size:12px;margin-top:5px;}#bco-viewport{position:relative;width:100%;max-width:360px;aspect-ratio:4/3;border-radius:16px;overflow:hidden;background:#000;}#bco-video{width:100%;height:100%;object-fit:cover;display:block;}#bco-frame{position:absolute;inset:0;pointer-events:none;}.bco-corner{position:absolute;width:28px;height:28px;border-color:#FF6B35;border-style:solid;}.bco-corner.tl{top:16px;left:16px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}.bco-corner.tr{top:16px;right:16px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}.bco-corner.bl{bottom:16px;left:16px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}.bco-corner.br{bottom:16px;right:16px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}#bco-scanline{position:absolute;left:16px;right:16px;height:2px;background:linear-gradient(90deg,transparent,#FF6B35,transparent);animation:bcoScan 2s ease-in-out infinite;}@keyframes bcoScan{0%{top:16px;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:calc(100% - 18px);opacity:0;}}#bco-status{color:rgba(255,255,255,.8);font-size:13px;font-weight:700;margin-top:14px;min-height:18px;text-align:center;}#bco-manual-row{display:flex;gap:8px;margin-top:14px;width:100%;max-width:360px;}#bco-manual-inp{flex:1;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);border-radius:10px;padding:10px 12px;font-size:14px   function _native(fmts){const wanted=['ean_13','ean-13','ean_8','ean-8','code_128','code-128','code_39','code-39','upc_a','upc-a','upc_e','upc-e'];const formats=fmts?wanted.filter(f=>fmts.includes(f)):wanted;const det=new BarcodeDetector({formats});navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}}).then(stream=>{_st=stream;_vid.srcObject=stream;_vid.style.display='block';_ov.querySelector('#bco-reader').style.display='none';let started=false;function sl(){if(started)return;started=true;_ss(t('scanner.aim'));const cv=document.createElement('canvas');const ctx=cv.getContext('2d');function scan(){if(!_run)return;if(!_vid.videoWidth){_raf=requestAnimationFrame(scan);return;}cv.width=_vid.videoWidth;cv.height=_vid.videoHeight;ctx.drawImage(_vid,0,0);createImageBitmap(cv).then(b=>det.detect(b).then(cs=>{b.close();if(cs.length)_dd(cs[0].rawValue);}).catch(()=>{})).catch(()=>{}).finally(()=>{if(_run)_raf=requestAnimationFrame(scan);});}_raf=requestAnimationFrame(scan);}_vid.onloadedmetadata=()=>{_vid.play();sl();};_vid.onloadeddata=()=>{_vid.play();sl();};_vid.oncanplay=()=>{_vid.play();sl();};setTimeout(()=>{_vid.play().then(sl).catch(()=>{});},500);}).catch(()=>{_ss(t('scanner.cameraFail'));});}
  function _fallback(){_vid.style.display='none';const re=_ov.querySelector('#bco-reader');re.style.display='block';re.innerHTML='';function ll(cb){if(window.Html5Qrcode){cb();return;}const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js';s.onload=cb;s.onerror=()=>_ss(t('scanner.libLoadFail'));document.head.appendChild(s);}ll(()=>{try{_sc=new Html5Qrcode('bco-reader');}catch(e){_ss(t('scanner.initFail'));return;}_sc.start({facingMode:'environment'},{fps:10,qrbox:(w,h)=>({width:Math.round(w*.85),height:Math.round(h*.35)}),aspectRatio:1.333,supportedScanTypes:[Html5QrcodeScanType.SCAN_TYPE_CAMERA],formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E]},(c)=>{if(_sc)_dd(c);},()=>{}).then(()=>{_ss(t('scanner.aim'));}).catch(()=>{_ss(t('scanner.cameraFail'));});});}

const BarcodeDB=(function(){
  let _r=null;
  async function getRegion(){if(_r)return _r;try{const r=await fetch('https://ipapi.co/json/',{signal:AbortSignal.timeout(4000)});const d=await r.json();_r=[d.region||'',d.city||''].filter(Boolean).join('-')||'未知';}catch{_r='未知';}return _r;}

  async function report(p){const rg=await getRegion();fetch(`${BARCODE_API}/api/inventory`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...p,region:rg})}).catch(()=>{});}
