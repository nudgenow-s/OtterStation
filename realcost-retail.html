<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6B4226">
<title>獭掌柜</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data === 'SW_UPDATED') window.location.reload();
  });
}
</script>
<style>
/* ── RESET & BASE ── */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
--orange: #FF6B35;
--orange-dk: #C44D1A;
--yellow: #FFD000;
--yellow-dk: #BF9B00;
--green: #4CAF50;
--green-dk: #388E3C;
--red: #F44336;
--gray-bg: #F7F7F7;
--gray-card: #F5F5F5;
--border: #EBEBEB;
--text: #222;
--text-2: #666;
--text-3: #AAA;
}

body {
font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
background: var(--gray-bg);
min-height: 100vh;
max-width: 480px;
margin: 0 auto;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

/* ── TOPBAR ── */

.topbar-back {
  display:flex; align-items:center; gap:4px;
  font-size:14px; font-weight:700; color:var(--orange);
  background:none; border:none; cursor:pointer;
  font-family:inherit; padding:4px 0; flex-shrink:0;
}
.topbar-back:active { opacity:0.7; }
/* ── MONTH HEADER ── */
.month-header {
background: var(--orange);
margin: 14px 16px 0;
border-radius: 20px;
padding: 16px 20px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 5px 0 var(--orange-dk);
}
.mh-left .mh-title { color:#fff; font-size:20px; font-weight:900; }
.mh-left .mh-sub   { color:rgba(255,255,255,.72); font-size:12px; font-weight:700; margin-top:3px; }
.mh-right .mh-rev  { color:#fff; font-size:26px; font-weight:900; text-align:right; }
.mh-right .mh-rlbl { color:rgba(255,255,255,.65); font-size:11px; font-weight:700; text-align:right; }

/* ── MAIN VIEW ── */
.main-view {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

/* ── 日历 SCROLL ── */
.calendar-view { padding: 24px 0 160px; }
.page-view { padding:16px 16px 160px; display:none; }
.page-view.visible { display: block; }

/* ── SNAKE TRACK ── */
.snake-track { position: relative; width: 100%; }
.snake-svg { position:absolute; top:0; left:0; width:100%; pointer-events:none; z-index:0; }

.day-node {
position:absolute; width:74px; height:74px; border-radius:50%;
display:flex; flex-direction:column; align-items:center; justify-content:center;
cursor:pointer; z-index:2;
transform:translate(-50%,-50%);
transition:transform .12s ease;
opacity:0;
animation:popIn .38s ease forwards;
}
.day-node:active { transform:translate(-50%,calc(-50% + 4px)) scale(.9); }

@keyframes popIn {
0%   { opacity:0; transform:translate(-50%,-50%) scale(.35); }
70%  { transform:translate(-50%,-50%) scale(1.1); }
100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
}

.n-future  { background:#EEE; box-shadow:0 5px 0 #C8C8C8; border:3px solid #C8C8C8; }
.n-future  .nd-num { color:#AAA; }
.n-future  .nd-ico { color:#BBB; }
.n-done    { background:var(--orange); box-shadow:0 5px 0 var(--orange-dk); border:3px solid var(--orange-dk); }
.n-done    .nd-num { color:#fff; }
.n-done    .nd-ico { color:#fff; }
.n-missed  { background:#fff; box-shadow:0 5px 0 #C8C8C8; border:3px solid #DDD; }
.n-missed  .nd-num { color:#C0C0C0; }
.n-missed  .nd-ico { color:#CCC; }
.n-today   {
background:var(--yellow); box-shadow:0 5px 0 var(--yellow-dk); border:3px solid var(--yellow-dk);
animation:popIn .38s ease forwards, todayPulse 2.2s .5s ease-in-out infinite;
}
.n-today .nd-num { color:#333; }
.n-today .nd-ico { color:#555; }

@keyframes todayPulse {
0%,100% { box-shadow:0 5px 0 var(--yellow-dk), 0 0 0 0 rgba(255,208,0,.5); }
50%      { box-shadow:0 5px 0 var(--yellow-dk), 0 0 0 14px rgba(255,208,0,0); }
}

.nd-num { font-size:23px; font-weight:900; line-height:1; }
.nd-ico { font-size:13px; margin-top:3px; font-weight:700; }

.today-tag {
position:absolute; top:-26px; left:50%; transform:translateX(-50%);
background:var(--yellow); color:#333; font-size:10px; font-weight:900;
padding:3px 9px; border-radius:8px; white-space:nowrap; box-shadow:0 2px 0 var(--yellow-dk); z-index:3;
}
.today-tag::after {
content:''; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%);
border:4px solid transparent; border-top-color:var(--yellow);
}

.chest-node {
position:absolute; width:82px; height:82px; background:#fff;
border-radius:20px; border:3px solid #DDD; box-shadow:0 5px 0 #C4C4C4;
display:flex; flex-direction:column; align-items:center; justify-content:center;
cursor:pointer; z-index:2; transform:translate(-50%,-50%); transition:transform .12s;
}
.chest-node:active { transform:translate(-50%,calc(-50% + 4px)) scale(.9); }
.ch-icon  { font-size:34px; }
.ch-label { font-size:10px; font-weight:800; color:#999; margin-top:4px; }

.mascot-node {
position:absolute; font-size:60px; transform:translate(-50%,-50%); z-index:1;
animation:mFloat 3s ease-in-out infinite;
filter:drop-shadow(0 6px 10px rgba(255,107,53,.2)); pointer-events:none;
}
@keyframes mFloat {
0%,100% { transform:translate(-50%,-50%) translateY(0); }
50%      { transform:translate(-50%,-50%) translateY(-10px); }
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:env(safe-area-inset-bottom,0px); left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:#fff; border-top:2px solid var(--border);
  display:flex; z-index:200; padding-bottom:8px;
  overflow-x:auto;
}
.nav-btn {
flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
padding:9px 2px 7px; border:none; background:none; cursor:pointer; gap:3px;
}
.nav-ico   { font-size:20px; transition:transform .15s; }
.nav-lbl   { font-size:9px; font-weight:800; color:#AAA; }
.nav-btn.active .nav-lbl { color:var(--orange); }
.nav-btn.active .nav-ico { transform:scale(1.18); }
.nav-btn:active .nav-ico { transform:scale(.88); }

/* ── SHEET (日历弹窗) ── */
.overlay {
display:none; position:fixed; inset:0; background:rgba(0,0,0,.48); z-index:500; align-items:flex-end;
}
.overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.sheet {
background:#fff; width:100%; border-radius:28px 28px 0 0;
padding:0 24px 44px; animation:sheetUp .3s ease; max-height:82vh; overflow-y:auto;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.sh-handle { width:44px;height:5px;background:#E0E0E0;border-radius:3px;margin:14px auto 20px; }
.sh-date   { font-size:22px;font-weight:900;color:#222; }
.sh-status { font-size:13px;font-weight:700;color:#999;margin:4px 0 18px; }

.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.mc { background:#F5F5F5;border-radius:16px;padding:14px 12px; }
.mc-lbl { font-size:11px;font-weight:700;color:#999;margin-bottom:5px; }
.mc-val { font-size:20px;font-weight:900;color:#222; }
.mc-val.g { color:var(--green); }
.mc-val.o { color:var(--orange); }
.mc-val.r { color:var(--red); }

.btn-row { display:flex;gap:10px;margin-bottom:10px; }
.btn-sh {
flex:1; padding:15px 8px; border:none; border-radius:18px;
font-size:15px; font-weight:900; font-family:inherit;
cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
transition:all .1s;
}
.btn-primary { background:var(--orange);color:#fff;box-shadow:0 5px 0 var(--orange-dk); }
.btn-primary:active { transform:translateY(4px);box-shadow:0 1px 0 var(--orange-dk); }
.btn-stock   { background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-dk); }
.btn-stock:active { transform:translateY(4px);box-shadow:0 1px 0 var(--green-dk); }
.btn-ghost   { background:#F0F0F0;color:#555;box-shadow:0 4px 0 #CECECE;width:100%; }
.btn-ghost:active { transform:translateY(3px);box-shadow:0 1px 0 #CECECE; }

/* --页面通用组件-- */
.page-title-bar {
display:flex; align-items:center; gap:8px; margin-bottom:16px;
}
.page-title-icon { font-size:24px; }
.page-title-text { font-size:22px; font-weight:900; color:var(--text); flex:1; }

.section-label {
font-size:12px; font-weight:800; color:var(--text-3);
text-transform:uppercase; letter-spacing:.06em;
margin:18px 0 10px;
}

/* --搜索框-- */
.search-wrap { position:relative; margin-bottom:12px; }
.search-box  { display:flex; align-items:center; background:#fff; border:2px solid var(--border); border-radius:14px; padding:0 14px; }
.search-ico  { font-size:16px; margin-right:8px; }
.search-inp  { flex:1; border:none; outline:none; font-size:15px; padding:12px 0; background:transparent; font-family:inherit; }
.search-dropdown {
position:absolute; top:100%; left:0; right:0; background:#fff;
border:2px solid var(--border); border-radius:14px; z-index:50;
overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.1); margin-top:4px; max-height:220px; overflow-y:auto;
}
.search-dropdown.hidden { display:none; }
.dd-item {
display:flex; align-items:center; justify-content:space-between;
padding:12px 16px; cursor:pointer; transition:background .1s;
}
.dd-item:hover,.dd-item:active { background:var(--gray-bg); }
.dd-name { font-size:15px; font-weight:700; color:var(--text); }
.dd-info { font-size:12px; color:var(--text-3); }
.dd-empty { padding:16px; text-align:center; color:var(--text-3); font-size:14px; }

/* --收银台-- */
.cart-list { display:flex; flex-direction:column; gap:8px; margin-bottom:80px; }
.cart-empty { text-align:center; color:var(--text-3); font-size:15px; padding:40px 20px; }

.cart-item {
background:#fff; border-radius:16px; padding:14px 12px;
display:flex; align-items:center; gap:10px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.ci-info { flex:1; }
.ci-name { font-size:15px; font-weight:800; color:var(--text); }
.ci-price { font-size:12px; color:var(--text-3); margin-top:2px; }
.ci-qty-ctrl { display:flex; align-items:center; gap:8px; }
.qty-btn {
width:30px; height:30px; border-radius:10px; border:none;
background:var(--gray-bg); font-size:18px; font-weight:900; cursor:pointer;
display:flex; align-items:center; justify-content:center; color:var(--text);
}
.qty-val { font-size:16px; font-weight:900; min-width:24px; text-align:center; }
.ci-subtotal { font-size:16px; font-weight:900; color:var(--orange); min-width:52px; text-align:right; }
.ci-del {
width:28px; height:28px; border-radius:50%; border:none; background:#FFE5E5;
color:var(--red); font-size:12px; cursor:pointer; font-weight:900;
}

.cashier-total-bar {
position:fixed; bottom:calc(env(safe-area-inset-bottom,6px) + 62px);
left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:448px;
background:#fff; border-radius:20px; padding:14px 16px;
display:flex; align-items:center; justify-content:space-between;
box-shadow:0 -4px 24px rgba(0,0,0,.12); z-index:50;
}
.ct-left { flex:1; }
.ct-items { font-size:12px; color:var(--text-3); font-weight:700; }
.ct-total { font-size:22px; font-weight:900; color:var(--text); }
.ct-btn {
background:var(--orange); color:#fff; border:none; border-radius:16px;
padding:14px 24px; font-size:16px; font-weight:900; cursor:pointer;
box-shadow:0 4px 0 var(--orange-dk); font-family:inherit;
transition:all .1s;
}
.ct-btn:active { transform:translateY(4px); box-shadow:0 0 0 var(--orange-dk); }
.ct-btn:disabled { background:#CCC; box-shadow:0 4px 0 #AAA; cursor:not-allowed; }

.sale-success {
position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:#fff; border-radius:24px; padding:32px 40px; text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.2); z-index:300;
animation:successPop .4s cubic-bezier(.34,1.56,.64,1);
}
.sale-success.hidden { display:none; }
@keyframes successPop {
0% { transform:translate(-50%,-50%) scale(.5); opacity:0; }
100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
}
.ss-icon { font-size:56px; }
.ss-text { font-size:22px; font-weight:900; color:var(--text); margin-top:10px; }
.ss-sub  { font-size:14px; color:var(--text-3); margin-top:6px; }

/* ── 批次选择弹窗 ── */
.batch-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.52);
  z-index:600; align-items:flex-end;
}
.batch-overlay.open { display:flex; animation:fadeIn .2s ease; }
.batch-sheet {
  background:#fff; width:100%; border-radius:28px 28px 0 0;
  padding:0 20px 40px; animation:sheetUp .3s ease; max-height:75vh; overflow-y:auto;
}
.batch-handle { width:44px;height:5px;background:#E0E0E0;border-radius:3px;margin:14px auto 16px; }
.batch-title  { font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px; }
.batch-sub    { font-size:12px;color:var(--text-3);font-weight:700;margin-bottom:16px; }
.batch-item {
  background:var(--gray-bg); border-radius:16px; padding:14px 16px;
  margin-bottom:10px; cursor:pointer; border:2px solid transparent;
  transition:all .15s;
}
.batch-item:active,.batch-item.selected { border-color:var(--orange); background:#FFF3EE; }
.batch-item-top { display:flex; justify-content:space-between; align-items:center; }
.batch-item-name { font-size:15px; font-weight:900; color:var(--text); }
.batch-item-sale { font-size:17px; font-weight:900; color:var(--orange); }
.batch-item-meta { font-size:12px; color:var(--text-3); margin-top:5px; display:flex; gap:12px; }
.batch-fifo-tag {
  display:inline-block; background:var(--green); color:#fff;
  font-size:10px; font-weight:800; padding:2px 7px; border-radius:6px; margin-left:6px;
}

/* --库存录入 / 进货表单-- */
.form-subtitle { font-size:13px; color:var(--text-3); margin:-8px 0 16px; }

.form-card { background:#fff; border-radius:20px; padding:20px 16px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
.form-group { margin-bottom:16px; }
.form-group.half { flex:1; }
.form-row { display:flex; gap:12px; }
.form-lbl { display:block; font-size:12px; font-weight:800; color:var(--text-3); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
.form-inp {
width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:12px;
font-size:15px; font-family:inherit; outline:none; color:var(--text);
transition:border-color .2s;
}
.form-inp:focus { border-color:var(--orange); }

.cat-chips { display:flex; flex-wrap:wrap; gap:8px; }
.cat-chip {
padding:7px 12px; border-radius:20px; border:2px solid var(--border);
background:#fff; font-size:12px; font-weight:800; color:var(--text-2); cursor:pointer;
transition:all .15s; font-family:inherit;
}
.cat-chip.active { background:var(--orange); border-color:var(--orange); color:#fff; }

.margin-preview {
background:var(--gray-bg); border-radius:12px; padding:10px 14px;
display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.mp-label { font-size:11px; font-weight:800; color:var(--text-3); }
.mp-unit  { font-size:14px; font-weight:900; color:var(--text); }
.mp-rate  { font-size:14px; font-weight:900; }

.form-submit {
width:100%; padding:16px; background:var(--orange); color:#fff;
border:none; border-radius:18px; font-size:16px; font-weight:900;
cursor:pointer; box-shadow:0 5px 0 var(--orange-dk); font-family:inherit;
display:flex; align-items:center; justify-content:center; gap:8px;
transition:all .1s;
}
.form-submit:active { transform:translateY(4px); box-shadow:0 1px 0 var(--orange-dk); }

.form-success {
text-align:center; padding:14px; background:#E8F5E9; color:var(--green);
border-radius:14px; font-weight:800; margin-top:12px; font-size:15px;
}

@keyframes shake {
0%,100% { transform:translateX(0); }
20%,60%  { transform:translateX(-6px); }
40%,80%  { transform:translateX(6px); }
}
.shake { animation:shake .4s ease; border-color:var(--red) !important; }

.form-history-list { display:flex; flex-direction:column; gap:8px; }
.hist-empty { text-align:center; color:var(--text-3); padding:24px; font-size:14px; }
.hist-item {
background:#fff; border-radius:14px; padding:12px 14px;
display:flex; align-items:center; justify-content:space-between;
box-shadow:0 1px 6px rgba(0,0,0,.05);
}
.hi-name { font-size:14px; font-weight:800; color:var(--text); }
.hi-meta { font-size:11px; color:var(--text-3); margin-top:2px; }
.hi-qty  { font-size:16px; font-weight:900; color:var(--orange); text-align:right; }
.hi-exp  { font-size:10px; color:var(--text-3); text-align:right; margin-top:2px; }
.hidden  { display:none !important; }

/* ════════════════════════════════════════════════════════════════════════════
库存看板
════════════════════════════════════════════════════════════════════════════ */
.inv-total-chip {
background:var(--orange); color:#fff; font-size:12px; font-weight:800;
padding:4px 10px; border-radius:20px;
}

.inv-summary-row {
display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px;
}
.inv-sc { background:#fff; border-radius:16px; padding:14px 10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.05); }
.inv-sc-val { font-size:16px; font-weight:900; color:var(--text); }
.inv-sc-lbl { font-size:10px; color:var(--text-3); font-weight:700; margin-top:4px; }

.inv-search-wrap {
display:flex; align-items:center; background:#fff; border:2px solid var(--border);
border-radius:14px; padding:0 14px; margin-bottom:16px;
}

.inv-empty { text-align:center; color:var(--text-3); padding:48px 20px; font-size:15px; line-height:1.8; }

.inv-cat-section { margin-bottom:20px; }
.inv-cat-header {
display:flex; align-items:center; justify-content:space-between;
margin-bottom:8px;
}
.inv-cat-name { font-size:14px; font-weight:900; color:var(--text); }
.inv-cat-count { font-size:12px; color:var(--text-3); font-weight:700; }

.inv-table-wrap { overflow-x:auto; border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.inv-table { width:100%; border-collapse:collapse; background:#fff; min-width:360px; }
.inv-th {
background:var(--gray-bg); padding:10px 8px; font-size:11px; font-weight:800;
color:var(--text-3); text-align:left; white-space:nowrap;
}
.inv-th:first-child { border-radius:16px 0 0 0; }
.inv-th:last-child  { border-radius:0 16px 0 0; }
.inv-td { padding:11px 8px; font-size:13px; color:var(--text); border-top:1px solid var(--border); }
.td-name { font-weight:800; max-width:90px; }
.td-qty  { font-weight:900; text-align:center; }
.td-cost,.td-sale { font-weight:700; }
.td-exp  { font-size:12px; white-space:nowrap; }
.td-act  { text-align:center; }

/* 批次标签 */
.batch-tag {
  display:inline-block; background:#F0F4FF; color:#4B6CB7;
  font-size:10px; font-weight:800; padding:2px 6px; border-radius:5px; margin-left:4px;
}
.batch-fifo-row { background:#FFFDE7 !important; }

.qty-zero { color:var(--red) !important; }
.qty-low  { color:var(--orange) !important; }
.exp-danger { color:var(--red) !important; font-weight:800 !important; }
.exp-warn   { color:var(--orange) !important; font-weight:800 !important; }

.expired-badge { background:var(--red); color:#fff; font-size:10px; font-weight:800; padding:2px 6px; border-radius:6px; }
.exp-today     { background:var(--orange); color:#fff; font-size:10px; font-weight:800; padding:2px 6px; border-radius:6px; }

.inv-del-btn { background:none; border:none; cursor:pointer; font-size:16px; padding:4px; }

/* ════════════════════════════════════════════════════════════════════════════
临期货品
════════════════════════════════════════════════════════════════════════════ */
.exp-filter-row { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; }
.exp-filter-btn {
white-space:nowrap; padding:8px 14px; border-radius:20px; border:2px solid var(--border);
background:#fff; font-size:13px; font-weight:800; color:var(--text-2);
cursor:pointer; font-family:inherit; transition:all .15s;
}
.exp-filter-btn.active { background:var(--orange); border-color:var(--orange); color:#fff; }

.exp-empty { text-align:center; padding:60px 20px; }

<script>
// ── 獭掌柜 · 核心数据引擎 ──────────────────────────────────────────────────
(function applyTheme() {
  try {
    var cfg = IndustryAdapter.getCurrent();
    if (cfg && cfg.theme) {
      var root = document.documentElement;
      root.style.setProperty('--orange',    cfg.theme);
      root.style.setProperty('--orange-dk', cfg.theme.replace(')', ', 0.8)').replace('rgb', 'rgba') || '#7A1828');
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', cfg.theme);
    }
  } catch(e) {}
})();

const Engine = (function () {
  const KEYS = {
    history:   'otter_history',
    inventory: 'otter_inventory',
    sales:     'otter_sales',
    restock:   'otter_restock',
  };

  function load(key) {
    try { return JSON.parse(localStorage.getItem(key)) || null; }
    catch (e) { return null; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  // ── 日历历史 ────────────────────────────────────────────────────────────
  function getHistory()          { return load(KEYS.history) || {}; }
  function saveHistory(h)        { save(KEYS.history, h); }
  function getDay(dateKey)       { return getHistory()[dateKey] || null; }
  function setDay(dateKey, data) {
    const h = getHistory();
    h[dateKey] = Object.assign(h[dateKey] || {}, data);
    saveHistory(h);
  }

  // ── 库存 ────────────────────────────────────────────────────────────────
  // 商品结构：
  // { id, name, category, qty, costPrice, salePrice, expireDate, source,
  //   barcode, batchNo, createdAt }
  // ★ 每次录入始终新建批次，不再合并同名商品
  // ★ batchNo 用于在收银时标记批次顺序（入库时间升序 = 先进先出）

  function getInventory()   { return load(KEYS.inventory) || []; }
  function saveInventory(v) { save(KEYS.inventory, v); }

  function addProduct(product) {
    const inv = getInventory();

    // 计算同名商品已有多少批次，用于生成批次号显示
    const sameName = inv.filter(p => p.name === product.name);
    const batchNo  = sameName.length + 1;

    inv.push(Object.assign(
      { id: Date.now() + Math.random(), batchNo },
      product
    ));

    // 扣减现金（进货成本）
    const cost = (parseFloat(product.costPrice)||0) * (parseFloat(product.qty)||0);
    if (cost > 0) {
      const c = parseFloat(localStorage.getItem('finance_cash')) || 0;
      localStorage.setItem('finance_cash', String(c - cost));
    }
    saveInventory(inv);
    return inv;
  }

  function updateProductQty(productId, deltaQty) {
    const inv = getInventory();
    const p   = inv.find(p => p.id == productId);
    if (!p) return false;
    p.qty = Math.max(0, (parseFloat(p.qty) || 0) + deltaQty);
    saveInventory(inv);
    return true;
  }

  function deleteProduct(productId) {
    saveInventory(getInventory().filter(p => p.id != productId));
  }

  // ── 同名商品批次列表（按入库时间升序 = 先进先出顺序）────────────────────
  // 返回有库存的批次，第一个即 FIFO 应优先出货的批次
  function getBatchesByName(name) {
    return getInventory()
      .filter(p => p.name === name && parseFloat(p.qty) > 0)
      .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  }

  // ── 销售流水 ────────────────────────────────────────────────────────────
  function getSales()   { return load(KEYS.sales) || []; }
  function saveSales(v) { save(KEYS.sales, v); }

  function recordSale(items) {
    const dateKey = new Date().toLocaleDateString();
    let total = 0, cost = 0;
    items.forEach(item => {
      total += parseFloat(item.salePrice) * parseFloat(item.qty);
      cost  += parseFloat(item.costPrice) * parseFloat(item.qty);
    });
    const profit = total - cost;
    const record = {
      id: Date.now(), date: dateKey, items, total, profit,
      createdAt: new Date().toISOString(),
    };
    const sales = getSales();
    sales.push(record);
    saveSales(sales);

    // 扣减库存（按 productId 精确扣减对应批次）
    items.forEach(item => updateProductQty(item.productId, -parseFloat(item.qty)));

    updateDayFromSales(dateKey);

    const today = new Date().toLocaleDateString();
    const currentRev = parseFloat(localStorage.getItem('todayRev')) || 0;
    const newRev = currentRev + profit;
    localStorage.setItem('todayRev', String(newRev));

    try {
      const dc = parseFloat(localStorage.getItem('dailyCost')) || 0;
      const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
      if (!history[today]) history[today] = {};
      history[today].revenue     = newRev.toFixed(2);
      history[today].profit      = (newRev - dc).toFixed(2);
      history[today].achievement = dc > 0 ? Math.floor((newRev / dc) * 100) : 100;
      const r = parseFloat(localStorage.getItem('monthlyRent'))   || 0;
      const s = parseFloat(localStorage.getItem('monthlySalary')) || 0;
      const o = parseFloat(localStorage.getItem('monthlyOther'))  || 0;
      const dim = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();
      history[today].costSnapshot = {
        rent:   (r/dim).toFixed(2),
        salary: (s/dim).toFixed(2),
        other:  (o/dim).toFixed(2),
      };
      localStorage.setItem('revenue_history', JSON.stringify(history));
    } catch(e) {}

    const currentCash = parseFloat(localStorage.getItem('finance_cash')) || 0;
    localStorage.setItem('finance_cash', String(currentCash + total));
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type: 'sale', amount: profit, revenue: total,
      todayRev: newRev, timestamp: Date.now(),
    }));

    return record;
  }

  function updateDayFromSales(dateKey) {
    const sales   = getSales().filter(s => s.date === dateKey);
    const revenue = sales.reduce((a, s) => a + s.total, 0);
    const profit  = sales.reduce((a, s) => a + s.profit, 0);
    const gm      = revenue > 0 ? Math.round(profit / revenue * 100) : 0;
    setDay(dateKey, { revenue, profit, grossMargin: gm, variableCost: revenue - profit });
  }

  // ── 排行榜 ──────────────────────────────────────────────────────────────
  function getSalesRanking() {
    const map = {};
    getSales().forEach(s => {
      s.items.forEach(item => {
        if (!map[item.name]) map[item.name] = { name: item.name, totalQty: 0, totalRevenue: 0, totalProfit: 0 };
        map[item.name].totalQty     += parseFloat(item.qty);
        map[item.name].totalRevenue += parseFloat(item.salePrice) * parseFloat(item.qty);
        map[item.name].totalProfit  += (parseFloat(item.salePrice) - parseFloat(item.costPrice)) * parseFloat(item.qty);
      });
    });
    return Object.values(map).sort((a, b) => b.totalQty - a.totalQty);
  }

  function getSoldProfitRanking() {
    const map = {};
    getSales().forEach(s => {
      s.items.forEach(item => {
        if (!map[item.name]) map[item.name] = { name: item.name, profit: 0, qty: 0 };
        map[item.name].profit += (parseFloat(item.salePrice) - parseFloat(item.costPrice)) * parseFloat(item.qty);
        map[item.name].qty    += parseFloat(item.qty);
      });
    });
    return Object.values(map).sort((a, b) => b.profit - a.profit);
  }

  function getUnitProfitRanking() {
    // 同名商品去重，取各批次中单件毛利最高的那个展示
    const map = {};
    getInventory().forEach(p => {
      const up = parseFloat(p.salePrice) - parseFloat(p.costPrice);
      if (!map[p.name] || up > map[p.name].unitProfit) {
        map[p.name] = {
          name:       p.name,
          category:   p.category,
          unitProfit: up,
          margin:     parseFloat(p.costPrice) > 0
                      ? Math.round(up / parseFloat(p.salePrice) * 100) : 0,
          salePrice:  p.salePrice,
          costPrice:  p.costPrice,
        };
      }
    });
    return Object.values(map).sort((a, b) => b.unitProfit - a.unitProfit);
  }

  // ── 临期货品 ─────────────────────────────────────────────────────────────
  function getExpiringProducts(days = 7) {
    const now    = new Date();
    const cutoff = new Date(now.getTime() + days * 86400000);
    return getInventory()
      .filter(p => { if (!p.expireDate) return false; return new Date(p.expireDate) <= cutoff; })
      .sort((a, b) => new Date(a.expireDate) - new Date(b.expireDate));
  }

  // ── 工具 ─────────────────────────────────────────────────────────────────
  function fmtMoney(v) {
    v = parseFloat(v) || 0;
    return v >= 10000 ? '¥' + (v / 10000).toFixed(1) + 'w' : '¥' + v.toFixed(2).replace(/\.00$/, '');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return (d.getMonth() + 1) + '/' + d.getDate();
  }
  function daysUntil(dateStr) {
    if (!dateStr) return null;
    return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  }

  // ── 月度统计 ─────────────────────────────────────────────────────────────
  function getMonthStats(year, month) {
    const h = getHistory();
    let revenue = 0, profit = 0, days = 0;
    Object.keys(h).forEach(k => {
      const d = new Date(k);
      if (d.getFullYear() === year && d.getMonth() === month) {
        revenue += parseFloat(h[k].revenue) || 0;
        profit  += parseFloat(h[k].profit)  || 0;
        if ((parseFloat(h[k].revenue) || 0) > 0) days++;
      }
    });
    return { revenue, profit, days, gm: revenue > 0 ? Math.round(profit / revenue * 100) : 0 };
  }

  function getStreak() {
    const h = getHistory();
    const now = new Date();
    let s = 0;
    for (let i = 0; i < 365; i++) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      const k = d.toLocaleDateString();
      if (h[k] && parseFloat(h[k].revenue) > 0) s++;
      else if (i > 0) break;
    }
    return s;
  }

  return {
    getHistory, setDay, getDay,
    getInventory, addProduct, updateProductQty, deleteProduct,
    getBatchesByName,
    getSales, recordSale,
    getSalesRanking, getSoldProfitRanking, getUnitProfitRanking,
    getExpiringProducts,
    getMonthStats, getStreak,
    fmtMoney, fmtDate, daysUntil,
    KEYS,
  };
})();

// ── 数据迁移 ────────────────────────────────────────────────────────────────
const CURRENT_VERSION = 2;
const VERSION_KEY = 'otter_db_version';

const _migrations = {
  1: function() {
    const inv = JSON.parse(localStorage.getItem('otter_inventory')) || [];
    let changed = false;
    inv.forEach(p => { if (!('barcode' in p)) { p.barcode = null; changed = true; } });
    if (changed) localStorage.setItem('otter_inventory', JSON.stringify(inv));
  },
  // v1→v2：给旧商品补上 batchNo 字段（同名商品按 createdAt 排序后依次编号）
  2: function() {
    const inv = JSON.parse(localStorage.getItem('otter_inventory')) || [];
    const nameMap = {};
    // 按入库时间排序，再按名称分组编号
    inv.sort((a, b) => new Date(a.createdAt||0) - new Date(b.createdAt||0));
    inv.forEach(p => {
      if (!p.batchNo) {
        nameMap[p.name] = (nameMap[p.name] || 0) + 1;
        p.batchNo = nameMap[p.name];
      }
    });
    localStorage.setItem('otter_inventory', JSON.stringify(inv));
  },
};

(function runMigrations() {
  const current = parseInt(localStorage.getItem(VERSION_KEY) || '0');
  if (current >= CURRENT_VERSION) return;
  for (let v = current + 1; v <= CURRENT_VERSION; v++) {
    if (_migrations[v]) { try { _migrations[v](); } catch(e) {} }
  }
  localStorage.setItem(VERSION_KEY, String(CURRENT_VERSION));
})();

window.Engine = Engine;
</script>

<script>
// ── 批次选择弹窗 ────────────────────────────────────────────────────────────
// 全局单例，供收银台调用
const BatchPicker = (function () {
  let _resolve = null;

  function open(productName, onPick) {
    const batches = Engine.getBatchesByName(productName);
    if (!batches.length) { onPick && onPick(null); return; }

    // 只有一个批次，直接返回，无需弹窗
    if (batches.length === 1) { onPick && onPick(batches[0]); return; }

    // 多批次，弹窗让用户选择
    const titleEl = document.getElementById('batch-title');
    const subEl   = document.getElementById('batch-sub');
    const listEl  = document.getElementById('batch-list');

    titleEl.textContent = '选择批次 · ' + productName;
    subEl.textContent   = '共 ' + batches.length + ' 个批次，🟡 为最早入库（先进先出建议优先出货）';

    listEl.innerHTML = batches.map((b, i) => {
      const isFifo = i === 0;
      const inDate = b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—';
      return `
        <div class="batch-item${isFifo ? ' batch-fifo-row' : ''}" data-idx="${i}"
             onclick="BatchPicker._pick(${i})">
          <div class="batch-item-top">
            <span class="batch-item-name">
              批次 ${b.batchNo || (i+1)}
              ${isFifo ? '<span class="batch-fifo-tag">先进先出</span>' : ''}
            </span>
            <span class="batch-item-sale">售 ${Engine.fmtMoney(b.salePrice)}</span>
          </div>
          <div class="batch-item-meta">
            <span>进价 ${Engine.fmtMoney(b.costPrice)}</span>
            <span>剩余 ${b.qty} 件</span>
            <span>入库 ${inDate}</span>
            ${b.expireDate ? '<span>到期 ' + Engine.fmtDate(b.expireDate) + '</span>' : ''}
          </div>
        </div>
      `;
    }).join('');

    _resolve = onPick;
    _currentBatches = batches;
    document.getElementById('batch-overlay').classList.add('open');
  }

  let _currentBatches = [];

  function _pick(idx) {
    document.getElementById('batch-overlay').classList.remove('open');
    if (_resolve) _resolve(_currentBatches[idx]);
    _resolve = null;
  }

  function close() {
    document.getElementById('batch-overlay').classList.remove('open');
    if (_resolve) _resolve(null);
    _resolve = null;
  }

  return { open, _pick, close };
})();

window.BatchPicker = BatchPicker;
function closeBatchSheet() { BatchPicker.close(); }
</script>

<script>
// ── 收银 & 库存录入 ─────────────────────────────────────────────────────────
const BARCODE_API = 'https://retail.nudgenow.xyz';

// ── BarcodeScanner（原样保留）──────────────────────────────────────────────
const BarcodeScanner = (function () {

const BarcodeDB=(function(){let _region=null;async function getRegion(){if(_region)return _region;try{const r=await fetch('https://ipapi.co/json/',{signal:AbortSignal.timeout(4000)});const d=await r.json();_region=[d.region||'',d.city||''].filter(Boolean).join('-')||'未知';}catch{_region='未知';}return _region;}async function query(barcode){const region=await getRegion();const url=`${BARCODE_API}/api/product/${encodeURIComponent(barcode)}?region=${encodeURIComponent(region)}`;const r=await fetch(url,{signal:AbortSignal.timeout(6000)});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}async function report(payload){const region=await getRegion();fetch(`${BARCODE_API}/api/inventory`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload,region}),}).catch(()=>{});}return{query,report,getRegion};})();
window.BarcodeDB=BarcodeDB;

// ── Accounting ──────────────────────────────────────────────────────────────
const Accounting = (function () {

// ════════════════════════════════════════════════════════════════════════════
//  收银台
//  ★ 改动：搜索结果按商品名聚合；点击后若多批次则弹 BatchPicker
// ════════════════════════════════════════════════════════════════════════════
function renderCashier(container) {
  let cart = [];

  container.innerHTML = `
    <div class="page-cashier">
      <div class="page-title-bar">
        <span class="page-title-icon">🛒</span>
        <span class="page-title-text">开始收银</span>
      </div>
      <div class="search-wrap">
        <div class="search-box" style="position:relative;">
          <span class="search-ico">🔍</span>
          <input id="cashier-search" class="search-inp" type="text"
                 placeholder="搜索商品名称…" autocomplete="off"
                 style="padding-right:52px;">
          <button class="scan-trigger-btn" style="position:absolute;right:6px;"
                  title="扫描条形码" onclick="Accounting._cashierScan()">
            <svg viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="2"  y="4" width="2"  height="16" rx=".4"/>
              <rect x="6"  y="4" width="1"  height="16" rx=".4"/>
              <rect x="9"  y="4" width="2"  height="16" rx=".4"/>
              <rect x="13" y="4" width="1"  height="16" rx=".4"/>
              <rect x="16" y="4" width="2"  height="16" rx=".4"/>
              <rect x="20" y="4" width="2"  height="16" rx=".4"/>
            </svg>
          </button>
        </div>
        <div id="cashier-dropdown" class="search-dropdown hidden"></div>
      </div>
      <div class="section-label">已选商品</div>
      <div id="cashier-cart" class="cart-list"></div>
      <div class="cashier-total-bar">
        <div class="ct-left">
          <div class="ct-items" id="ct-items">0 件商品</div>
          <div class="ct-total" id="ct-total">¥0.00</div>
        </div>
        <button class="ct-btn" id="ct-btn" onclick="Accounting._submitSale()" disabled>出售</button>
      </div>
      <div id="cashier-success" class="sale-success hidden">
        <div class="ss-icon">🎉</div>
        <div class="ss-text">出售成功！</div>
        <div class="ss-sub" id="ss-sub"></div>
      </div>
    </div>
  `;

  const inp = container.querySelector('#cashier-search');
  const dd  = container.querySelector('#cashier-dropdown');

  // ── 扫码加入购物车 ──────────────────────────────────────────────────────
  Accounting._cashierScan = () => {
    BarcodeScanner.open((code) => {
      BarcodeScanner.close();
      const inv  = Engine.getInventory().filter(p => parseFloat(p.qty) > 0);
      const prod = inv.find(p => p.barcode === code);
      if (prod) {
        // 扫码命中，再走批次选择
        _pickAndAdd(prod.name);
      } else {
        _showToast('⚠️ 库存中没有条码 ' + code + ' 的商品，请先录入');
      }
    });
  };

  // ── 文字搜索（按商品名聚合，每个名称只显示一行）──────────────────────────
  inp.addEventListener('input', () => {
    const q   = inp.value.trim().toLowerCase();
    const inv = Engine.getInventory().filter(p => parseFloat(p.qty) > 0);
    if (!q) { dd.classList.add('hidden'); return; }

    // 聚合：同名商品合并为一个搜索结果，显示总库存
    const nameMap = {};
    inv.forEach(p => {
      if (!p.name.toLowerCase().includes(q) && !(p.barcode && p.barcode.includes(q))) return;
      if (!nameMap[p.name]) nameMap[p.name] = { name: p.name, totalQty: 0, batches: 0 };
      nameMap[p.name].totalQty += parseFloat(p.qty);
      nameMap[p.name].batches++;
    });
    const results = Object.values(nameMap);

    dd.innerHTML = results.length
      ? results.map(r => `
          <div class="dd-item" data-name="${r.name}">
            <span class="dd-name">${r.name}</span>
            <span class="dd-info">库存${r.totalQty}件${r.batches > 1 ? ' · ' + r.batches + '个批次' : ''}</span>
          </div>`).join('')
      : '<div class="dd-empty">没有找到商品</div>';

    dd.querySelectorAll('.dd-item').forEach(el => {
      el.onclick = () => {
        inp.value = '';
        dd.classList.add('hidden');
        _pickAndAdd(el.dataset.name);
      };
    });
    dd.classList.remove('hidden');
  });

  document.addEventListener('click', e => {
    if (!container.querySelector('.search-wrap').contains(e.target)) dd.classList.add('hidden');
  });

  // ── 核心：批次选择后加入购物车 ─────────────────────────────────────────
  function _pickAndAdd(productName) {
    BatchPicker.open(productName, (batch) => {
      if (!batch) return;  // 用户取消
      addToCart(batch);
    });
  }

  function addToCart(prod) {
    // 同一批次（同 id）累加
    const existing = cart.find(c => c.productId === prod.id);
    if (existing) {
      existing.qty = Math.min(existing.qty + 1, parseFloat(prod.qty));
    } else {
      cart.push({
        productId: prod.id,
        name:      prod.name,
        batchNo:   prod.batchNo,
        qty:       1,
        costPrice: parseFloat(prod.costPrice),
        salePrice: parseFloat(prod.salePrice),
        maxQty:    parseFloat(prod.qty),
      });
    }
    renderCart();
  }

  function renderCart() {
    const el = container.querySelector('#cashier-cart');
    el.innerHTML = cart.length
      ? cart.map((item, i) => `
          <div class="cart-item">
            <div class="ci-info">
              <div class="ci-name">
                ${item.name}
                ${item.batchNo ? '<span style="font-size:11px;color:#999;font-weight:700;margin-left:4px">批次${item.batchNo}</span>' : ''}
              </div>
              <div class="ci-price">${Engine.fmtMoney(item.salePrice)} / 件 · 进价 ${Engine.fmtMoney(item.costPrice)}</div>
            </div>
            <div class="ci-qty-ctrl">
              <button class="qty-btn" onclick="Accounting._cartQty(${i},-1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="Accounting._cartQty(${i},1)">+</button>
            </div>
            <div class="ci-subtotal">${Engine.fmtMoney(item.salePrice * item.qty)}</div>
            <button class="ci-del" onclick="Accounting._cartDel(${i})">✕</button>
          </div>`).join('')
      : '<div class="cart-empty">搜索或扫码添加商品 🛍️</div>';
    updateTotal();
  }

  function updateTotal() {
    const total = cart.reduce((a, c) => a + c.salePrice * c.qty, 0);
    const count = cart.reduce((a, c) => a + c.qty, 0);
    container.querySelector('#ct-items').textContent = count + ' 件商品';
    container.querySelector('#ct-total').textContent = Engine.fmtMoney(total);
    container.querySelector('#ct-btn').disabled = cart.length === 0;
  }

  Accounting._cartQty = (i, d) => {
    cart[i].qty = Math.max(1, Math.min(cart[i].qty + d, cart[i].maxQty));
    renderCart();
  };
  Accounting._cartDel = (i) => { cart.splice(i, 1); renderCart(); };
  Accounting._submitSale = () => {
    if (!cart.length) return;
    const record = Engine.recordSale(cart);
    cart = []; renderCart();
    const su = container.querySelector('#cashier-success');
    container.querySelector('#ss-sub').textContent =
      '共收 ' + Engine.fmtMoney(record.total) + ' · 毛利 ' + Engine.fmtMoney(record.profit);
    su.classList.remove('hidden');
    su.style.animation = 'none';
    requestAnimationFrame(() => { su.style.animation = ''; });
    setTimeout(() => su.classList.add('hidden'), 3000);
    if (window.Dashboard && window.Dashboard.refresh) window.Dashboard.refresh();
  };

  renderCart();
}

// ════════════════════════════════════════════════════════════════════════════
//  库存录入 / 进货（★ 始终新建批次，不再合并）
// ════════════════════════════════════════════════════════════════════════════

        </div>

          <div class="form-group half">

      </button>
      <div class="form-success hidden" id="f-success">✅ ${title}成功！</div>

      <div class="section-label" style="margin-top:24px">${title}历史</div>
      <div id="form-history" class="form-history-list"></div>
    </div>
  `;

  let _currentBarcode = null;

  Accounting._openScanner = () => {
    BarcodeScanner.open(async (code) => {
      BarcodeScanner.close();
      _currentBarcode = code;
      const tagEl = container.querySelector('#f-barcode-tag');
      const valEl = container.querySelector('#f-barcode-val');
      if (tagEl && valEl) { valEl.textContent = code; tagEl.classList.add('show'); }
      try {
        const data = await BarcodeDB.query(code);
        if (data.found) {
          const nameEl = container.querySelector('#f-name');
          const costEl = container.querySelector('#f-cost');
          const saleEl = container.querySelector('#f-sale');
          if (nameEl) { nameEl.value = data.name; nameEl.classList.add('auto-filled'); }
          if (costEl && data.costPrice) { costEl.value = data.costPrice; costEl.classList.add('auto-filled'); }
          if (saleEl && data.salePrice) { saleEl.value = data.salePrice; saleEl.classList.add('auto-filled'); }
          if (data.category) {
            container.querySelectorAll('.cat-chip').forEach(btn => {
              btn.classList.toggle('active', btn.dataset.cat === data.category);
            });
          }
          _showToast('✅ 已自动填入：' + data.name);
          container.querySelector('#f-cost').dispatchEvent(new Event('input'));
        } else {
          _showToast('📝 新商品，请填写商品信息后录入');
        }
      } catch (e) {
        _showToast('⚠️ 查询失败，请手动填写商品信息');
      }
    });
  };

  container.querySelectorAll('.cat-chip').forEach(btn => {
    btn.onclick = () => {
      container.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  ['f-cost', 'f-sale'].forEach(id => {
    container.querySelector('#' + id).addEventListener('input', () => {
      const cost = parseFloat(container.querySelector('#f-cost').value) || 0;
      const sale = parseFloat(container.querySelector('#f-sale').value) || 0;
      const mp   = container.querySelector('#margin-preview');
      if (cost > 0 && sale > 0) {
        const profit = sale - cost;
        const rate   = Math.round(profit / sale * 100);
        mp.style.display = 'flex';
        container.querySelector('#mp-unit').textContent = '单件毛利 ' + Engine.fmtMoney(profit);
        const rateEl = container.querySelector('#mp-rate');
        rateEl.textContent = '毛利率 ' + rate + '%';
        rateEl.style.color = rate >= 20 ? '#4CAF50' : rate >= 0 ? '#FF6B35' : '#F44336';
      } else {
        mp.style.display = 'none';
      }
    });
  });

  Accounting._submitForm = (src) => {
    const name    = container.querySelector('#f-name').value.trim();
    const cost    = parseFloat(container.querySelector('#f-cost').value);
    const sale    = parseFloat(container.querySelector('#f-sale').value);
    const qty     = parseFloat(container.querySelector('#f-qty').value);
    const expDate = container.querySelector('#f-exp').value;
    const cat     = container.querySelector('.cat-chip.active')?.dataset.cat || '其他';

    if (!name)                   return _shake(container.querySelector('#f-name'),  '请填写商品名称');
    if (isNaN(cost) || cost < 0) return _shake(container.querySelector('#f-cost'), '请填写有效进价');
    if (isNaN(sale) || sale < 0) return _shake(container.querySelector('#f-sale'), '请填写有效售价');
    if (isNaN(qty)  || qty  < 1) return _shake(container.querySelector('#f-qty'),  '数量至少为1');

    Engine.addProduct({
      barcode: _currentBarcode || null,
      name, category: cat, qty,
      costPrice: cost, salePrice: sale,
      expireDate: expDate, source: src,
      createdAt: new Date().toISOString(),
    });

    BarcodeDB.report({
      barcode: _currentBarcode,
      name, category: cat, costPrice: cost, salePrice: sale,
      qty, expireDate: expDate,
    });

    ['f-name','f-cost','f-sale','f-qty','f-exp'].forEach(id => {
      container.querySelector('#' + id).value = '';
    });
    container.querySelector('#margin-preview').style.display = 'none';
    const tagEl = container.querySelector('#f-barcode-tag');
    if (tagEl) tagEl.classList.remove('show');
    _currentBarcode = null;

    const su = container.querySelector('#f-success');
    su.classList.remove('hidden');
    setTimeout(() => su.classList.add('hidden'), 2000);

    renderHistory();
    if (window.Dashboard && window.Dashboard.refresh) window.Dashboard.refresh();
  };

  function renderHistory() {
    const el  = container.querySelector('#form-history');
    const inv = Engine.getInventory().filter(p => p.source === source).slice(-10).reverse();
    el.innerHTML = inv.length
      ? inv.map(p => `
          <div class="hist-item">
            <div class="hi-left">
              <div class="hi-name">
                ${p.name}
                ${p.batchNo ? '<span style="font-size:10px;color:#999;margin-left:4px">批次'+p.batchNo+'</span>' : ''}
              </div>
              <div class="hi-meta">${p.category} · 进价${Engine.fmtMoney(p.costPrice)} · 售价${Engine.fmtMoney(p.salePrice)}</div>
            </div>
            <div class="hi-right">
              <div class="hi-qty">×${p.qty}</div>
              ${p.expireDate ? `<div class="hi-exp">到期${Engine.fmtDate(p.expireDate)}</div>` : ''}
            </div>
          </div>`).join('')
      : '<div class="hist-empty">暂无记录</div>';
  }

  renderHistory();
}

function _shake(el, msg) {
  el.style.borderColor = '#F44336'; el.placeholder = msg;
  el.classList.add('shake');
  setTimeout(() => { el.classList.remove('shake'); el.style.borderColor = ''; }, 600);
}

function _showToast(msg) {
  let t = document.getElementById('bco-toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'bco-toast';
    const ts = document.createElement('style');
    ts.textContent = `#bco-toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(0,0,0,.78);color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;font-weight:700;z-index:10000;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;max-width:300px;font-family:'PingFang SC','Helvetica Neue',sans-serif;}#bco-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}`;
    document.head.appendChild(ts); document.body.appendChild(t);
  }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

return { renderCashier, renderEntry, renderRestock };
})();

window.Accounting = Accounting;
</script>

<script>
// ── 看板模块 ────────────────────────────────────────────────────────────────
const Dashboard = (function () {

  let _inventoryContainer = null;

  function renderInventory(container) {
    _inventoryContainer = container;
    _drawInventory(container);
  }

  function _drawInventory(container) {
    const inv = Engine.getInventory();

    container.innerHTML = `
      <div class="page-dashboard">
        <div class="page-title-bar">
          <span class="page-title-icon">📦</span>
          <span class="page-title-text">库存看板</span>
          <span class="inv-total-chip">${inv.length} 条批次</span>
        </div>
        <div class="inv-summary-row">
          <div class="inv-sc">
            <div class="inv-sc-val">${inv.reduce((a,p)=>a+(parseFloat(p.qty)||0),0)}</div>
            <div class="inv-sc-lbl">总库存件数</div>
          </div>
          <div class="inv-sc">
            <div class="inv-sc-val">${Engine.fmtMoney(inv.reduce((a,p)=>a+(parseFloat(p.costPrice)||0)*(parseFloat(p.qty)||0),0))}</div>
            <div class="inv-sc-lbl">库存进价总值</div>
          </div>
          <div class="inv-sc">
            <div class="inv-sc-val">${Engine.fmtMoney(inv.reduce((a,p)=>a+(parseFloat(p.salePrice)||0)*(parseFloat(p.qty)||0),0))}</div>
            <div class="inv-sc-lbl">库存售价总值</div>
          </div>
        </div>
        <div class="inv-search-wrap">
          <span class="search-ico">🔍</span>
          <input id="inv-search" class="search-inp" type="text" placeholder="搜索商品名称…">
        </div>
        ${!inv.length ? '<div class="inv-empty">暂无库存商品<br>请先在「库存录入」或「进货」中添加</div>' : ''}
        <div id="inv-tables"></div>
      </div>
    `;

    let filterQ = '';
    const searchEl = container.querySelector('#inv-search');
    if (searchEl) {
      searchEl.addEventListener('input', () => {
        filterQ = searchEl.value.trim().toLowerCase();
        renderTables();
      });
    }

    function renderTables() {
      const tbContainer = container.querySelector('#inv-tables');
      if (!tbContainer) return;
      const filtered = filterQ
        ? inv.filter(p => p.name.toLowerCase().includes(filterQ))
        : inv;

      if (!filtered.length) {
        tbContainer.innerHTML = '<div class="inv-empty">没有匹配的商品</div>';
        return;
      }

      const grouped = {};
      filtered.forEach(p => {
        const cat = p.category || '其他';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(p);
      });

      tbContainer.innerHTML = Object.keys(grouped).sort().map(cat => {
        const items = grouped[cat];
        // 在同一分类里，同名商品按批次号排序，便于对比
        const sorted = [...items].sort((a, b) =>
          a.name.localeCompare(b.name) || (a.batchNo||0) - (b.batchNo||0)
        );

        const rows = sorted.map((p, idx) => {
          const daysLeft = Engine.daysUntil(p.expireDate);
          const expClass = daysLeft !== null && daysLeft <= 3 ? 'exp-danger'
                         : daysLeft !== null && daysLeft <= 7 ? 'exp-warn' : '';
          const qtyClass = parseFloat(p.qty) === 0 ? 'qty-zero'
                         : parseFloat(p.qty) <= 5  ? 'qty-low' : '';

          // 判断是否是同名商品中最早批次（先进先出标记）
          const sameName = sorted.filter(q => q.name === p.name);
          const isFifo   = sameName.length > 1 && sameName[0].id === p.id;

          return `
            <tr class="${isFifo ? 'batch-fifo-row' : ''}">
              <td class="inv-td td-name">
                ${p.name}
                <span class="batch-tag">批${p.batchNo||1}</span>
                ${isFifo ? '<span style="font-size:10px;color:var(--green);font-weight:800">先出</span>' : ''}
              </td>
              <td class="inv-td td-qty ${qtyClass}">${p.qty}</td>
              <td class="inv-td td-cost">${Engine.fmtMoney(p.costPrice)}</td>
              <td class="inv-td td-sale">${Engine.fmtMoney(p.salePrice)}</td>
              <td class="inv-td td-exp ${expClass}">
                ${p.expireDate
                  ? (daysLeft < 0 ? '<span class="expired-badge">已过期</span>'
                     : daysLeft === 0 ? '<span class="exp-today">今天到期</span>'
                     : Engine.fmtDate(p.expireDate) + ' (' + daysLeft + 'd)')
                  : '—'}
              </td>
              <td class="inv-td td-act">
                <button class="inv-del-btn" onclick="Dashboard._deleteProduct(${p.id})">🗑</button>
              </td>
            </tr>
          `;
        }).join('');

        return `
          <div class="inv-cat-section">
            <div class="inv-cat-header">
              <span class="inv-cat-name">${cat}</span>
              <span class="inv-cat-count">${items.length} 条</span>
            </div>
            <div class="inv-table-wrap">
              <table class="inv-table">
                <thead>
                  <tr>
                    <th class="inv-th">商品名称</th>
                    <th class="inv-th">数量</th>
                    <th class="inv-th">进价</th>
                    <th class="inv-th">售价</th>
                    <th class="inv-th">过期日</th>
                    <th class="inv-th"></th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');
    }

    renderTables();

    Dashboard._deleteProduct = (id) => {
      if (!confirm('确定删除此批次？')) return;
      Engine.deleteProduct(id);
      _drawInventory(container);
    };
  }

  function refresh() {
    if (_inventoryContainer) _drawInventory(_inventoryContainer);
  }

  // 临期货品（原样保留）
  function renderExpiring(container) {
    container.innerHTML = `
      <div class="page-expiring">
        <div class="page-title-bar">
          <span class="page-title-icon">⏰</span>
          <span class="page-title-text">临期货品</span>
        </div>
        <div class="exp-filter-row">
          <button class="exp-filter-btn active" data-days="7">7天内</button>
          <button class="exp-filter-btn" data-days="14">14天内</button>
          <button class="exp-filter-btn" data-days="30">30天内</button>
          <button class="exp-filter-btn" data-days="0">已过期</button>
        </div>
        <div id="exp-content"></div>
      </div>
    `;
    let activeDays = 7;
    container.querySelectorAll('.exp-filter-btn').forEach(btn => {
      btn.onclick = () => {
        container.querySelectorAll('.exp-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeDays = parseInt(btn.dataset.days);
        renderExpContent();
      };
    });
    function renderExpContent() {
      const el = container.querySelector('#exp-content');
      let items;
      if (activeDays === 0) {
        items = Engine.getInventory().filter(p => {
          if (!p.expireDate) return false;
          return Engine.daysUntil(p.expireDate) < 0;
        }).sort((a, b) => new Date(a.expireDate) - new Date(b.expireDate));
      } else {
        items = Engine.getExpiringProducts(activeDays);
      }
      if (!items.length) {
        el.innerHTML = `<div class="exp-empty"><div class="exp-empty-icon">✨</div><div>暂无${activeDays===0?'过期':activeDays+'天内临期'}商品</div></div>`;
        return;
      }
      el.innerHTML = `
        <div class="exp-summary">共 <b>${items.length}</b> 种商品需要关注</div>
        ${items.map(p => {
          const d = Engine.daysUntil(p.expireDate);
          const urgency = d < 0 ? 'exp-card-danger' : d === 0 ? 'exp-card-danger' : d <= 3 ? 'exp-card-warn' : 'exp-card-ok';
          const badge = d < 0 ? `已过期 ${Math.abs(d)} 天` : d === 0 ? '今天到期' : `还剩 ${d} 天`;
          return `<div class="exp-card ${urgency}">
            <div class="exp-card-left">
              <div class="exp-card-name">${p.name}${p.batchNo?'<span style="font-size:11px;color:#999;margin-left:4px">批次'+p.batchNo+'</span>':''}</div>
              <div class="exp-card-meta">${p.category||'其他'} · 库存 ${p.qty} 件</div>
              <div class="exp-card-price">进价 ${Engine.fmtMoney(p.costPrice)} · 售价 ${Engine.fmtMoney(p.salePrice)}</div>
            </div>
            <div class="exp-card-right">
              <div class="exp-badge ${urgency}">${badge}</div>
              <div class="exp-date">${p.expireDate}</div>
            </div>
          </div>`;
        }).join('')}
      `;
    }
    renderExpContent();
  }

  // 排行榜（原样保留）
  function renderSalesRanking(container) {
    const data = Engine.getSalesRanking();
    _renderRanking(container, {
      title:'销量排行', icon:'📊',
      subtitle:'统计开业以来累计售出数量',
      data, valueKey:'totalQty',
      valueFmt: v => v + ' 件',
      subFmt: item => '营收 ' + Engine.fmtMoney(item.totalRevenue),
      emptyMsg:'还没有销售记录，快去收银吧！',
    });
  }

  function renderProfitRanking(container) {
    container.innerHTML = `
      <div class="page-ranking">
        <div class="page-title-bar">
          <span class="page-title-icon">💹</span>
          <span class="page-title-text">毛利排行</span>
        </div>
        <div class="rank-tab-row">
          <button class="rank-tab active" id="rtab-sold" onclick="Dashboard._switchRankTab('sold')">已售毛利榜</button>
          <button class="rank-tab" id="rtab-unit" onclick="Dashboard._switchRankTab('unit')">单品毛利榜</button>
        </div>
        <div id="rank-panel-sold"></div>
        <div id="rank-panel-unit" style="display:none"></div>
      </div>
    `;
    Dashboard._switchRankTab = (tab) => {
      ['sold','unit'].forEach(t => {
        container.querySelector('#rtab-'+t).classList.toggle('active', t===tab);
        container.querySelector('#rank-panel-'+t).style.display = t===tab ? '' : 'none';
      });
    };
    const soldData = Engine.getSoldProfitRanking();
    const maxSold  = soldData.length ? soldData[0].profit : 1;
    container.querySelector('#rank-panel-sold').innerHTML = soldData.length
      ? `<div class="rank-subtitle">售价×售出量 − 进价×售出量，贡献总毛利</div>
         ${soldData.map((item,i)=>_rankCard(item,i,item.profit,maxSold,Engine.fmtMoney(item.profit),`已售 ${item.qty} 件`)).join('')}`
      : '<div class="rank-empty">暂无销售数据</div>';
    const unitData = Engine.getUnitProfitRanking();
    const maxUnit  = unitData.length ? unitData[0].unitProfit : 1;
    container.querySelector('#rank-panel-unit').innerHTML = unitData.length
      ? `<div class="rank-subtitle">所有商品单件毛利（售价 − 进价），不论是否售出</div>
         ${unitData.map((item,i)=>_rankCard(item,i,item.unitProfit,maxUnit,Engine.fmtMoney(item.unitProfit)+'/件',`毛利率 ${item.margin}%`)).join('')}`
      : '<div class="rank-empty">请先录入商品</div>';
  }

  function _renderRanking(container, opts) {
    const { title, icon, subtitle, data, valueFmt, subFmt, emptyMsg } = opts;
    const max = data.length ? data[0][opts.valueKey] : 1;
    container.innerHTML = `
      <div class="page-ranking">
        <div class="page-title-bar">
          <span class="page-title-icon">${icon}</span>
          <span class="page-title-text">${title}</span>
        </div>
        <div class="rank-subtitle">${subtitle}</div>
        ${!data.length ? `<div class="rank-empty">${emptyMsg}</div>`
          : data.map((item,i) => _rankCard(item,i,item[opts.valueKey],max,valueFmt(item[opts.valueKey]),subFmt(item))).join('')}
      </div>
    `;
  }

  function _rankCard(item, i, val, max, valLabel, subLabel) {
    const medals=['🥇','🥈','🥉'];
    const barColors=['#FF6B35','#FF9900','#4CAF50','#2196F3','#9C27B0'];
    const pct = max > 0 ? Math.max(4, Math.round(val/max*100)) : 4;
    const medal = i < 3 ? medals[i] : `<span class="rank-num">${i+1}</span>`;
    return `
      <div class="rank-card ${i < 3 ? 'rank-top-'+(i+1) : ''}">
        <div class="rc-medal">${medal}</div>
        <div class="rc-body">
          <div class="rc-name">${item.name}</div>
          <div class="rc-bar-wrap">
            <div class="rc-bar" style="width:${pct}%;background:${barColors[Math.min(i,4)]}"></div>
          </div>
          <div class="rc-sub">${subLabel}</div>
        </div>
        <div class="rc-val">${valLabel}</div>
      </div>
    `;
  }

  return { renderInventory, renderExpiring, renderSalesRanking, renderProfitRanking, refresh };
})();

window.Dashboard = Dashboard;
</script>

<script>
// ── 主应用逻辑 ───────────────────────────────────────────────────────────────
var now   = new Date();
var YEAR  = now.getFullYear();
var MONTH = now.getMonth();
var TODAY = now.getDate();
var DAYS  = new Date(YEAR, MONTH+1, 0).getDate();
var MN    = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function dateKey(d) { return new Date(YEAR, MONTH, d).toLocaleDateString(); }

var currentTab = 'calendar';

function switchTab(btn, viewId) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn && btn.classList) btn.classList.add('active');
  document.querySelectorAll('.page-view').forEach(v => v.classList.remove('visible'));
  var calView = document.getElementById('view-calendar');
  calView.style.display = 'none';
  if (viewId === 'calendar') {
    calView.style.display = '';
  } else {
    var el = document.getElementById('view-' + viewId);
    if (el) {
      el.classList.add('visible');
      if      (viewId === 'inventory') Dashboard.renderInventory(el);
      else if (viewId === 'expiring')  Dashboard.renderExpiring(el);
      else if (viewId === 'sales')     Dashboard.renderSalesRanking(el);
      else if (viewId === 'profit')    Dashboard.renderProfitRanking(el);
      else if (viewId === 'entry')     Accounting.renderEntry(el);
      else if (viewId === 'restock')   Accounting.renderRestock(el);
      else if (viewId === 'cashier')   Accounting.renderCashier(el);
    }
  }
  currentTab = viewId;
}

function updateHeader() {
  var s = Engine.getMonthStats(YEAR, MONTH);
  document.getElementById('mh-title').textContent = YEAR+'年'+MN[MONTH];
  document.getElementById('mh-sub').textContent   = '本月已记录 '+s.days+' 天';
  document.getElementById('mh-rev').textContent   = Engine.fmtMoney(s.profit);
}

var X_POSITIONS = [50, 68, 80, 68, 50, 32, 20, 32];
var Y_STEP = 100, Y_START = 70;

function getNodeCoords(index, W) {
  var xPct = X_POSITIONS[index % X_POSITIONS.length];
  return { x: W * xPct / 100, y: Y_START + index * Y_STEP };
}

function buildSnake() {
  var track = document.getElementById('snake-track');
  var svg   = document.getElementById('snake-svg');
  var h     = Engine.getHistory();
  var W     = track.offsetWidth || 375;
  var totalNodes = DAYS + 1;
  var trackH = Y_START + totalNodes * Y_STEP + 60;
  track.style.height = trackH + 'px';
  svg.setAttribute('height', trackH);
  svg.setAttribute('viewBox', '0 0 '+W+' '+trackH);
  var coords = [];
  for (var i = 0; i <= DAYS; i++) coords.push(getNodeCoords(i, W));
  var pathD = '';
  for (var i = 0; i < coords.length - 1; i++) {
    var a = coords[i], b = coords[i+1];
    if (i === 0) pathD = 'M '+a.x+' '+a.y;
    var my = (a.y + b.y) / 2;
    pathD += ' Q '+a.x+' '+my+' '+b.x+' '+b.y;
  }
  var pathEl = document.createElementNS('http://www.w3.org/2000/svg','path');
  pathEl.setAttribute('d', pathD);
  pathEl.setAttribute('fill','none');
  pathEl.setAttribute('stroke','#E0E0E0');
  pathEl.setAttribute('stroke-width','8');
  pathEl.setAttribute('stroke-linecap','round');
  svg.appendChild(pathEl);
  for (var day = 1; day <= DAYS; day++) {
    var idx = day - 1;
    var pos = coords[idx];
    var key = dateKey(day);
    var data = h[key] || null;
    var hasSales = data && parseFloat(data.revenue) > 0;
    var isToday  = day === TODAY;
    var isPast   = day < TODAY;
    var isFuture = day > TODAY;
    var node = document.createElement('div');
    node.className = 'day-node';
    node.style.left = pos.x + 'px';
    node.style.top  = pos.y + 'px';
    node.style.animationDelay = (idx * 35) + 'ms';
    if (isToday)       node.classList.add('n-today');
    else if (isFuture) node.classList.add('n-future');
    else if (hasSales) node.classList.add('n-done');
    else               node.classList.add('n-missed');
    if (isToday) {
      var tag = document.createElement('div');
      tag.className = 'today-tag'; tag.textContent = '今天';
      node.appendChild(tag);
    }
    var numEl = document.createElement('div');
    numEl.className = 'nd-num'; numEl.textContent = day;
    node.appendChild(numEl);
    var icoEl = document.createElement('div');
    icoEl.className = 'nd-ico';
    icoEl.textContent = isToday ? '⭐' : hasSales ? '✓' : isPast ? '✗' : '';
    node.appendChild(icoEl);
    (function(d,k,dat,isT,isF,isP,hS){
      node.onclick = function() { openSheet(d,k,dat,isT,isF,isP,hS); };
    })(day,key,data,isToday,isFuture,isPast,hasSales);
    track.appendChild(node);
  }
  var mi = Math.floor(DAYS / 2);
  var mp = coords[mi];
  var mascot = document.createElement('div');
  mascot.className = 'mascot-node';
  var mxo = mp.x > W * 0.5 ? -80 : 80;
  mascot.style.left = (mp.x + mxo) + 'px';
  mascot.style.top  = mp.y + 'px';
  mascot.textContent = '🦦';
  track.appendChild(mascot);
  var cp = coords[DAYS];
  var chest = document.createElement('div');
  chest.className = 'chest-node';
  chest.style.left = cp.x + 'px';
  chest.style.top  = cp.y + 'px';
  chest.innerHTML  = '<div class="ch-icon">'+(TODAY>=DAYS?'🏆':'🔒')+'</div><div class="ch-label">月度总结</div>';
  chest.onclick    = openChest;
  track.appendChild(chest);
}

function openSheet(day, key, data, isToday, isFuture, isPast, hasSales) {
  document.getElementById('sh-date').textContent = (MONTH+1)+'月'+day+'日';
  var metrics = document.getElementById('sh-metrics');
  var btnRow  = document.getElementById('sh-btn-row');
  if (isFuture) {
    document.getElementById('sh-status').textContent = '还没到这天哦 🔒';
    metrics.innerHTML = ''; btnRow.innerHTML = '';
  } else if (!hasSales && !isToday) {
    document.getElementById('sh-status').textContent = '这天没有记录';
    metrics.innerHTML = '<div class="mc"><div class="mc-lbl">营收</div><div class="mc-val">¥0</div></div><div class="mc"><div class="mc-lbl">经营盈余</div><div class="mc-val">—</div></div>';
    btnRow.innerHTML = '';
  } else {
    const currentData = Engine.getDay(key) || data || {};
    var rev  = parseFloat(currentData.revenue)||0;
    var prof = parseFloat(currentData.profit)||0;
    var varC = parseFloat(currentData.variableCost)||(rev-prof);
    var gm   = currentData.grossMargin||(rev>0?Math.round(prof/rev*100):null);
    document.getElementById('sh-status').textContent = isToday ? '今天 · 进行中' : (hasSales ? '已完成 ✓' : '暂无记录');
    metrics.innerHTML =
      `<div class="mc"><div class="mc-lbl">营收</div><div class="mc-val o">${Engine.fmtMoney(rev)}</div></div>` +
      `<div class="mc"><div class="mc-lbl">毛利</div><div class="mc-val ${prof>=0?'g':'r'}">${Engine.fmtMoney(prof)}</div></div>` +
      `<div class="mc"><div class="mc-lbl">变动成本</div><div class="mc-val">${Engine.fmtMoney(varC)}</div></div>` +
      `<div class="mc"><div class="mc-lbl">毛利率</div><div class="mc-val ${gm&&gm>=50?'g':'o'}">${gm?gm+'%':'—'}</div></div>`;
    if (isToday) {
      btnRow.innerHTML =
        '<button class="btn-sh btn-primary" onclick="closeSheet();switchTab(null,\'cashier\')"><span>🛒</span> 开始收银</button>'+
        '<button class="btn-sh btn-stock"   onclick="closeSheet();switchTab(null,\'restock\')"><span>📦</span> 进货</button>';
    } else {
      btnRow.innerHTML = '';
    }
  }
  document.getElementById('overlay').classList.add('open');
}

function overlayTap(e) { if (e.target===document.getElementById('overlay')) closeSheet(); }
function closeSheet()  { document.getElementById('overlay').classList.remove('open'); }

function openChest() {
  var s = Engine.getMonthStats(YEAR, MONTH);
  alert('📊 '+(MONTH+1)+'月月度总结\n\n营业天数：'+s.days+' 天\n本月营收：'+Engine.fmtMoney(s.revenue)+'\n本月毛利：'+Engine.fmtMoney(s.profit)+'\n平均毛利率：'+s.gm+'%');
}

function scrollToToday() {
  setTimeout(function(){
    var node = document.querySelector('.n-today');
    if (node) node.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 600);
}

document.getElementById('view-calendar').style.display = '';
updateHeader();
buildSnake();
scrollToToday();

document.querySelectorAll('.nav-btn').forEach(function(btn) {
  var view = btn.getAttribute('data-view');
  if (!view) return;
  btn.onclick = function() { switchTab(btn, view); };
});
</script>
