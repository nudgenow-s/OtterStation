<script>
// ════════════════════════════════════════════════════════════════════════════
//  Accounting — 收银台 & 库存录入
// ════════════════════════════════════════════════════════════════════════════
const Accounting = (function () {

// ── 收银台 ──────────────────────────────────────────────────────────────────
function renderCashier(container) {
  let cart = [];

  container.innerHTML = `
    <div class="page-cashier">
      <div class="page-title-bar">
        <span class="page-title-icon">🛒</span>
        <span class="page-title-text">${t('cashier.title')}</span>
      </div>
      <div class="search-wrap">
        <div class="search-box" style="position:relative;">
          <span class="search-ico">🔍</span>
          <input id="cashier-search" class="search-inp" type="text"
                 placeholder="${t('cashier.searchPlaceholder')}" autocomplete="off" style="padding-right:52px;">
          <button class="scan-trigger-btn" style="position:absolute;right:6px;"
                  title="${t('cashier.scanTitle')}" onclick="Accounting._cashierScan()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2"  y="4" width="2"  height="16" rx=".4"/>
              <rect x="6"  y="4" width="1"  height="16" rx=".4"/>
              <rect x="9"  y="4" width="2"  height="16" rx=".4"/>
              <rect x="13" y="4" width="1"  height="16" rx=".4"/>
              <rect x="16" y="4" width="2"  height="16" rx=".4"/>
              <rect x="20" y="4" width="2"  height="16" rx=".4"/>
            </svg>
          </button>
        </div>
        <div id="cashier-dropdown" class="search-dropdown hidden"></div>
      </div>
      <div class="section-label">${t('cashier.selectedItems')}</div>
      <div id="cashier-cart" class="cart-list"></div>
      <div class="cashier-total-bar">
        <div class="ct-left">
          <div class="ct-items" id="ct-items">${t('cashier.itemCount', {n: 0})}</div>
          <div class="ct-total" id="ct-total">¥0.00</div>
          <div class="ct-ar-hint hidden" id="ct-ar-hint"></div>
        </div>
        <button class="ct-redeem-btn" id="ct-redeem-btn" disabled onclick="Accounting._openRedeemAll()">🔄 ${t('cashier.redeemAll')}</button>
        <button class="ct-disc-btn" id="ct-disc-btn" disabled onclick="Accounting._openDiscount()">🏷️ ${t('cashier.discount')}</button>
        <button class="ct-btn" id="ct-btn" onclick="Accounting._submitSale()" disabled>${t('cashier.checkout')}</button>
      </div>
      <!-- ★ 应收快捷入口 -->
      <div style="text-align:center;margin-top:-4px;margin-bottom:8px">
        <button onclick="ARSheet.open()" style="background:none;border:none;color:var(--orange);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;padding:4px 0">
          ${t('cashier.arEntry')}
        </button>
      </div>
      <div id="cashier-success" class="sale-success hidden">
        <div class="ss-icon">🎉</div>
        <div class="ss-text">${t('cashier.successTitle')}</div>
        <div class="ss-sub" id="ss-sub"></div>
      </div>
    </div>`;

  const inp = container.querySelector('#cashier-search');
  const dd  = container.querySelector('#cashier-dropdown');

  Accounting._cashierScan = () => {
    BarcodeScanner.open((code) => {
      BarcodeScanner.close();
      const prod = Engine.getInventory().filter(p=>parseFloat(p.qty)>0).find(p=>p.barcode===code);
      if (prod) { _pickAndAdd(prod.name); }
      else { _showToast(t('cashier.noBarcodeProduct', {code: code})); }
    });
  };

  // ★ 优惠按钮入口
  Accounting._openDiscount = () => {
    if (!cart.length) return;
    DiscountSheet.open(cart, (newCart) => { cart=newCart; renderCart(); });
  };

  // ★ 整单换购入口
  Accounting._openRedeemAll = () => {
    if (!cart.length) return;
    RedemptionSheet.openAll(cart, (newCart) => { cart = newCart; renderCart(); });
  };

  inp.addEventListener('input', () => {
    const q   = inp.value.trim().toLowerCase();
    const inv = Engine.getInventory().filter(p=>parseFloat(p.qty)>0);
    if (!q) { dd.classList.add('hidden'); return; }
    const nameMap={};
    inv.forEach(p=>{
      if (!p.name.toLowerCase().includes(q)&&!(p.barcode&&p.barcode.includes(q))) return;
      if (!nameMap[p.name]) nameMap[p.name]={name:p.name,totalQty:0,batches:0};
      nameMap[p.name].totalQty+=parseFloat(p.qty);
      nameMap[p.name].batches++;
    });
    const results=Object.values(nameMap);
    dd.innerHTML=results.length
      ?results.map(r=>`<div class="dd-item" data-name="${r.name}"><span class="dd-name">${r.name}</span><span class="dd-info">${t('cashier.stockCount',{n:r.totalQty})}${r.batches>1?' · '+t('cashier.batchCount',{n:r.batches}):''}</span></div>`).join('')
      :`<div class="dd-empty">${t('cashier.noProductFound')}</div>`;
    dd.querySelectorAll('.dd-item').forEach(el=>{
      el.onclick=()=>{inp.value='';dd.classList.add('hidden');_pickAndAdd(el.dataset.name);};
    });
    dd.classList.remove('hidden');
  });

  document.addEventListener('click', e=>{
    if (!container.querySelector('.search-wrap').contains(e.target)) dd.classList.add('hidden');
  });

  function _pickAndAdd(productName) {
    BatchPicker.open(productName, (batch)=>{ if(batch) addToCart(batch); });
  }

  function addToCart(prod) {
    const existing=cart.find(c=>c.productId===prod.id);
    if (existing) { existing.qty=Math.min(existing.qty+1,parseFloat(prod.qty)); }
    else {
      cart.push({ productId:prod.id, name:prod.name, batchNo:prod.batchNo, qty:1,
        costPrice:parseFloat(prod.costPrice), salePrice:parseFloat(prod.salePrice),
        maxQty:parseFloat(prod.qty) });
    }
    renderCart();
  }

  function renderCart() {
    const el=container.querySelector('#cashier-cart');
    el.innerHTML=cart.length
      ?cart.map((item,i)=>{
        const origPrice = item.origSalePrice || item.salePrice;
        const displayPrice = item.origSalePrice && item.origSalePrice !== item.salePrice
          ? `<span style="text-decoration:line-through;color:#CCC;margin-right:3px">${Engine.fmtMoney(item.origSalePrice)}</span><span style="color:var(--red)">${Engine.fmtMoney(item.salePrice)}</span>`
          : Engine.fmtMoney(item.salePrice);
        const redeemChip = item.isRedemption
          ? `<button class="ci-redeem-chip active" onclick="Accounting._clearRedeem(${i})">
               ${t('cashier.redeemChipActive',{val:Engine.fmtMoney(item.redemptionPrice)})} <span style="font-size:10px;opacity:.7">✕</span>
             </button>`
          : `<button class="ci-redeem-chip" onclick="Accounting._openRedeemSingle(${i})">${t('cashier.redeemChip')}</button>`;
        return `
        <div class="cart-item">
          <div class="ci-info">
            <div class="ci-name">${item.name}${item.batchNo?'<span style="font-size:11px;color:#999;font-weight:700;margin-left:4px">'+t('common.batchN',{n:item.batchNo})+'</span>':''}</div>
            <div class="ci-price">${displayPrice}/${t('common.stockUnit')} · ${t('common.costPriceLabel')} ${Engine.fmtMoney(item.costPrice)}</div>
            ${redeemChip}
          </div>
          <div class="ci-qty-ctrl">
            <button class="qty-btn" onclick="Accounting._cartQty(${i},-1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="Accounting._cartQty(${i},1)">+</button>
          </div>
          <div class="ci-subtotal">${Engine.fmtMoney(origPrice*item.qty)}</div>
          <button class="ci-del" onclick="Accounting._cartDel(${i})">✕</button>
        </div>`;
      }).join('')
      :`<div class="cart-empty">${t('cashier.cartEmpty')}</div>`;
    _updateTotal();
  }

  function _updateTotal() {
    // 实收 = 换购商品按换购价，普通商品按售价
    const cashTotal = cart.reduce((a,c) => {
      const p = c.isRedemption ? parseFloat(c.redemptionPrice||0) : (c.origSalePrice||c.salePrice);
      return a + p * c.qty;
    }, 0);
    // ★ 应收 = 换购商品的进价合计（供应商补偿进货成本）
    const arTotal = cart.reduce((a,c) => {
      if (!c.isRedemption) return a;
      return a + parseFloat(c.costPrice) * c.qty;
    }, 0);
    const count = cart.reduce((a,c)=>a+c.qty,0);
    const hasRedeem = cart.some(c=>c.isRedemption);

    container.querySelector('#ct-items').textContent = t('cashier.itemCount', {n: count});
    container.querySelector('#ct-total').textContent = Engine.fmtMoney(cashTotal);
    const arHint = container.querySelector('#ct-ar-hint');
    if (arHint) {
      if (hasRedeem && arTotal > 0) {
        arHint.textContent = t('cashier.arHint', {val: Engine.fmtMoney(arTotal)});
        arHint.classList.remove('hidden');
      } else {
        arHint.classList.add('hidden');
      }
    }
    const empty = cart.length === 0;
    container.querySelector('#ct-btn').disabled        = empty;
    container.querySelector('#ct-disc-btn').disabled   = empty;
    container.querySelector('#ct-redeem-btn').disabled = empty;
  }

  // ★ 单品换购 / 取消换购
  Accounting._openRedeemSingle = (i) => {
    RedemptionSheet.openSingle(cart, i, (newCart) => { cart = newCart; renderCart(); });
  };
  Accounting._clearRedeem = (i) => {
    RedemptionSheet.clearItem(cart, i, () => renderCart());
  };

  Accounting._cartQty=(i,d)=>{cart[i].qty=Math.max(1,Math.min(cart[i].qty+d,cart[i].maxQty));renderCart();};
  Accounting._cartDel=(i)=>{cart.splice(i,1);renderCart();};
  Accounting._submitSale=()=>{
    if(!cart.length)return;
    const record=Engine.recordSale(cart);
    cart=[];renderCart();
    const su=container.querySelector('#cashier-success');
    const subText = record.arTotal>0
      ? t('cashier.successSubAr', {cash: Engine.fmtMoney(record.cashCollected), profit: Engine.fmtMoney(record.profit), ar: Engine.fmtMoney(record.arTotal)})
      : t('cashier.successSub',   {cash: Engine.fmtMoney(record.cashCollected), profit: Engine.fmtMoney(record.profit)});
    container.querySelector('#ss-sub').textContent=subText;
    su.classList.remove('hidden');su.style.animation='none';
    requestAnimationFrame(()=>{su.style.animation='';});
    setTimeout(()=>su.classList.add('hidden'),3000);
    if(window.Dashboard&&window.Dashboard.refresh)window.Dashboard.refresh();
  };

  renderCart();
}

// ── 库存录入 / 进货 ─────────────────────────────────────────────────────────
function renderEntry(container)   { _renderForm(container,'entry'); }
function renderRestock(container) { _renderForm(container,'restock'); }

const CAT_KEYS = ['foodDrink','daily','snacks','frozen','alcohol','tobacco','other'];

function _renderForm(container, source) {
  const icon     = source==='entry' ? '➕' : '📦';
  const title    = source==='entry' ? t('entry.title')    : t('restock.title');
  const subtitle = source==='entry' ? t('entry.subtitle')  : t('restock.subtitle');
  const submitLabel  = source==='entry' ? t('form.submitEntry')  : t('form.submitRestock');
  const successLabel = source==='entry' ? t('form.successEntry') : t('form.successRestock');

  container.innerHTML = `
    <div class="page-form">
      <div class="page-title-bar"><span class="page-title-icon">${icon}</span><span class="page-title-text">${title}</span></div>
      <div class="form-subtitle">${subtitle}</div>
      <div class="form-card">
        <div class="form-group">
          <label class="form-lbl">${t('form.productName')}</label>
          <div class="f-name-wrap">
            <input id="f-name" class="form-inp" type="text" placeholder="${t('form.productNamePlaceholder')}" autocomplete="off">
            <button class="scan-trigger-btn" title="${t('scanner.title')}" onclick="Accounting._openScanner()">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2"  y="4" width="2"  height="16" rx=".4"/><rect x="6"  y="4" width="1"  height="16" rx=".4"/>
                <rect x="9"  y="4" width="2"  height="16" rx=".4"/><rect x="13" y="4" width="1"  height="16" rx=".4"/>
                <rect x="16" y="4" width="2"  height="16" rx=".4"/><rect x="20" y="4" width="2"  height="16" rx=".4"/>
              </svg>
            </button>
          </div>
          <div class="f-barcode-tag" id="f-barcode-tag">${t('form.barcodeLabel',{code:''})}<span id="f-barcode-val"></span></div>
        </div>
        <div class="form-group">
          <label class="form-lbl">${t('form.category')}</label>
          <div class="cat-chips" id="cat-chips">
            ${CAT_KEYS.map((c,i)=>`<button class="cat-chip${i===0?' active':''}" data-cat="${c}">${catLabel(c)}</button>`).join('')}
          </div>
        </div>
        <div class="form-row">
          <div class="form-group half"><label class="form-lbl">${t('form.costPrice')}</label><input id="f-cost" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00"></div>
          <div class="form-group half"><label class="form-lbl">${t('form.salePrice')}</label><input id="f-sale" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00"></div>
        </div>
        <div class="form-row">
          <div class="form-group half"><label class="form-lbl">${t('form.qty')}</label><input id="f-qty" class="form-inp" type="number" min="1" step="1" placeholder="0"></div>
          <div class="form-group half"><label class="form-lbl">${t('form.expireDate')}</label><input id="f-exp" class="form-inp" type="date"></div>
        </div>
        <div class="margin-preview" id="margin-preview" style="display:none">
          <span class="mp-label">${t('form.marginPreview')}</span>
          <span class="mp-unit" id="mp-unit">${t('form.unitMargin',{val:'¥—'})}</span>
          <span class="mp-rate" id="mp-rate">${t('form.marginRate',{val:'—'})}</span>
        </div>
      </div>
      <button class="form-submit" onclick="Accounting._submitForm('${source}')"><span>${icon}</span> ${submitLabel}</button>
      <div class="form-success hidden" id="f-success">${successLabel}</div>
      <div class="section-label" style="margin-top:24px">${t('form.history',{title:title})}</div>
      <div id="form-history" class="form-history-list"></div>
    </div>`;

  let _currentBarcode = null;

  Accounting._openScanner = () => {
    BarcodeScanner.open(async (code) => {
      BarcodeScanner.close();
      _currentBarcode=code;
      const tg=container.querySelector('#f-barcode-tag'),vl=container.querySelector('#f-barcode-val');
      if(tg&&vl){vl.textContent=code;tg.classList.add('show');}
      try {
        const data=await BarcodeDB.query(code);
        if(data.found){
          const ne=container.querySelector('#f-name'),ce=container.querySelector('#f-cost'),se=container.querySelector('#f-sale');
          if(ne){ne.value=data.name;ne.classList.add('auto-filled');}
          if(ce&&data.costPrice){ce.value=data.costPrice;ce.classList.add('auto-filled');}
          if(se&&data.salePrice){se.value=data.salePrice;se.classList.add('auto-filled');}
          if(data.category)container.querySelectorAll('.cat-chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===data.category));
          _showToast(t('form.autoFilled',{name:data.name}));
          container.querySelector('#f-cost').dispatchEvent(new Event('input'));
        } else { _showToast(t('form.newProduct')); }
      } catch(e) { _showToast(t('form.queryFailed')); }
    });
  };

  container.querySelectorAll('.cat-chip').forEach(btn=>{
    btn.onclick=()=>{container.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
  });

  ['f-cost','f-sale'].forEach(id=>{
    container.querySelector('#'+id).addEventListener('input',()=>{
      const c=parseFloat(container.querySelector('#f-cost').value)||0;
      const s=parseFloat(container.querySelector('#f-sale').value)||0;
      const mp=container.querySelector('#margin-preview');
      if(c>0&&s>0){const p=s-c,r=Math.round(p/s*100);mp.style.display='flex';
        container.querySelector('#mp-unit').textContent=t('form.unitMargin',{val:Engine.fmtMoney(p)});
        const re=container.querySelector('#mp-rate');re.textContent=t('form.marginRate',{val:r});
        re.style.color=r>=20?'#4CAF50':r>=0?'#FF6B35':'#F44336';}
      else mp.style.display='none';
    });
  });

  Accounting._submitForm = (src) => {
    const name   =container.querySelector('#f-name').value.trim();
    const cost   =parseFloat(container.querySelector('#f-cost').value);
    const sale   =parseFloat(container.querySelector('#f-sale').value);
    const qty    =parseFloat(container.querySelector('#f-qty').value);
    const expDate=container.querySelector('#f-exp').value;
    const cat    =container.querySelector('.cat-chip.active')?.dataset.cat||'other';
    if(!name)                  return _shake(container.querySelector('#f-name'), t('form.errorName'));
    if(isNaN(cost)||cost<0)    return _shake(container.querySelector('#f-cost'), t('form.errorCost'));
    if(isNaN(sale)||sale<0)    return _shake(container.querySelector('#f-sale'), t('form.errorSale'));
    if(isNaN(qty)||qty<1)      return _shake(container.querySelector('#f-qty'),  t('form.errorQty'));
    Engine.addProduct({barcode:_currentBarcode||null,name,category:cat,qty,costPrice:cost,salePrice:sale,expireDate:expDate,source:src,createdAt:new Date().toISOString()});
    BarcodeDB.report({barcode:_currentBarcode,name,category:cat,costPrice:cost,salePrice:sale,qty,expireDate:expDate});
    ['f-name','f-cost','f-sale','f-qty','f-exp'].forEach(id=>container.querySelector('#'+id).value='');
    container.querySelector('#margin-preview').style.display='none';
    const tg=container.querySelector('#f-barcode-tag');if(tg)tg.classList.remove('show');_currentBarcode=null;
    const su=container.querySelector('#f-success');su.classList.remove('hidden');setTimeout(()=>su.classList.add('hidden'),2000);
    renderHistory();
    if(window.Dashboard&&window.Dashboard.refresh)window.Dashboard.refresh();
  };

  function renderHistory() {
    const el=container.querySelector('#form-history');
    const inv=Engine.getInventory().filter(p=>p.source===source).slice(-10).reverse();
    el.innerHTML=inv.length
      ?inv.map(p=>`<div class="hist-item">
          <div class="hi-left">
            <div class="hi-name">${p.name}${p.batchNo?'<span style="font-size:10px;color:#999;margin-left:4px">'+t('common.batchN',{n:p.batchNo})+'</span>':''}</div>
            <div class="hi-meta">${catLabel(p.category)} · ${t('common.costPriceLabel')}${Engine.fmtMoney(p.costPrice)} · ${t('inventory.colSale')}${Engine.fmtMoney(p.salePrice)}</div>
          </div>
          <div class="hi-right">
            <div class="hi-qty">×${p.qty}</div>
            ${p.expireDate?`<div class="hi-exp">${t('inventory.colExpire')}${Engine.fmtDate(p.expireDate)}</div>`:''}
          </div>
        </div>`).join('')
      :'<div class="hist-empty">'+t('form.historyEmpty')+'</div>';
  }
  renderHistory();
}

function _shake(el,msg){el.style.borderColor='#F44336';el.placeholder=msg;el.classList.add('shake');setTimeout(()=>{el.classList.remove('shake');el.style.borderColor='';},600);}

function _showToast(msg){
  let toastEl=document.getElementById('bco-toast');
  if(!toastEl){toastEl=document.createElement('div');toastEl.id='bco-toast';document.body.appendChild(toastEl);}
  toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastEl._timer);toastEl._timer=setTimeout(()=>toastEl.classList.remove('show'),2800);
}

return { renderCashier, renderEntry, renderRestock };
})();
window.Accounting=Accounting;
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  Dashboard — 库存看板、临期货品、排行榜
// ════════════════════════════════════════════════════════════════════════════
const Dashboard = (function () {
  let _inventoryContainer = null;

  function renderInventory(container) { _inventoryContainer=container; _drawInventory(container); }

  function _drawInventory(container) {
    const inv = Engine.getInventory();
    container.innerHTML = `
      <div class="page-dashboard">
        <div class="page-title-bar">
          <span class="page-title-icon">📦</span>
          <span class="page-title-text">${t('inventory.title')}</span>
          <span class="inv-total-chip">${t('inventory.batchChip',{n:inv.length})}</span>
        </div>
        <div class="inv-summary-row">
          <div class="inv-sc"><div class="inv-sc-val">${inv.reduce((a,p)=>a+(parseFloat(p.qty)||0),0)}</div><div class="inv-sc-lbl">${t('inventory.totalQty')}</div></div>
          <div class="inv-sc"><div class="inv-sc-val">${Engine.fmtMoney(inv.reduce((a,p)=>a+(parseFloat(p.costPrice)||0)*(parseFloat(p.qty)||0),0))}</div><div class="inv-sc-lbl">${t('inventory.totalCostValue')}</div></div>
          <div class="inv-sc"><div class="inv-sc-val">${Engine.fmtMoney(inv.reduce((a,p)=>a+(parseFloat(p.salePrice)||0)*(parseFloat(p.qty)||0),0))}</div><div class="inv-sc-lbl">${t('inventory.totalSaleValue')}</div></div>
        </div>
        <div class="inv-search-wrap"><span class="search-ico">🔍</span><input id="inv-search" class="search-inp" type="text" placeholder="${t('inventory.searchPlaceholder')}"></div>
        ${!inv.length?'<div class="inv-empty">'+t('inventory.emptyAll')+'</div>':''}
        <div id="inv-tables"></div>
      </div>`;

    let filterQ='';
    const searchEl=container.querySelector('#inv-search');
    if(searchEl){searchEl.addEventListener('input',()=>{filterQ=searchEl.value.trim().toLowerCase();renderTables();});}

    function renderTables() {
      const tbContainer=container.querySelector('#inv-tables');if(!tbContainer)return;
      const filtered=filterQ?inv.filter(p=>p.name.toLowerCase().includes(filterQ)):inv;
      if(!filtered.length){tbContainer.innerHTML='<div class="inv-empty">'+t('inventory.emptyFiltered')+'</div>';return;}
      const grouped={};
      filtered.forEach(p=>{const cat=p.category||'other';if(!grouped[cat])grouped[cat]=[];grouped[cat].push(p);});
      tbContainer.innerHTML=Object.keys(grouped).sort((a,b)=>catLabel(a).localeCompare(catLabel(b))).map(cat=>{
        const items=grouped[cat];
        const sorted=[...items].sort((a,b)=>a.name.localeCompare(b.name)||(a.batchNo||0)-(b.batchNo||0));
        const nameCount={};sorted.forEach(p=>{nameCount[p.name]=(nameCount[p.name]||0)+1;});
        const nameFirst={};
        const fifoIds=new Set();
        sorted.forEach(p=>{if(!nameFirst[p.name]){nameFirst[p.name]=p.id;fifoIds.add(p.id);}});

        const rows=sorted.map(p=>{
          const dl=Engine.daysUntil(p.expireDate);
          const ec=dl!==null&&dl<=3?'exp-danger':dl!==null&&dl<=7?'exp-warn':'';
          const qc=parseFloat(p.qty)===0?'qty-zero':parseFloat(p.qty)<=5?'qty-low':'';
          const showFifo=nameCount[p.name]>1&&fifoIds.has(p.id);
          return `<tr${showFifo?' class="batch-fifo-row"':''}>
            <td class="inv-td td-name">
              ${p.name}<span class="batch-tag">${t('common.batchN',{n:p.batchNo||1})}</span>
              ${showFifo?'<span style="font-size:10px;color:var(--green);font-weight:800;margin-left:2px">'+t('inventory.fifoTag')+'</span>':''}
            </td>
            <td class="inv-td td-qty ${qc}">${p.qty}</td>
            <td class="inv-td td-cost">${Engine.fmtMoney(p.costPrice)}</td>
            <td class="inv-td td-sale">${Engine.fmtMoney(p.salePrice)}</td>
            <td class="inv-td td-exp ${ec}">
              ${p.expireDate?(dl<0?'<span class="expired-badge">'+t('inventory.expired')+'</span>':dl===0?'<span class="exp-today">'+t('inventory.expireToday')+'</span>':Engine.fmtDate(p.expireDate)+'('+dl+'d)'):'—'}
            </td>
            <td class="inv-td td-act"><button class="inv-del-btn" onclick="Dashboard._deleteProduct(${p.id})">🗑</button></td>
          </tr>`;
        }).join('');

        return `<div class="inv-cat-section">
          <div class="inv-cat-header"><span class="inv-cat-name">${catLabel(cat)}</span><span class="inv-cat-count">${t('inventory.batchCountChip',{n:items.length})}</span></div>
          <div class="inv-table-wrap"><table class="inv-table">
            <thead><tr><th class="inv-th">${t('inventory.colName')}</th><th class="inv-th">${t('inventory.colQty')}</th><th class="inv-th">${t('inventory.colCost')}</th><th class="inv-th">${t('inventory.colSale')}</th><th class="inv-th">${t('inventory.colExpire')}</th><th class="inv-th"></th></tr></thead>
            <tbody>${rows}</tbody>
          </table></div>
        </div>`;
      }).join('');
    }
    renderTables();
    Dashboard._deleteProduct=(id)=>{if(!confirm(t('inventory.confirmDeleteBatch')))return;Engine.deleteProduct(id);_drawInventory(container);};
  }

  function refresh() { if(_inventoryContainer) _drawInventory(_inventoryContainer); }

  function renderExpiring(container) {
    container.innerHTML = `
      <div class="page-expiring">
        <div class="page-title-bar"><span class="page-title-icon">⏰</span><span class="page-title-text">${t('expiring.title')}</span></div>
        <div class="exp-filter-row">
          <button class="exp-filter-btn active" data-days="7">${t('expiring.filter7')}</button>
          <button class="exp-filter-btn" data-days="14">${t('expiring.filter14')}</button>
          <button class="exp-filter-btn" data-days="30">${t('expiring.filter30')}</button>
          <button class="exp-filter-btn" data-days="0">${t('expiring.filterExpired')}</button>
        </div>
        <div id="exp-content"></div>
      </div>`;
    let activeDays=7;
    container.querySelectorAll('.exp-filter-btn').forEach(btn=>{
      btn.onclick=()=>{container.querySelectorAll('.exp-filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeDays=parseInt(btn.dataset.days);renderExpContent();};
    });
    function renderExpContent() {
      const el=container.querySelector('#exp-content');
      const items=activeDays===0
        ?Engine.getInventory().filter(p=>p.expireDate&&Engine.daysUntil(p.expireDate)<0).sort((a,b)=>new Date(a.expireDate)-new Date(b.expireDate))
        :Engine.getExpiringProducts(activeDays);
      if(!items.length){
        const emptyMsg = activeDays===0 ? t('expiring.emptyExpired') : t('expiring.emptyDays',{days:activeDays});
        el.innerHTML=`<div class="exp-empty"><div class="exp-empty-icon">✨</div><div>${emptyMsg}</div></div>`;return;
      }

      // ★ 用全局 id 索引传参，避免 JSON 序列化遇到特殊字符时崩溃
      window._expProds = {};
      items.forEach(p => { window._expProds[p.id] = p; });

      el.innerHTML=`<div class="exp-summary">${t('expiring.summary',{n:items.length})}</div>`
        +items.map(p=>{
          const d=Engine.daysUntil(p.expireDate);
          const u=d<0?'exp-card-danger':d===0?'exp-card-danger':d<=3?'exp-card-warn':'exp-card-ok';
          const badge=d<0?t('expiring.expiredDays',{n:Math.abs(d)}):d===0?t('expiring.dueToday'):t('expiring.remainDays',{n:d});
          return `<div class="exp-card ${u}">
            <div class="exp-card-left">
              <div class="exp-card-name">${p.name}${p.batchNo?'<span style="font-size:11px;color:#999;margin-left:4px">'+t('common.batchN',{n:p.batchNo})+'</span>':''}</div>
              <div class="exp-card-meta">${catLabel(p.category)} · ${t('inventory.currentStock',{n:p.qty})}</div>
              <div class="exp-card-price">${t('common.costPriceLabel')} ${Engine.fmtMoney(p.costPrice)} · ${t('inventory.colSale')} ${Engine.fmtMoney(p.salePrice)}</div>
              <button class="exp-loss-btn" onclick="LossSheet.open(window._expProds[${p.id}])">${t('expiring.recordLoss')}</button>
            </div>
            <div class="exp-card-right"><div class="exp-badge ${u}">${badge}</div><div class="exp-date">${p.expireDate}</div></div>
          </div>`;
        }).join('');
    }
    renderExpContent();
  }

  function renderSalesRanking(container) {
    const data=Engine.getSalesRanking();
    _renderRanking(container,{title:t('ranking.sales.title'),icon:'📊',subtitle:t('ranking.sales.subtitle'),
      data,valueKey:'totalQty',valueFmt:v=>t('cashier.itemCount',{n:v}),subFmt:item=>t('ranking.revenueLabel',{val:Engine.fmtMoney(item.totalRevenue)}),emptyMsg:t('ranking.sales.empty')});
  }

  function renderProfitRanking(container) {
    container.innerHTML=`<div class="page-ranking">
      <div class="page-title-bar"><span class="page-title-icon">💹</span><span class="page-title-text">${t('ranking.profit.title')}</span></div>
      <div class="rank-tab-row">
        <button class="rank-tab active" id="rtab-sold" onclick="Dashboard._switchRankTab('sold')">${t('ranking.profit.soldTab')}</button>
        <button class="rank-tab" id="rtab-unit" onclick="Dashboard._switchRankTab('unit')">${t('ranking.profit.unitTab')}</button>
      </div>
      <div id="rank-panel-sold"></div><div id="rank-panel-unit" style="display:none"></div>
    </div>`;
    Dashboard._switchRankTab=(tab)=>{['sold','unit'].forEach(tabName=>{container.querySelector('#rtab-'+tabName).classList.toggle('active',tabName===tab);container.querySelector('#rank-panel-'+tabName).style.display=tabName===tab?'':'none';});};
    const sd=Engine.getSoldProfitRanking(),ms=sd.length?sd[0].profit:1;
    container.querySelector('#rank-panel-sold').innerHTML=sd.length
      ?`<div class="rank-subtitle">${t('ranking.profit.soldSubtitle')}</div>${sd.map((it,i)=>_rankCard(it,i,it.profit,ms,Engine.fmtMoney(it.profit),t('ranking.soldCount',{n:it.qty}))).join('')}`
      :`<div class="rank-empty">${t('ranking.profit.emptySold')}</div>`;
    const ud=Engine.getUnitProfitRanking(),mu=ud.length?ud[0].unitProfit:1;
    container.querySelector('#rank-panel-unit').innerHTML=ud.length
      ?`<div class="rank-subtitle">${t('ranking.profit.unitSubtitle')}</div>${ud.map((it,i)=>_rankCard(it,i,it.unitProfit,mu,Engine.fmtMoney(it.unitProfit)+'/'+t('common.stockUnit'),t('ranking.marginRate',{n:it.margin}))).join('')}`
      :`<div class="rank-empty">${t('ranking.profit.emptyUnit')}</div>`;
  }

  function _renderRanking(container,opts) {
    const{title,icon,subtitle,data,valueFmt,subFmt,emptyMsg}=opts;
    const max=data.length?data[0][opts.valueKey]:1;
    container.innerHTML=`<div class="page-ranking">
      <div class="page-title-bar"><span class="page-title-icon">${icon}</span><span class="page-title-text">${title}</span></div>
      <div class="rank-subtitle">${subtitle}</div>
      ${!data.length?`<div class="rank-empty">${emptyMsg}</div>`:data.map((it,i)=>_rankCard(it,i,it[opts.valueKey],max,valueFmt(it[opts.valueKey]),subFmt(it))).join('')}
    </div>`;
  }

  function _rankCard(item,i,val,max,vl,sl) {
    const medals=['🥇','🥈','🥉'],bc=['#FF6B35','#FF9900','#4CAF50','#2196F3','#9C27B0'];
    const pct=max>0?Math.max(4,Math.round(val/max*100)):4;
    const medal=i<3?medals[i]:'<span class="rank-num">'+(i+1)+'</span>';
    return `<div class="rank-card ${i<3?'rank-top-'+(i+1):''}">
      <div class="rc-medal">${medal}</div>
      <div class="rc-body">
        <div class="rc-name">${item.name}</div>
        <div class="rc-bar-wrap"><div class="rc-bar" style="width:${pct}%;background:${bc[Math.min(i,4)]}"></div></div>
        <div class="rc-sub">${sl}</div>
      </div>
      <div class="rc-val">${vl}</div>
    </div>`;
  }

  return { renderInventory, renderExpiring, renderSalesRanking, renderProfitRanking, refresh };
})();
window.Dashboard = Dashboard;
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  主应用逻辑
// ════════════════════════════════════════════════════════════════════════════
var now   = new Date();
var YEAR  = now.getFullYear();
var MONTH = now.getMonth();
var TODAY = now.getDate();
var DAYS  = new Date(YEAR, MONTH+1, 0).getDate();

// ★ 全局：记录当前打开的日历弹窗的日期，供 ReceiptViewer 和 RetroSheet 使用
var _currentSheetKey = '';
var _currentSheetDay = 0;

function dateKey(d) { return new Date(YEAR, MONTH, d).toLocaleDateString(); }

var _currentView = 'calendar'; // ★ 供 i18n 语言切换后重渲染当前视图使用

function switchTab(btn, viewId) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn && btn.classList) btn.classList.add('active');
  document.querySelectorAll('.page-view').forEach(v => v.classList.remove('visible'));
  var calView = document.getElementById('view-calendar');
  calView.style.display = 'none';
  _currentView = viewId;
  if (viewId === 'calendar') {
    calView.style.display = '';
  } else {
    var el = document.getElementById('view-' + viewId);
    if (el) {
      el.classList.add('visible');
      if      (viewId === 'inventory') Dashboard.renderInventory(el);
      else if (viewId === 'expiring')  Dashboard.renderExpiring(el);
      else if (viewId === 'sales')     Dashboard.renderSalesRanking(el);
      else if (viewId === 'profit')    Dashboard.renderProfitRanking(el);
      else if (viewId === 'entry')     Accounting.renderEntry(el);
      else if (viewId === 'restock')   Accounting.renderRestock(el);
      else if (viewId === 'cashier')   Accounting.renderCashier(el);
    }
  }
}

// ★ 语言切换后：静态 data-i18n 文案已由 I18N.switchLang 自动刷新，
//   这里补充刷新日历（月份名/头部）和当前动态渲染的 tab（收银台/库存/临期等）
window.addEventListener('i18n:change', function () {
  updateHeader();
  refreshSnake();
  if (_currentView !== 'calendar') {
    var activeBtn = document.querySelector('.nav-btn[data-view="' + _currentView + '"]');
    switchTab(activeBtn || null, _currentView);
  }
});

function updateHeader() {
  var s = Engine.getMonthStats(YEAR, MONTH);
  document.getElementById('mh-title').textContent = YEAR + tYearSuffix() + tMonth(MONTH);
  document.getElementById('mh-sub').textContent   = t('retail.recordedDays', {days: s.days});
  document.getElementById('mh-rev').textContent   = Engine.fmtMoney(s.profit);
}
// ★ 中文用"2026年"，英文等语言直接用空格分隔（月份名已含语义，不需要"年"字）
function tYearSuffix() { return I18N.getLang()==='zh' ? '年' : ' '; }

// ★ 商品分类 key -> 当前语言显示文字（分类存储值是语言无关 key，如 foodDrink）
function catLabel(catKey) {
  if (!catKey) return t('inventory.categoryOther');
  return t('category.' + catKey);
}

var X_POSITIONS = [50, 68, 80, 68, 50, 32, 20, 32];
var Y_STEP = 100, Y_START = 70;

function getNodeCoords(index, W) {
  var xPct = X_POSITIONS[index % X_POSITIONS.length];
  return { x: W * xPct / 100, y: Y_START + index * Y_STEP };
}

function buildSnake() {
  var track = document.getElementById('snake-track');
  var svg   = document.getElementById('snake-svg');
  var h     = Engine.getHistory();
  var W     = track.offsetWidth || 375;
  var trackH = Y_START + (DAYS+1) * Y_STEP + 60;
  track.style.height = trackH + 'px';
  svg.setAttribute('height', trackH);
  svg.setAttribute('viewBox', '0 0 '+W+' '+trackH);
  var coords = [];
  for (var i = 0; i <= DAYS; i++) coords.push(getNodeCoords(i, W));
  // 连线
  var pathD = '';
  for (var i = 0; i < coords.length-1; i++) {
    var a=coords[i], b=coords[i+1];
    if (i===0) pathD='M '+a.x+' '+a.y;
    var my=(a.y+b.y)/2;
    pathD+=' Q '+a.x+' '+my+' '+b.x+' '+b.y;
  }
  var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
  pathEl.setAttribute('d',pathD);pathEl.setAttribute('fill','none');
  pathEl.setAttribute('stroke','#E0E0E0');pathEl.setAttribute('stroke-width','8');pathEl.setAttribute('stroke-linecap','round');
  svg.appendChild(pathEl);
  // 日期节点
  for (var day = 1; day <= DAYS; day++) {
    var idx=day-1, pos=coords[idx], key=dateKey(day), data=h[key]||null;
    var hasSales = data && parseFloat(data.revenue)>0;
    var hasLoss  = data && parseFloat(data.loss||0)>0;   // ★ 损耗判断
    var isToday=day===TODAY, isPast=day<TODAY, isFuture=day>TODAY;
    var node=document.createElement('div');
    node.className='day-node';
    node.style.left=pos.x+'px'; node.style.top=pos.y+'px';
    node.style.animationDelay=(idx*35)+'ms';
    if (isToday)       node.classList.add('n-today');
    else if (isFuture) node.classList.add('n-future');
    else if (hasLoss)  node.classList.add('n-loss');   // ★ 只要有损耗就红色，优先于销售
    else if (hasSales) node.classList.add('n-done');
    else               node.classList.add('n-missed');
    if (isToday) {
      var tag=document.createElement('div');tag.className='today-tag';tag.textContent=t('retail.calendar.todayTag');node.appendChild(tag);
    }
    var numEl=document.createElement('div');numEl.className='nd-num';numEl.textContent=day;node.appendChild(numEl);
    var icoEl=document.createElement('div');icoEl.className='nd-ico';
    // 今天有损耗也显示警告
    icoEl.textContent = isToday ? (hasLoss?'⚠':'⭐') : hasLoss?'⚠': hasSales?'✓': isPast?'✗':'';
    node.appendChild(icoEl);
    (function(d,k,dat,isT,isF,isP,hS,hL){
      node.onclick=function(){ openSheet(d,k,dat,isT,isF,isP,hS,hL); };
    })(day,key,data,isToday,isFuture,isPast,hasSales,hasLoss);
    track.appendChild(node);
  }
  // 吉祥物
  var mi=Math.floor(DAYS/2), mp=coords[mi];
  var mascot=document.createElement('div');mascot.className='mascot-node';
  mascot.style.left=(mp.x+(mp.x>W*.5?-80:80))+'px';mascot.style.top=mp.y+'px';mascot.textContent='🦦';
  track.appendChild(mascot);
  // 宝箱
  var cp=coords[DAYS], chest=document.createElement('div');chest.className='chest-node';
  chest.style.left=cp.x+'px';chest.style.top=cp.y+'px';
  chest.innerHTML='<div class="ch-icon">'+(TODAY>=DAYS?'🏆':'🔒')+'</div><div class="ch-label">'+t('retail.calendar.monthSummary')+'</div>';
  chest.onclick=openChest;track.appendChild(chest);
}

function openSheet(day, key, data, isToday, isFuture, isPast, hasSales, hasLoss) {
  // ★ 存全局供 ReceiptViewer / RetroSheet 读取
  _currentSheetKey = key;
  _currentSheetDay = day;

  document.getElementById('sh-date').textContent = tDateLabel(MONTH, day);
  var metrics=document.getElementById('sh-metrics'), btnRow=document.getElementById('sh-btn-row');

  if (isFuture) {
    document.getElementById('sh-status').textContent=t('retail.sheet.future');
    metrics.innerHTML=''; btnRow.innerHTML='';
  } else if (!hasSales && !hasLoss && !isToday) {
    document.getElementById('sh-status').textContent=t('retail.sheet.noRecord');
    metrics.innerHTML='<div class="mc"><div class="mc-lbl">'+t('retail.sheet.revenue')+'</div><div class="mc-val">¥0</div></div>'+
      '<div class="mc"><div class="mc-lbl">'+t('retail.sheet.grossProfit')+'</div><div class="mc-val">—</div></div>';
    // 无记录的过去日期也可补记
    btnRow.innerHTML='<button class="btn-sh btn-ghost" onclick="closeSheet();RetroSheet.open()">📝 '+t('retail.sheet.btnRetro')+'</button>';
  } else {
    var cd=Engine.getDay(key)||data||{};
    var rev =parseFloat(cd.revenue)||0;
    var prof=parseFloat(cd.profit)||0;
    var varC=parseFloat(cd.variableCost)||(rev-prof);
    var loss=parseFloat(cd.loss)||0;
    var statusTxt=isToday?t('retail.sheet.todayInProgress'):(hasSales?t('retail.sheet.done'):(hasLoss?t('retail.sheet.lossOnly'):t('retail.sheet.noRecord')));
    document.getElementById('sh-status').textContent=statusTxt;

    // ★ 营收卡片可点击 → 弹出销售单
    metrics.innerHTML=
      '<div class="mc" onclick="ReceiptViewer.open(_currentSheetKey)" style="cursor:pointer">'+
        '<div class="mc-lbl">'+t('retail.sheet.revenue')+' <span style="font-size:9px;color:var(--orange);font-weight:800">'+t('retail.sheet.revenueView')+'</span></div>'+
        '<div class="mc-val o">'+Engine.fmtMoney(rev)+'</div>'+
      '</div>'+
      '<div class="mc"><div class="mc-lbl">'+t('retail.sheet.grossProfit')+'</div><div class="mc-val '+(prof>=0?'g':'r')+'">'+Engine.fmtMoney(prof)+'</div></div>'+
      '<div class="mc"><div class="mc-lbl">'+t('retail.sheet.variableCost')+'</div><div class="mc-val">'+Engine.fmtMoney(varC)+'</div></div>'+
      '<div class="mc"><div class="mc-lbl">'+t('retail.sheet.lossCost')+'</div><div class="mc-val r">'+(loss>0?Engine.fmtMoney(loss):'—')+'</div></div>';

    if (isToday) {
      btnRow.innerHTML=
        '<button class="btn-sh btn-primary" onclick="closeSheet();switchTab(null,\'cashier\')"><span>🛒</span> '+t('retail.sheet.btnCashier')+'</button>'+
        '<button class="btn-sh btn-stock"   onclick="closeSheet();switchTab(null,\'restock\')"><span>📦</span> '+t('retail.sheet.btnRestock')+'</button>';
    } else {
      // ★ 过去日期：补记按钮
      btnRow.innerHTML='<button class="btn-sh btn-ghost" onclick="closeSheet();RetroSheet.open()">📝 '+t('retail.sheet.btnRetro')+'</button>';
    }
  }
  document.getElementById('overlay').classList.add('open');
}

// ★ "3月15日" / "Mar 15" 两种日期展示格式
function tDateLabel(monthIdx, day) {
  return I18N.getLang()==='zh'
    ? (monthIdx+1)+'月'+day+'日'
    : tMonth(monthIdx)+' '+day;
}

function overlayTap(e) { if(e.target===document.getElementById('overlay')) closeSheet(); }
function closeSheet()  { document.getElementById('overlay').classList.remove('open'); }

function openChest() {
  var s=Engine.getMonthStats(YEAR,MONTH);
  var msg = '📊 '+t('retail.chest.title', {month: tMonth(MONTH)})+'\n\n'+
    t('retail.chest.days', {days: s.days})+'\n'+
    t('retail.chest.revenue', {val: Engine.fmtMoney(s.revenue)})+'\n'+
    t('retail.chest.profit', {val: Engine.fmtMoney(s.profit)})+'\n'+
    t('retail.chest.margin', {val: s.gm})+
    (s.totalLoss>0?'\n'+t('retail.chest.loss', {val: Engine.fmtMoney(s.totalLoss)}):'');
  alert(msg);
}

function scrollToToday() {
  setTimeout(function(){
    var node=document.querySelector('.n-today');
    if(node) node.scrollIntoView({behavior:'smooth',block:'center'});
  },600);
}

document.getElementById('view-calendar').style.display='';
updateHeader();
buildSnake();
scrollToToday();

document.querySelectorAll('.nav-btn').forEach(function(btn){
  var view=btn.getAttribute('data-view');
  if(!view)return;
  btn.onclick=function(){switchTab(btn,view);};
});

// ★ 重建蛇形路径（补记/损耗后刷新节点颜色）
function refreshSnake() {
  var track=document.getElementById('snake-track');
  var svg=document.getElementById('snake-svg');
  if (!track||!svg) return;
  Array.from(track.children).forEach(function(c){ if(c!==svg) track.removeChild(c); });
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  buildSnake();
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  ★ ReceiptViewer — 销售单查看器（美式小票风格，左右滑动翻页）
// ════════════════════════════════════════════════════════════════════════════
const ReceiptViewer = (function(){
  let _receipts = [], _cur = 0, _startX = 0, _bound = false;

  function open(dateKey) {
    _receipts = Engine.getSales().filter(function(s){ return s.date === dateKey; });
    if (!_receipts.length) {
      // 有销售记录的天才会显示"▶ 查看"，这里是保险措施
      alert(t('receipt.noSaleThisDay'));
      return;
    }
    _cur = 0;
    _render();
    var ov = document.getElementById('receipt-overlay');
    ov.style.display = 'flex';
    // 绑定触摸滑动（只绑一次，避免重复注册）
    if (!_bound) {
      _bound = true;
      var card = document.getElementById('receipt-card');
      card.addEventListener('touchstart', function(e){ _startX = e.touches[0].clientX; }, {passive:true});
      card.addEventListener('touchend', function(e){
        var diff = _startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 44) { diff > 0 ? next() : prev(); }
      }, {passive:true});
    }
  }

  function _render() {
    document.getElementById('rv-nav-info').textContent =
      t('receipt.pageInfo', {cur: _cur+1, total: _receipts.length});
    document.getElementById('rv-dots').innerHTML = _receipts.map(function(_,i){
      var active = i === _cur;
      return '<div style="width:'+(active?18:6)+'px;height:6px;border-radius:3px;'+
             'background:'+(active?'#fff':'rgba(255,255,255,.3)')+';transition:all .2s"></div>';
    }).join('');
    document.getElementById('receipt-card').innerHTML = _buildHTML(_receipts[_cur]);
  }

  function _buildHTML(rec) {
    var dt      = new Date(rec.createdAt);
    var timeStr = dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0');
    // cashCollected 可能为 undefined（旧数据），此时等于 total
    var cashIn  = (rec.cashCollected != null) ? rec.cashCollected : rec.total;
    var hasAR   = rec.arTotal > 0;
    // 浮点安全比较：差值超过 0.005 才显示 CASH IN 行
    var showCashIn = Math.abs(cashIn - rec.total) > 0.005;

    var itemsHTML = '';
    rec.items.forEach(function(item){
      var origPrice = item.origSalePrice || item.salePrice;
      // ★ 换购商品：毛利 = 消费者实付额（收入 = 实付+进价，成本 = 进价，利润 = 实付）
      // 普通商品：毛利 = (售价 - 进价) × 数量
      var itemProfit = item.isRedemption
        ? parseFloat(item.redemptionPrice || 0) * parseFloat(item.qty)
        : (parseFloat(item.salePrice) - parseFloat(item.costPrice)) * parseFloat(item.qty);
      itemsHTML +=
        '<div class="rc-item-block">'+
          '<div class="rc-item-name">'+
            item.name+
            (item.batchNo ? '<span class="rc-batch"> ·'+t('common.batchN',{n:item.batchNo})+'</span>' : '')+
            (rec.retroactive ? '<span class="rc-retro-badge">'+t('receipt.retroBadge')+'</span>' : '')+
          '</div>'+
          (item.isRedemption
            // 换购商品：显示原价（参考）、实付价、进价、应收
            ? '<div class="rc-row"><span>'+t('receipt.field.origPrice')+'</span><span>'+Engine.fmtMoney(origPrice)+'</span></div>'+
              '<div class="rc-row"><span>'+t('receipt.field.unitCost')+'</span><span>'+Engine.fmtMoney(item.costPrice)+'</span></div>'+
              '<div class="rc-row"><span>'+t('receipt.field.qty')+'</span><span>× '+item.qty+'</span></div>'+
              '<div class="rc-row redeem"><span>'+t('receipt.field.redeemedAt')+'</span><span>'+Engine.fmtMoney(item.redemptionPrice)+'</span></div>'+
              '<div class="rc-row ar-row"><span>'+t('receipt.field.arFrom',{name:item.supplierName||t('receipt.field.defaultSupplier')})+'</span>'+
                '<span>+'+Engine.fmtMoney(parseFloat(item.costPrice)*parseFloat(item.qty))+'</span></div>'+
              '<div class="rc-row profit"><span>'+t('receipt.field.margin')+'</span><span>'+Engine.fmtMoney(itemProfit)+'</span></div>'
            // 普通商品
            : '<div class="rc-row"><span>'+t('receipt.field.unitPrice')+'</span><span>'+Engine.fmtMoney(origPrice)+'</span></div>'+
              '<div class="rc-row"><span>'+t('receipt.field.unitCost')+'</span><span>'+Engine.fmtMoney(item.costPrice)+'</span></div>'+
              '<div class="rc-row"><span>'+t('receipt.field.qty')+'</span><span>× '+item.qty+'</span></div>'+
              '<div class="rc-row profit"><span>'+t('receipt.field.margin')+'</span><span>'+Engine.fmtMoney(itemProfit)+'</span></div>'
          )+
        '</div>'+
        '<hr class="rc-divider">';
    });

    var totalItems = rec.items.reduce(function(a,i){ return a+parseFloat(i.qty); }, 0);

    return '<div class="rc-store">'+t('receipt.storeName')+'</div>'+
      '<div class="rc-date">'+rec.date+'  '+timeStr+'</div>'+
      '<hr class="rc-divider" style="margin-top:10px">'+
      itemsHTML+
      '<div style="margin-top:4px">'+
        '<div class="rc-total-row"><span>'+t('receipt.field.items')+'</span><span>'+totalItems+'</span></div>'+
        '<div class="rc-total-row main"><span>'+t('receipt.field.revenue')+'</span><span>'+Engine.fmtMoney(rec.total)+'</span></div>'+
        (showCashIn
          ? '<div class="rc-total-row"><span>'+t('receipt.field.cashIn')+'</span><span>'+Engine.fmtMoney(cashIn)+'</span></div>'
          : '')+
        '<hr class="rc-divider solid">'+
        '<div class="rc-total-row profit"><span>'+t('receipt.field.grossProfit')+'</span><span>'+Engine.fmtMoney(rec.profit)+'</span></div>'+
        (hasAR ? '<div class="rc-total-row ar"><span>'+t('receipt.field.arCreated')+'</span><span>'+Engine.fmtMoney(rec.arTotal)+'</span></div>' : '')+
      '</div>'+
      '<div class="rc-footer">'+t('receipt.thankYou')+'</div>';
  }

  function next() { if (_cur < _receipts.length-1) { _cur++; _render(); } }
  function prev() { if (_cur > 0)                  { _cur--; _render(); } }
  function close() { document.getElementById('receipt-overlay').style.display = 'none'; }

  return { open, next, prev, close };
})();
window.ReceiptViewer = ReceiptViewer;

// ════════════════════════════════════════════════════════════════════════════
//  ★ RetroSheet — 补记销售（对过去日期补录销售记录）
// ════════════════════════════════════════════════════════════════════════════
const RetroSheet = (function(){
  var _cart = [];
  var _clickHandler = null;   // 保存 click handler 引用，防止重复注册

  function open() {
    var key = _currentSheetKey;
    var day = _currentSheetDay;
    _cart = [];

    var el = document.getElementById('retro-content');
    el.innerHTML =
      '<div class="page-title-bar">'+
        '<span class="page-title-icon">📝</span>'+
        '<span class="page-title-text">'+t('retro.title')+'</span>'+
      '</div>'+
      '<div style="background:#FEF9C3;border:1.5px solid #EAB308;border-radius:12px;'+
                  'padding:10px 14px;margin-bottom:16px;font-size:13px;font-weight:700;color:#713F12">'+
        '📅 '+t('retro.dateLabel',{date:tDateLabel(MONTH,day),key:key})+
      '</div>'+
      '<div class="search-wrap" id="retro-search-wrap">'+
        '<div class="search-box">'+
          '<span class="search-ico">🔍</span>'+
          '<input id="retro-search" class="search-inp" type="text"'+
                 'placeholder="'+t('retro.searchPlaceholder')+'" autocomplete="off">'+
        '</div>'+
        '<div id="retro-dd" class="search-dropdown hidden"></div>'+
      '</div>'+
      '<div class="section-label">'+t('retro.selected')+'</div>'+
      '<div id="retro-cart" class="cart-list" style="margin-bottom:12px;min-height:60px"></div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;'+
                  'background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:14px;'+
                  'box-shadow:0 2px 8px rgba(0,0,0,.07)">'+
        '<span style="font-size:13px;font-weight:700;color:var(--text-3)" id="retro-count">'+t('cashier.itemCount',{n:0})+'</span>'+
        '<span style="font-size:18px;font-weight:900;color:var(--text)" id="retro-sum">¥0</span>'+
      '</div>'+
      '<button class="form-submit" id="retro-btn" disabled onclick="RetroSheet.submit()">'+
        t('retro.submitBtn')+
      '</button>'+
      '<div class="form-success hidden" id="retro-ok">'+t('retro.success')+'</div>';

    _bindSearch();
    _renderCart();

    document.getElementById('retro-overlay').style.display = 'flex';
  }

  function _bindSearch() {
    var inp = document.getElementById('retro-search');
    var dd  = document.getElementById('retro-dd');
    if (!inp) return;

    inp.addEventListener('input', function(){
      var q   = inp.value.trim().toLowerCase();
      if (!q) { dd.classList.add('hidden'); return; }
      var inv = Engine.getInventory().filter(function(p){ return parseFloat(p.qty) > 0; });
      var nameMap = {};
      inv.forEach(function(p){
        if (!p.name.toLowerCase().includes(q)) return;
        if (!nameMap[p.name]) nameMap[p.name] = { name:p.name, totalQty:0, batches:0 };
        nameMap[p.name].totalQty += parseFloat(p.qty);
        nameMap[p.name].batches++;
      });
      var results = Object.values(nameMap);
      dd.innerHTML = results.length
        ? results.map(function(r){
            return '<div class="dd-item" data-name="'+r.name+'">'+
              '<span class="dd-name">'+r.name+'</span>'+
              '<span class="dd-info">'+t('cashier.stockCount',{n:r.totalQty})+
                (r.batches>1?' · '+t('cashier.batchCount',{n:r.batches}):'')+
              '</span></div>';
          }).join('')
        : '<div class="dd-empty">'+t('cashier.noProductFound')+'</div>';
      dd.querySelectorAll('.dd-item').forEach(function(row){
        row.onclick = function(){
          inp.value = ''; dd.classList.add('hidden');
          BatchPicker.open(row.dataset.name, function(batch){ if(batch) _add(batch); });
        };
      });
      dd.classList.remove('hidden');
    });

    // 移除旧监听器再添加新的，防止 open() 多次调用时重复注册
    if (_clickHandler) document.removeEventListener('click', _clickHandler);
    _clickHandler = function(e){
      var wrap = document.getElementById('retro-search-wrap');
      if (wrap && !wrap.contains(e.target)) dd.classList.add('hidden');
    };
    document.addEventListener('click', _clickHandler);
  }

  function _add(prod) {
    var ex = _cart.find(function(c){ return c.productId === prod.id; });
    if (ex) { ex.qty = Math.min(ex.qty + 1, parseFloat(prod.qty)); }
    else {
      _cart.push({
        productId: prod.id, name: prod.name, batchNo: prod.batchNo, qty: 1,
        costPrice: parseFloat(prod.costPrice), salePrice: parseFloat(prod.salePrice),
        maxQty: parseFloat(prod.qty),
      });
    }
    _renderCart();
  }

  function _renderCart() {
    var el = document.getElementById('retro-cart'); if (!el) return;
    el.innerHTML = _cart.length
      ? _cart.map(function(item, i){
          return '<div class="cart-item">'+
            '<div class="ci-info">'+
              '<div class="ci-name">'+item.name+
                (item.batchNo?'<span style="font-size:11px;color:#999;margin-left:4px">'+t('common.batchN',{n:item.batchNo})+'</span>':'')+
              '</div>'+
              '<div class="ci-price">'+Engine.fmtMoney(item.salePrice)+'/'+t('common.stockUnit')+' · '+t('common.costPriceLabel')+' '+Engine.fmtMoney(item.costPrice)+'</div>'+
            '</div>'+
            '<div class="ci-qty-ctrl">'+
              '<button class="qty-btn" onclick="RetroSheet._adj('+i+',-1)">−</button>'+
              '<span class="qty-val">'+item.qty+'</span>'+
              '<button class="qty-btn" onclick="RetroSheet._adj('+i+',1)">+</button>'+
            '</div>'+
            '<div class="ci-subtotal">'+Engine.fmtMoney(item.salePrice * item.qty)+'</div>'+
            '<button class="ci-del" onclick="RetroSheet._del('+i+')">✕</button>'+
          '</div>';
        }).join('')
      : '<div class="cart-empty">'+t('retro.empty')+'</div>';

    var total = _cart.reduce(function(a,c){ return a + c.salePrice * c.qty; }, 0);
    var count = _cart.reduce(function(a,c){ return a + c.qty; }, 0);
    var ce = document.getElementById('retro-count');
    var se = document.getElementById('retro-sum');
    var be = document.getElementById('retro-btn');
    if (ce) ce.textContent = t('cashier.itemCount',{n:count});
    if (se) se.textContent = Engine.fmtMoney(total);
    if (be) be.disabled = (_cart.length === 0);
  }

  function submit() {
    if (!_cart.length) return;
    Engine.recordSaleOnDate(_cart, _currentSheetKey);
    _cart = [];
    var ok = document.getElementById('retro-ok');
    if (ok) {
      ok.classList.remove('hidden');
      setTimeout(function(){ ok.classList.add('hidden'); }, 2000);
    }
    _renderCart();
    updateHeader();
    refreshSnake();
    if (window.Dashboard && window.Dashboard.refresh) window.Dashboard.refresh();
  }

  function close() {
    document.getElementById('retro-overlay').style.display = 'none';
    // 清理全局 click 监听器
    if (_clickHandler) {
      document.removeEventListener('click', _clickHandler);
      _clickHandler = null;
    }
  }

  return {
    open, submit, close,
    _adj: function(i, d){ _cart[i].qty = Math.max(1, Math.min(_cart[i].qty+d, _cart[i].maxQty)); _renderCart(); },
    _del: function(i)   { _cart.splice(i, 1); _renderCart(); },
  };
})();
window.RetroSheet = RetroSheet;
</script>

<!-- ★ 销售单查看器 overlay (z-index 900, outside all script blocks) -->
<div id="receipt-overlay"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:900;
            flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px"
     onclick="if(event.target===this)ReceiptViewer.close()">

  <!-- 顶部导航：上一张 / 页码 / 下一张 -->
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:340px">
    <button onclick="ReceiptViewer.prev()"
      style="background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;
             border-radius:50%;font-size:22px;cursor:pointer;flex-shrink:0;
             display:flex;align-items:center;justify-content:center">‹</button>
    <div style="text-align:center">
      <div style="color:#fff;font-size:13px;font-weight:700" id="rv-nav-info" data-i18n="receipt.pageInfoDefault">第 1 张 / 共 1 张</div>
      <div id="rv-dots" style="display:flex;gap:5px;justify-content:center;margin-top:5px"></div>
    </div>
    <button onclick="ReceiptViewer.next()"
      style="background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;
             border-radius:50%;font-size:22px;cursor:pointer;flex-shrink:0;
             display:flex;align-items:center;justify-content:center">›</button>
  </div>

  <!-- 收据卡片 -->
  <div id="receipt-card"
       style="background:#FEFEFE;width:100%;max-width:340px;max-height:60vh;overflow-y:auto;
              border-radius:2px;font-family:'Courier New',monospace;
              box-shadow:0 12px 48px rgba(0,0,0,.7);padding:22px 18px">
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:340px">
    <div style="color:rgba(255,255,255,.4);font-size:12px;font-weight:700" data-i18n="receipt.swipeHint">← 左滑 / 右滑 →</div>
    <button onclick="ReceiptViewer.close()"
      style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);
             color:#fff;padding:9px 22px;border-radius:20px;font-size:13px;font-weight:700;
             cursor:pointer;font-family:inherit" data-i18n="common.close">关闭</button>
  </div>
</div>

<!-- ★ 补记销售弹窗 (z-index 750, 低于 batch-overlay 的 800 以便批次弹窗盖在上面) -->
<div id="retro-overlay"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);
            z-index:750;align-items:flex-end;justify-content:center"
     onclick="if(event.target===this)RetroSheet.close()">
  <div style="background:#fff;width:100%;max-width:480px;border-radius:28px 28px 0 0;
              padding:0 20px 44px;max-height:88vh;overflow-y:auto">
    <div style="width:44px;height:5px;background:#E0E0E0;border-radius:3px;margin:14px auto 16px"></div>
    <div id="retro-content" style="padding-bottom:8px"></div>
    <button onclick="RetroSheet.close()"
      style="width:100%;padding:14px;background:#F0F0F0;color:#555;border:none;
             border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;
             font-family:inherit;box-shadow:0 4px 0 #CECECE" data-i18n="common.close">关闭</button>
  </div>
</div>

</body>
</html>
