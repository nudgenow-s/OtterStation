<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6B4226">
<title>獭掌柜</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data === 'SW_UPDATED') window.location.reload();
  });
}
</script>
<style>
/* ── RESET & BASE ── */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
--orange: #FF6B35;
--orange-dk: #C44D1A;
--yellow: #FFD000;
--yellow-dk: #BF9B00;
--green: #4CAF50;
--green-dk: #388E3C;
--red: #F44336;
--gray-bg: #F7F7F7;
--gray-card: #F5F5F5;
--border: #EBEBEB;
--text: #222;
--text-2: #666;
--text-3: #AAA;
}

body {
font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
background: var(--gray-bg);
min-height: 100vh;
max-width: 480px;
margin: 0 auto;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

.topbar-back {
  display:flex; align-items:center; gap:4px;
  font-size:14px; font-weight:700; color:var(--orange);
  background:none; border:none; cursor:pointer;
  font-family:inherit; padding:4px 0; flex-shrink:0;
}
.topbar-back:active { opacity:0.7; }

.month-header {
background: var(--orange);
margin: 14px 16px 0;
border-radius: 20px;
padding: 16px 20px;
display: flex;
justify-content: space-between;
align-items: center;
box-shadow: 0 5px 0 var(--orange-dk);
}
.mh-left .mh-title { color:#fff; font-size:20px; font-weight:900; }
.mh-left .mh-sub   { color:rgba(255,255,255,.72); font-size:12px; font-weight:700; margin-top:3px; }
.mh-right .mh-rev  { color:#fff; font-size:26px; font-weight:900; text-align:right; }
.mh-right .mh-rlbl { color:rgba(255,255,255,.65); font-size:11px; font-weight:700; text-align:right; }

.main-view { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.calendar-view { padding: 24px 0 160px; }
.page-view { padding:16px 16px 160px; display:none; }
.page-view.visible { display: block; }

/* ── SNAKE TRACK ── */
.snake-track { position: relative; width: 100%; }
.snake-svg { position:absolute; top:0; left:0; width:100%; pointer-events:none; z-index:0; }
.day-node {
position:absolute; width:74px; height:74px; border-radius:50%;
display:flex; flex-direction:column; align-items:center; justify-content:center;
cursor:pointer; z-index:2; transform:translate(-50%,-50%);
transition:transform .12s ease; opacity:0; animation:popIn .38s ease forwards;
}
.day-node:active { transform:translate(-50%,calc(-50% + 4px)) scale(.9); }
@keyframes popIn {
0%   { opacity:0; transform:translate(-50%,-50%) scale(.35); }
70%  { transform:translate(-50%,-50%) scale(1.1); }
100% { opacity:1; transform:translate(-50%,-50%) scale(1); }
}
.n-future  { background:#EEE; box-shadow:0 5px 0 #C8C8C8; border:3px solid #C8C8C8; }
.n-future  .nd-num { color:#AAA; } .n-future .nd-ico { color:#BBB; }
.n-done    { background:var(--orange); box-shadow:0 5px 0 var(--orange-dk); border:3px solid var(--orange-dk); }
.n-done    .nd-num { color:#fff; } .n-done .nd-ico { color:#fff; }
.n-missed  { background:#fff; box-shadow:0 5px 0 #C8C8C8; border:3px solid #DDD; }
.n-missed  .nd-num { color:#C0C0C0; } .n-missed .nd-ico { color:#CCC; }
.n-today   {
background:var(--yellow); box-shadow:0 5px 0 var(--yellow-dk); border:3px solid var(--yellow-dk);
animation:popIn .38s ease forwards, todayPulse 2.2s .5s ease-in-out infinite;
}
.n-today .nd-num { color:#333; } .n-today .nd-ico { color:#555; }
/* ★ 损耗节点：红色，仅有损耗无销售时显示 */
.n-loss    { background:var(--red); box-shadow:0 5px 0 #B71C1C; border:3px solid #B71C1C; }
.n-loss    .nd-num { color:#fff; } .n-loss .nd-ico { color:#fff; }

@keyframes todayPulse {
0%,100% { box-shadow:0 5px 0 var(--yellow-dk), 0 0 0 0 rgba(255,208,0,.5); }
50%      { box-shadow:0 5px 0 var(--yellow-dk), 0 0 0 14px rgba(255,208,0,0); }
}
.nd-num { font-size:23px; font-weight:900; line-height:1; }
.nd-ico { font-size:13px; margin-top:3px; font-weight:700; }
.today-tag {
position:absolute; top:-26px; left:50%; transform:translateX(-50%);
background:var(--yellow); color:#333; font-size:10px; font-weight:900;
padding:3px 9px; border-radius:8px; white-space:nowrap; box-shadow:0 2px 0 var(--yellow-dk); z-index:3;
}
.today-tag::after {
content:''; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%);
border:4px solid transparent; border-top-color:var(--yellow);
}
.chest-node {
position:absolute; width:82px; height:82px; background:#fff;
border-radius:20px; border:3px solid #DDD; box-shadow:0 5px 0 #C4C4C4;
display:flex; flex-direction:column; align-items:center; justify-content:center;
cursor:pointer; z-index:2; transform:translate(-50%,-50%); transition:transform .12s;
}
.chest-node:active { transform:translate(-50%,calc(-50% + 4px)) scale(.9); }
.ch-icon  { font-size:34px; } .ch-label { font-size:10px; font-weight:800; color:#999; margin-top:4px; }
.mascot-node {
position:absolute; font-size:60px; transform:translate(-50%,-50%); z-index:1;
animation:mFloat 3s ease-in-out infinite;
filter:drop-shadow(0 6px 10px rgba(255,107,53,.2)); pointer-events:none;
}
@keyframes mFloat {
0%,100% { transform:translate(-50%,-50%) translateY(0); }
50%      { transform:translate(-50%,-50%) translateY(-10px); }
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:env(safe-area-inset-bottom,0px); left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:#fff; border-top:2px solid var(--border);
  display:flex; z-index:200; padding-bottom:8px; overflow-x:auto;
}
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 2px 7px; border:none; background:none; cursor:pointer; gap:3px; }
.nav-ico { font-size:20px; transition:transform .15s; } .nav-lbl { font-size:9px; font-weight:800; color:#AAA; }
.nav-btn.active .nav-lbl { color:var(--orange); } .nav-btn.active .nav-ico { transform:scale(1.18); } .nav-btn:active .nav-ico { transform:scale(.88); }

/* ── SHEET ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.48); z-index:500; align-items:flex-end; }
.overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.sheet { background:#fff; width:100%; border-radius:28px 28px 0 0; padding:0 24px 44px; animation:sheetUp .3s ease; max-height:82vh; overflow-y:auto; }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sh-handle { width:44px;height:5px;background:#E0E0E0;border-radius:3px;margin:14px auto 20px; }
.sh-date   { font-size:22px;font-weight:900;color:#222; }
.sh-status { font-size:13px;font-weight:700;color:#999;margin:4px 0 18px; }
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.mc { background:#F5F5F5;border-radius:16px;padding:14px 12px; }
.mc-lbl { font-size:11px;font-weight:700;color:#999;margin-bottom:5px; }
.mc-val { font-size:20px;font-weight:900;color:#222; }
.mc-val.g { color:var(--green); } .mc-val.o { color:var(--orange); } .mc-val.r { color:var(--red); }
.btn-row { display:flex;gap:10px;margin-bottom:10px; }
.btn-sh { flex:1; padding:15px 8px; border:none; border-radius:18px; font-size:15px; font-weight:900; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .1s; }
.btn-primary { background:var(--orange);color:#fff;box-shadow:0 5px 0 var(--orange-dk); }
.btn-primary:active { transform:translateY(4px);box-shadow:0 1px 0 var(--orange-dk); }
.btn-stock { background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-dk); }
.btn-stock:active { transform:translateY(4px);box-shadow:0 1px 0 var(--green-dk); }
.btn-ghost { background:#F0F0F0;color:#555;box-shadow:0 4px 0 #CECECE;width:100%; }
.btn-ghost:active { transform:translateY(3px);box-shadow:0 1px 0 #CECECE; }

/* 通用组件 */
.page-title-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.page-title-icon { font-size:24px; } .page-title-text { font-size:22px; font-weight:900; color:var(--text); flex:1; }
.section-label { font-size:12px; font-weight:800; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin:18px 0 10px; }
.search-wrap { position:relative; margin-bottom:12px; }
.search-box  { display:flex; align-items:center; background:#fff; border:2px solid var(--border); border-radius:14px; padding:0 14px; }
.search-ico  { font-size:16px; margin-right:8px; }
.search-inp  { flex:1; border:none; outline:none; font-size:15px; padding:12px 0; background:transparent; font-family:inherit; }
.search-dropdown { position:absolute; top:100%; left:0; right:0; background:#fff; border:2px solid var(--border); border-radius:14px; z-index:50; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.1); margin-top:4px; max-height:220px; overflow-y:auto; }
.search-dropdown.hidden { display:none; }
.dd-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; transition:background .1s; }
.dd-item:hover,.dd-item:active { background:var(--gray-bg); }
.dd-name { font-size:15px; font-weight:700; color:var(--text); } .dd-info { font-size:12px; color:var(--text-3); }
.dd-empty { padding:16px; text-align:center; color:var(--text-3); font-size:14px; }

/* 收银台 */
.cart-list { display:flex; flex-direction:column; gap:8px; margin-bottom:80px; }
.cart-empty { text-align:center; color:var(--text-3); font-size:15px; padding:40px 20px; }
.cart-item { background:#fff; border-radius:16px; padding:14px 12px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
.ci-info { flex:1; } .ci-name { font-size:15px; font-weight:800; color:var(--text); } .ci-price { font-size:12px; color:var(--text-3); margin-top:2px; }
.ci-qty-ctrl { display:flex; align-items:center; gap:8px; }
.qty-btn { width:30px; height:30px; border-radius:10px; border:none; background:var(--gray-bg); font-size:18px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text); }
.qty-val { font-size:16px; font-weight:900; min-width:24px; text-align:center; }
.ci-subtotal { font-size:16px; font-weight:900; color:var(--orange); min-width:52px; text-align:right; }
.ci-del { width:28px; height:28px; border-radius:50%; border:none; background:#FFE5E5; color:var(--red); font-size:12px; cursor:pointer; font-weight:900; }
.cashier-total-bar {
position:fixed; bottom:calc(env(safe-area-inset-bottom,6px) + 62px);
left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:448px;
background:#fff; border-radius:20px; padding:14px 16px;
display:flex; align-items:center; justify-content:space-between;
box-shadow:0 -4px 24px rgba(0,0,0,.12); z-index:50;
}
.ct-left { flex:1; } .ct-items { font-size:12px; color:var(--text-3); font-weight:700; } .ct-total { font-size:22px; font-weight:900; color:var(--text); }
.ct-btn { background:var(--orange); color:#fff; border:none; border-radius:16px; padding:14px 24px; font-size:16px; font-weight:900; cursor:pointer; box-shadow:0 4px 0 var(--orange-dk); font-family:inherit; transition:all .1s; }
.ct-btn:active { transform:translateY(4px); box-shadow:0 0 0 var(--orange-dk); }
.ct-btn:disabled { background:#CCC; box-shadow:0 4px 0 #AAA; cursor:not-allowed; }
/* ★ 优惠按钮 */
.ct-disc-btn { background:#fff; color:var(--orange); border:2px solid var(--orange); border-radius:16px; padding:12px 16px; font-size:14px; font-weight:900; cursor:pointer; font-family:inherit; transition:all .1s; margin-right:8px; }
.ct-disc-btn:active { transform:translateY(2px); }
.ct-disc-btn:disabled { color:#CCC; border-color:#CCC; cursor:not-allowed; }
.sale-success { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:24px; padding:32px 40px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.2); z-index:300; animation:successPop .4s cubic-bezier(.34,1.56,.64,1); }
.sale-success.hidden { display:none; }
@keyframes successPop { 0%{transform:translate(-50%,-50%) scale(.5);opacity:0;} 100%{transform:translate(-50%,-50%) scale(1);opacity:1;} }
.ss-icon { font-size:56px; } .ss-text { font-size:22px; font-weight:900; color:var(--text); margin-top:10px; } .ss-sub { font-size:14px; color:var(--text-3); margin-top:6px; }

/* ── 批次选择弹窗 ── */
.batch-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:600; align-items:flex-end; }
.batch-overlay.open { display:flex; animation:fadeIn .2s ease; }
.batch-sheet { background:#fff; width:100%; border-radius:28px 28px 0 0; padding:0 20px 40px; animation:sheetUp .3s ease; max-height:75vh; overflow-y:auto; }
.batch-handle { width:44px;height:5px;background:#E0E0E0;border-radius:3px;margin:14px auto 16px; }
.batch-title  { font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px; }
.batch-sub    { font-size:12px;color:var(--text-3);font-weight:700;margin-bottom:16px; }
.batch-item { background:var(--gray-bg); border-radius:16px; padding:14px 16px; margin-bottom:10px; cursor:pointer; border:2px solid transparent; transition:all .15s; }
.batch-item:active,.batch-item.selected { border-color:var(--orange); background:#FFF3EE; }
.batch-item-top { display:flex; justify-content:space-between; align-items:center; }
.batch-item-name { font-size:15px; font-weight:900; color:var(--text); }
.batch-item-sale { font-size:17px; font-weight:900; color:var(--orange); }
.batch-item-meta { font-size:12px; color:var(--text-3); margin-top:5px; display:flex; gap:12px; flex-wrap:wrap; }
.batch-fifo-tag { display:inline-block; background:var(--green); color:#fff; font-size:10px; font-weight:800; padding:2px 7px; border-radius:6px; margin-left:6px; }
.batch-fifo-row { background:#FFFDE7; }

/* ★ 优惠弹窗 */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:700; align-items:flex-end; }
.modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
.modal-sheet { background:#fff; width:100%; border-radius:28px 28px 0 0; padding:0 20px 44px; animation:sheetUp .3s ease; max-height:80vh; overflow-y:auto; }
.modal-handle { width:44px;height:5px;background:#E0E0E0;border-radius:3px;margin:14px auto 16px; }
.modal-title  { font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px; }
.modal-sub    { font-size:12px;color:var(--text-3);font-weight:700;margin-bottom:16px; }
/* 快捷折扣按钮 */
.disc-pct-row { display:flex; gap:8px; margin-bottom:10px; }
.disc-pct-btn { flex:1; padding:11px 4px; border-radius:12px; border:2px solid var(--border); background:#fff; font-size:13px; font-weight:900; color:var(--text-2); cursor:pointer; font-family:inherit; text-align:center; transition:all .15s; }
.disc-pct-btn.active { background:var(--orange); border-color:var(--orange); color:#fff; }
.disc-custom-row { display:flex; gap:10px; align-items:center; margin-bottom:20px; }
.disc-custom-inp { flex:1; padding:11px 14px; border:2px solid var(--border); border-radius:12px; font-size:16px; font-weight:900; font-family:inherit; outline:none; color:var(--text); }
.disc-custom-inp:focus { border-color:var(--orange); }
.disc-custom-unit { font-size:14px; font-weight:800; color:var(--text-3); white-space:nowrap; }
/* 逐行改价 */
.disc-item-row { background:var(--gray-bg); border-radius:14px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.disc-item-info { flex:1; }
.disc-item-name { font-size:14px; font-weight:800; color:var(--text); }
.disc-item-orig { font-size:11px; color:var(--text-3); margin-top:2px; }
.disc-item-inp  { width:80px; padding:8px 10px; border:2px solid var(--border); border-radius:10px; font-size:14px; font-weight:900; font-family:inherit; outline:none; color:var(--orange); text-align:right; }
.disc-item-inp:focus { border-color:var(--orange); }
/* 预览条 */
.disc-preview { background:#FFF3EE; border-radius:14px; padding:12px 16px; margin:12px 0 16px; display:flex; justify-content:space-between; align-items:center; }
.disc-preview-left .disc-preview-lbl { font-size:12px; font-weight:800; color:var(--text-3); }
.disc-preview-left .disc-save { font-size:12px; font-weight:800; color:var(--green); margin-top:2px; }
.disc-preview-total { font-size:22px; font-weight:900; color:var(--orange); }

/* ★ 损耗弹窗 */
.loss-info-box { background:#FFF5F5; border-radius:14px; padding:14px 16px; margin-bottom:16px; }
.loss-info-name { font-size:16px; font-weight:900; color:var(--text); margin-bottom:4px; }
.loss-info-meta { font-size:12px; color:var(--text-3); }
.loss-qty-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.loss-qty-lbl { font-size:14px; font-weight:800; color:var(--text); flex:1; }
.loss-calc { background:var(--gray-bg); border-radius:12px; padding:11px 14px; margin-bottom:20px; font-size:13px; color:var(--text-2); font-weight:700; }
.loss-calc span { color:var(--red); font-size:16px; font-weight:900; }
.btn-loss { width:100%; padding:15px; background:var(--red); color:#fff; border:none; border-radius:18px; font-size:16px; font-weight:900; cursor:pointer; box-shadow:0 5px 0 #B71C1C; font-family:inherit; transition:all .1s; }
.btn-loss:active { transform:translateY(4px); box-shadow:0 1px 0 #B71C1C; }
/* 临期页损耗按钮 */
.exp-loss-btn { display:inline-block; margin-top:8px; padding:6px 12px; background:#FFF5F5; color:var(--red); border:1.5px solid #FFCDD2; border-radius:10px; font-size:12px; font-weight:800; cursor:pointer; font-family:inherit; transition:all .15s; }
.exp-loss-btn:active { background:#FFCDD2; }

/* 表单 */
.form-subtitle { font-size:13px; color:var(--text-3); margin:-8px 0 16px; }
.form-card { background:#fff; border-radius:20px; padding:20px 16px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
.form-group { margin-bottom:16px; } .form-group.half { flex:1; } .form-row { display:flex; gap:12px; }
.form-lbl { display:block; font-size:12px; font-weight:800; color:var(--text-3); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
.form-inp { width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:12px; font-size:15px; font-family:inherit; outline:none; color:var(--text); transition:border-color .2s; }
.form-inp:focus { border-color:var(--orange); }
.cat-chips { display:flex; flex-wrap:wrap; gap:8px; }
.cat-chip { padding:7px 12px; border-radius:20px; border:2px solid var(--border); background:#fff; font-size:12px; font-weight:800; color:var(--text-2); cursor:pointer; transition:all .15s; font-family:inherit; }
.cat-chip.active { background:var(--orange); border-color:var(--orange); color:#fff; }
.margin-preview { background:var(--gray-bg); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.mp-label { font-size:11px; font-weight:800; color:var(--text-3); } .mp-unit { font-size:14px; font-weight:900; color:var(--text); } .mp-rate { font-size:14px; font-weight:900; }
.form-submit { width:100%; padding:16px; background:var(--orange); color:#fff; border:none; border-radius:18px; font-size:16px; font-weight:900; cursor:pointer; box-shadow:0 5px 0 var(--orange-dk); font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .1s; }
.form-submit:active { transform:translateY(4px); box-shadow:0 1px 0 var(--orange-dk); }
.form-success { text-align:center; padding:14px; background:#E8F5E9; color:var(--green); border-radius:14px; font-weight:800; margin-top:12px; font-size:15px; }
@keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-6px);} 40%,80%{transform:translateX(6px);} }
.shake { animation:shake .4s ease; border-color:var(--red) !important; }
.form-history-list { display:flex; flex-direction:column; gap:8px; }
.hist-empty { text-align:center; color:var(--text-3); padding:24px; font-size:14px; }
.hist-item { background:#fff; border-radius:14px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 6px rgba(0,0,0,.05); }
.hi-name { font-size:14px; font-weight:800; color:var(--text); } .hi-meta { font-size:11px; color:var(--text-3); margin-top:2px; }

<script>
// ════════════════════════════════════════════════════════════════════════════
//  主题
// ════════════════════════════════════════════════════════════════════════════
(function applyTheme() {
  try {
    var cfg = IndustryAdapter.getCurrent();
    if (cfg && cfg.theme) {
      var root = document.documentElement;
      root.style.setProperty('--orange',    cfg.theme);
      root.style.setProperty('--orange-dk', cfg.theme.replace(')', ', 0.8)').replace('rgb', 'rgba') || '#7A1828');
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', cfg.theme);
    }
  } catch(e) {}
})();

// ════════════════════════════════════════════════════════════════════════════
//  Engine — 核心数据引擎
// ════════════════════════════════════════════════════════════════════════════
const Engine = (function () {
  const KEYS = {
    history:   'otter_history',
    inventory: 'otter_inventory',
    sales:     'otter_sales',
    restock:   'otter_restock',
  };

  function load(key) {
    try { return JSON.parse(localStorage.getItem(key)) || null; }
    catch (e) { return null; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function getHistory()          { return load(KEYS.history) || {}; }
  function saveHistory(h)        { save(KEYS.history, h); }
  function getDay(dateKey)       { return getHistory()[dateKey] || null; }
  function setDay(dateKey, data) {
    const h = getHistory();
    h[dateKey] = Object.assign(h[dateKey] || {}, data);
    saveHistory(h);
  }

  function getInventory()   { return load(KEYS.inventory) || []; }
  function saveInventory(v) { save(KEYS.inventory, v); }

  function addProduct(product) {
    const inv = getInventory();
    const batchNo = inv.filter(p => p.name === product.name).length + 1;
    inv.push(Object.assign({ id: Date.now() + Math.random(), batchNo }, product));
    const cost = (parseFloat(product.costPrice)||0) * (parseFloat(product.qty)||0);
    if (cost > 0) {
      const c = parseFloat(localStorage.getItem('finance_cash')) || 0;
      localStorage.setItem('finance_cash', String(c - cost));
    }
    saveInventory(inv);
    return inv;
  }

  function updateProductQty(productId, deltaQty) {
    const inv = getInventory();
    const p   = inv.find(p => p.id == productId);
    if (!p) return false;
    p.qty = Math.max(0, (parseFloat(p.qty) || 0) + deltaQty);
    saveInventory(inv);
    return true;
  }

  function deleteProduct(productId) {
    saveInventory(getInventory().filter(p => p.id != productId));
  }

  function getBatchesByName(name) {
    return getInventory()
      .filter(p => p.name === name && parseFloat(p.qty) > 0)
      .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  }

  function getSales()   { return load(KEYS.sales) || []; }
  function saveSales(v) { save(KEYS.sales, v); }

  function recordSale(items) {
    const dateKey = new Date().toLocaleDateString();
    let total = 0, cost = 0;
    items.forEach(item => {
      total += parseFloat(item.salePrice) * parseFloat(item.qty);
      cost  += parseFloat(item.costPrice) * parseFloat(item.qty);
    });
    const profit = total - cost;
    const record = { id: Date.now(), date: dateKey, items, total, profit, createdAt: new Date().toISOString() };
    const sales = getSales(); sales.push(record); saveSales(sales);
    items.forEach(item => updateProductQty(item.productId, -parseFloat(item.qty)));
    updateDayFromSales(dateKey);
    const today = new Date().toLocaleDateString();
    const newRev = (parseFloat(localStorage.getItem('todayRev')) || 0) + profit;
    localStorage.setItem('todayRev', String(newRev));
    try {
      const dc = parseFloat(localStorage.getItem('dailyCost')) || 0;
      const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
      if (!history[today]) history[today] = {};
      history[today].revenue     = newRev.toFixed(2);
      history[today].profit      = (newRev - dc).toFixed(2);
      history[today].achievement = dc > 0 ? Math.floor((newRev / dc) * 100) : 100;
      const r = parseFloat(localStorage.getItem('monthlyRent'))   || 0;
      const s = parseFloat(localStorage.getItem('monthlySalary')) || 0;
      const o = parseFloat(localStorage.getItem('monthlyOther'))  || 0;
      const dim = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();
      history[today].costSnapshot = { rent:(r/dim).toFixed(2), salary:(s/dim).toFixed(2), other:(o/dim).toFixed(2) };
      localStorage.setItem('revenue_history', JSON.stringify(history));
    } catch(e) {}
    localStorage.setItem('finance_cash', String((parseFloat(localStorage.getItem('finance_cash'))||0) + total));
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'sale', amount:profit, revenue:total, todayRev:newRev, timestamp:Date.now(),
    }));
    return record;
  }

  function updateDayFromSales(dateKey) {
    const sales   = getSales().filter(s => s.date === dateKey);
    const revenue = sales.reduce((a, s) => a + s.total, 0);
    const profit  = sales.reduce((a, s) => a + s.profit, 0);
    setDay(dateKey, { revenue, profit, grossMargin: revenue>0?Math.round(profit/revenue*100):0, variableCost: revenue-profit });
  }

  // ★ 损耗记录
  // 口径：进价成本（亏了多少本钱）
  // 影响：① 日历历史 loss/lossCount/profit ② revenue_history（realcost-history 联动）
  //       ③ finance_cash 减少  ④ 库存数量扣减
  function recordLoss(productId, qty) {
    const inv = getInventory();
    const p   = inv.find(x => x.id == productId);
    if (!p) return null;
    const lossQty  = Math.min(parseFloat(qty)||1, parseFloat(p.qty)||0);
    const lossCost = lossQty * (parseFloat(p.costPrice)||0);
    const dk       = new Date().toLocaleDateString();

    // 扣库存
    p.qty = Math.max(0, parseFloat(p.qty) - lossQty);
    saveInventory(inv);

    // 写日历历史
    const h = getHistory();
    if (!h[dk]) h[dk] = {};
    h[dk].loss      = (parseFloat(h[dk].loss)||0) + lossCost;
    h[dk].lossCount = (parseInt(h[dk].lossCount)||0) + 1;
    h[dk].profit    = (parseFloat(h[dk].profit)||0) - lossCost;
    saveHistory(h);

    // 写 revenue_history（供 realcost-history 现金流页面联动）
    try {
      const rh = JSON.parse(localStorage.getItem('revenue_history'))||{};
      if (!rh[dk]) rh[dk] = {};
      rh[dk].loss      = ((parseFloat(rh[dk].loss)||0)      + lossCost).toFixed(2);
      rh[dk].lossCount = (parseInt(rh[dk].lossCount)||0)    + 1;
      rh[dk].profit    = ((parseFloat(rh[dk].profit)||0)    - lossCost).toFixed(2);
      localStorage.setItem('revenue_history', JSON.stringify(rh));
    } catch(e) {}

    // 注意：现金不变（进货时已付款），损耗只减少库存资产账面价值
    // 触发 main 监听
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'loss', amount:lossCost, productName:p.name, qty:lossQty, timestamp:Date.now(),
    }));

    return { productName:p.name, qty:lossQty, lossCost, dateKey:dk };
  }

  // ★ 应收账款快速登记（收银台换购后调用）
  // 写入 finance_receivables，通过 realcost_trigger 通知 history 页
  function recordReceivable(counterparty, amount, note, dueDate) {
    const entry = {
      id:           Date.now(),
      counterparty: counterparty || '待填写',
      amount:       parseFloat(amount) || 0,
      note:         note || '',
      date:         new Date().toLocaleDateString(),
      dueDate:      dueDate || null,
      status:       'pending',
      settledDate:  null,
    };
    // 写入本地（供 history 同域读取）
    const list = JSON.parse(localStorage.getItem('finance_receivables')||'[]');
    list.push(entry);
    localStorage.setItem('finance_receivables', JSON.stringify(list));
    // 触发 history 页的 storage 监听
    localStorage.setItem('realcost_trigger', JSON.stringify({
      type:'ar', amount:entry.amount, counterparty:entry.counterparty,
      note:entry.note, dueDate:entry.dueDate, timestamp:Date.now(),
    }));
    return entry;
  }

  function getSalesRanking() {
    const map = {};
    getSales().forEach(s => s.items.forEach(item => {
      if (!map[item.name]) map[item.name] = { name:item.name, totalQty:0, totalRevenue:0, totalProfit:0 };
      map[item.name].totalQty     += parseFloat(item.qty);
      map[item.name].totalRevenue += parseFloat(item.salePrice) * parseFloat(item.qty);
      map[item.name].totalProfit  += (parseFloat(item.salePrice)-parseFloat(item.costPrice)) * parseFloat(item.qty);
    }));
    return Object.values(map).sort((a,b) => b.totalQty-a.totalQty);
  }

  function getSoldProfitRanking() {
    const map = {};
    getSales().forEach(s => s.items.forEach(item => {
      if (!map[item.name]) map[item.name] = { name:item.name, profit:0, qty:0 };
      map[item.name].profit += (parseFloat(item.salePrice)-parseFloat(item.costPrice))*parseFloat(item.qty);
      map[item.name].qty    += parseFloat(item.qty);
    }));
    return Object.values(map).sort((a,b) => b.profit-a.profit);
  }

  function getUnitProfitRanking() {
    const map = {};
    getInventory().forEach(p => {
      const up = parseFloat(p.salePrice) - parseFloat(p.costPrice);
      if (!map[p.name] || up > map[p.name].unitProfit) {
        map[p.name] = { name:p.name, category:p.category, unitProfit:up,
          margin: parseFloat(p.costPrice)>0 ? Math.round(up/parseFloat(p.salePrice)*100):0,
          salePrice:p.salePrice, costPrice:p.costPrice };
      }
    });
    return Object.values(map).sort((a,b) => b.unitProfit-a.unitProfit);
  }

  function getExpiringProducts(days = 7) {
    const cutoff = new Date(Date.now() + days*86400000);
    return getInventory()
      .filter(p => p.expireDate && new Date(p.expireDate) <= cutoff)
      .sort((a,b) => new Date(a.expireDate)-new Date(b.expireDate));
  }

  function fmtMoney(v) {
    v = parseFloat(v) || 0;
    return v >= 10000 ? '¥'+(v/10000).toFixed(1)+'w' : '¥'+v.toFixed(2).replace(/\.00$/,'');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return (d.getMonth()+1)+'/'+d.getDate();
  }
  function daysUntil(dateStr) {
    if (!dateStr) return null;
    return Math.ceil((new Date(dateStr)-new Date())/86400000);
  }

  function getMonthStats(year, month) {
    const h = getHistory();
    let revenue=0, profit=0, days=0, totalLoss=0;
    Object.keys(h).forEach(k => {
      const d = new Date(k);
      if (d.getFullYear()===year && d.getMonth()===month) {
        revenue    += parseFloat(h[k].revenue)||0;
        profit     += parseFloat(h[k].profit)||0;
        totalLoss  += parseFloat(h[k].loss)||0;
        // 有销售或有损耗都算经营日
        if ((parseFloat(h[k].revenue)||0)>0 || (parseFloat(h[k].loss)||0)>0) days++;
      }
    });
    return { revenue, profit, days, totalLoss, gm: revenue>0?Math.round(profit/revenue*100):0 };
  }

  function getStreak() {
    const h=getHistory(), now=new Date(); let s=0;
    for (let i=0;i<365;i++) {
      const d=new Date(now); d.setDate(d.getDate()-i);
      const k=d.toLocaleDateString();
      if (h[k] && parseFloat(h[k].revenue)>0) s++;
      else if (i>0) break;
    }
    return s;
  }

  return {
    getHistory, setDay, getDay,
    getInventory, addProduct, updateProductQty, deleteProduct, getBatchesByName,
    getSales, recordSale, recordLoss, recordReceivable,
    getSalesRanking, getSoldProfitRanking, getUnitProfitRanking,
    getExpiringProducts, getMonthStats, getStreak,
    fmtMoney, fmtDate, daysUntil, KEYS,
  };
})();

// ── 数据迁移 ────────────────────────────────────────────────────────────────
(function runMigrations() {
  const VK='otter_db_version', CV=2;
  const cur = parseInt(localStorage.getItem(VK)||'0');
  if (cur >= CV) return;
  if (cur < 1) {
    try {
      const inv = JSON.parse(localStorage.getItem('otter_inventory'))||[];
      let ch=false;
      inv.forEach(p => { if (!('barcode' in p)) { p.barcode=null; ch=true; } });
      if (ch) localStorage.setItem('otter_inventory', JSON.stringify(inv));
    } catch(e) {}
  }
  if (cur < 2) {
    try {
      const inv = JSON.parse(localStorage.getItem('otter_inventory'))||[];
      const nm={};
      inv.sort((a,b) => new Date(a.createdAt||0)-new Date(b.createdAt||0));
      inv.forEach(p => { if (!p.batchNo) { nm[p.name]=(nm[p.name]||0)+1; p.batchNo=nm[p.name]; } });
      localStorage.setItem('otter_inventory', JSON.stringify(inv));
    } catch(e) {}
  }
  localStorage.setItem(VK, String(CV));
})();

window.Engine = Engine;
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  BatchPicker — 批次选择弹窗
// ════════════════════════════════════════════════════════════════════════════
const BatchPicker = (function () {
  let _resolve = null, _currentBatches = [];

  function open(productName, onPick) {
    const batches = Engine.getBatchesByName(productName);
    if (!batches.length) { onPick && onPick(null); return; }
    if (batches.length === 1) { onPick && onPick(batches[0]); return; }

    document.getElementById('batch-title').textContent = '选择批次 · ' + productName;
    document.getElementById('batch-sub').textContent   = '共 '+batches.length+' 个批次，🟡 为最早入库（先进先出建议优先出货）';

    document.getElementById('batch-list').innerHTML = batches.map((b, i) => {
      const isFifo = i === 0;
      const inDate = b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—';
      return `
        <div class="batch-item${isFifo?' batch-fifo-row':''}" onclick="BatchPicker._pick(${i})">
          <div class="batch-item-top">
            <span class="batch-item-name">批次 ${b.batchNo||(i+1)}${isFifo?'<span class="batch-fifo-tag">先进先出</span>':''}</span>
            <span class="batch-item-sale">售 ${Engine.fmtMoney(b.salePrice)}</span>
          </div>
          <div class="batch-item-meta">
            <span>进价 ${Engine.fmtMoney(b.costPrice)}</span>
            <span>剩余 ${b.qty} 件</span>
            <span>入库 ${inDate}</span>
            ${b.expireDate?'<span>到期 '+Engine.fmtDate(b.expireDate)+'</span>':''}
          </div>
        </div>`;
    }).join('');

    _resolve = onPick;
    _currentBatches = batches;
    document.getElementById('batch-overlay').classList.add('open');
  }

  function _pick(idx) {
    document.getElementById('batch-overlay').classList.remove('open');
    if (_resolve) _resolve(_currentBatches[idx]);
    _resolve = null;
  }

  function close() {
    document.getElementById('batch-overlay').classList.remove('open');
    if (_resolve) _resolve(null);
    _resolve = null;
  }

  return { open, _pick, close };
})();

window.BatchPicker = BatchPicker;
function closeBatchSheet() { BatchPicker.close(); }

// ════════════════════════════════════════════════════════════════════════════
//  ★ DiscountSheet — 优惠弹窗
//  整单快捷折 + 自定义折扣 + 逐行改价，两种方式互斥
//  不修改库存原始售价，仅影响本次交易实收
// ════════════════════════════════════════════════════════════════════════════
const DiscountSheet = (function () {
  let _cart=[], _cb=null, _overrides={}, _wholePct=null;

  function open(cart, onApply) {
    _cart=cart; _cb=onApply; _overrides={}; _wholePct=null;
    // 重置 UI
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('disc-custom-inp').value='';
    // 渲染逐行列表
    document.getElementById('disc-items-list').innerHTML = cart.map((item, i) => `
      <div class="disc-item-row">
        <div class="disc-item-info">
          <div class="disc-item-name">${item.name}${item.batchNo?'<span style="font-size:11px;color:#999;margin-left:4px">批次'+item.batchNo+'</span>':''}</div>
          <div class="disc-item-orig">原价 ${Engine.fmtMoney(item.salePrice)} × ${item.qty} 件</div>
        </div>
        <input class="disc-item-inp" type="number" step="0.01" min="0"
               placeholder="${(item.origSalePrice||item.salePrice).toFixed(2)}"
               data-idx="${i}" oninput="DiscountSheet.onItemPrice(${i},this.value)">
      </div>`).join('');
    _updatePreview();
    document.getElementById('discount-overlay').classList.add('open');
  }

  function setPct(pct) {
    _wholePct=pct; _overrides={};
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.pct)===pct));
    document.getElementById('disc-custom-inp').value=pct;
    document.querySelectorAll('.disc-item-inp').forEach(inp=>inp.value='');
    _updatePreview();
  }

  function onCustomPct() {
    const v = parseFloat(document.getElementById('disc-custom-inp').value);
    _wholePct = (v>0&&v<=100) ? v : null;
    _overrides={};
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.disc-item-inp').forEach(inp=>inp.value='');
    _updatePreview();
  }

  function onItemPrice(idx, val) {
    _wholePct=null;
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('disc-custom-inp').value='';
    const v=parseFloat(val);
    if (!isNaN(v)&&v>=0) _overrides[idx]=v; else delete _overrides[idx];
    _updatePreview();
  }

  function _effectivePrice(item, idx) {
    if (_overrides[idx]!==undefined) return _overrides[idx];
    const base = item.origSalePrice||item.salePrice;
    if (_wholePct!==null) return +(base*_wholePct/100).toFixed(2);
    return item.salePrice;
  }

  function _updatePreview() {
    let total=0, origTotal=0;
    _cart.forEach((item,i)=>{
      total     += _effectivePrice(item,i)*item.qty;
      origTotal += (item.origSalePrice||item.salePrice)*item.qty;
    });
    const saved=origTotal-total;
    document.getElementById('disc-total-preview').textContent=Engine.fmtMoney(total);
    document.getElementById('disc-save-lbl').textContent=saved>0.005?'优惠 '+Engine.fmtMoney(saved):'';
  }

  function apply() {
    const newCart=_cart.map((item,i)=>({
      ...item,
      origSalePrice: item.origSalePrice||item.salePrice,
      salePrice: _effectivePrice(item,i),
    }));
    document.getElementById('discount-overlay').classList.remove('open');
    if (_cb) _cb(newCart);
  }

  function reset() {
    _wholePct=null; _overrides={};
    document.querySelectorAll('.disc-pct-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('disc-custom-inp').value='';
    document.querySelectorAll('.disc-item-inp').forEach(inp=>inp.value='');
    _updatePreview();
  }

  function close() { document.getElementById('discount-overlay').classList.remove('open'); }

  return { open, setPct, onCustomPct, onItemPrice, apply, reset, close };
})();
window.DiscountSheet=DiscountSheet;

// ════════════════════════════════════════════════════════════════════════════
//  ★ LossSheet — 损耗记录弹窗
//  从临期货品页面呼出，记录进价损耗
// ════════════════════════════════════════════════════════════════════════════
const LossSheet = (function () {
  let _prod=null, _qty=1;

  function open(product) {
    _prod=product; _qty=1;
    document.getElementById('loss-prod-name').textContent =
      product.name + (product.batchNo ? '（批次'+product.batchNo+'）' : '');
    document.getElementById('loss-prod-meta').textContent =
      '进价 '+Engine.fmtMoney(product.costPrice)+' · 当前库存 '+product.qty+' 件';
    _render();
    document.getElementById('loss-overlay').classList.add('open');
  }

  function adj(d) {
    _qty = Math.max(1, Math.min(_qty+d, parseFloat(_prod.qty)||1));
    _render();
  }

  function _render() {
    document.getElementById('loss-qty-val').textContent=_qty;
    const cost=_qty*(parseFloat(_prod.costPrice)||0);
    document.getElementById('loss-calc').innerHTML=
      '损耗成本：<span>'+Engine.fmtMoney(cost)+'</span>（'+_qty+' 件 × 进价 '+Engine.fmtMoney(_prod.costPrice)+'）';
  }

  function confirm() {
    if (!_prod) return;
    const result = Engine.recordLoss(_prod.id, _qty);
    document.getElementById('loss-overlay').classList.remove('open');
    // 刷新相关视图
    if (window.Dashboard&&window.Dashboard.refresh) window.Dashboard.refresh();
    const expEl=document.getElementById('view-expiring');
    if (expEl&&expEl.classList.contains('visible')) Dashboard.renderExpiring(expEl);
    // 日历节点补丁：今天若仅有损耗无销售，变为红色
    _patchTodayNode();
    _toast('已记录损耗：'+result.productName+' × '+result.qty+' 件，损耗成本 '+Engine.fmtMoney(result.lossCost));
  }

  function _patchTodayNode() {
    const dk  = new Date().toLocaleDateString();
    const h   = Engine.getHistory()[dk]||{};
    const hasS= parseFloat(h.revenue||0)>0;
    const hasL= parseFloat(h.loss||0)>0;
    if (!hasL||hasS) return; // 有销售时节点颜色不变
    const today=new Date().getDate();
    document.querySelectorAll('.day-node').forEach(el=>{
      const numEl=el.querySelector('.nd-num');
      if (numEl&&parseInt(numEl.textContent)===today) {
        // 移除旧颜色类，加上损耗类
        ['n-done','n-missed','n-future'].forEach(c=>el.classList.remove(c));
        el.classList.add('n-loss');
        const ico=el.querySelector('.nd-ico');
        if (ico) ico.textContent='⚠';
      }
    });
  }

  function _toast(msg) {
    let t=document.getElementById('bco-toast');
    if (!t){t=document.createElement('div');t.id='bco-toast';document.body.appendChild(t);}
    t.textContent=msg;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500);
  }

  function close() { document.getElementById('loss-overlay').classList.remove('open'); }

  return { open, adj, confirm, close };
})();
window.LossSheet=LossSheet;

// ════════════════════════════════════════════════════════════════════════════
//  ★ ARSheet — 应收账款快速登记
//  从收银台呼出，预填差价金额；也可手动填写任意应收
// ════════════════════════════════════════════════════════════════════════════
const ARSheet = (function(){
  function open(prefill) {
    // prefill: { counterparty, amount, note, dueDate }（可选）
    prefill = prefill || {};
    document.getElementById('ar-cp').value       = prefill.counterparty || '';
    document.getElementById('ar-amt').value      = prefill.amount       || '';
    document.getElementById('ar-nt').value       = prefill.note         || '';
    document.getElementById('ar-due-inp').value  = prefill.dueDate      || _defaultDueDate();
    document.getElementById('ar-success').classList.add('hidden');
    document.getElementById('ar-overlay').classList.add('open');
  }

  function _defaultDueDate() {
    // 默认填下月末（月结场景）
    const d = new Date();
    d.setMonth(d.getMonth() + 1);
    d.setDate(new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate());
    return d.toISOString().slice(0, 10);
  }

  function confirm() {
    const cp  = document.getElementById('ar-cp').value.trim();
    const amt = parseFloat(document.getElementById('ar-amt').value);
    const nt  = document.getElementById('ar-nt').value.trim();
    const due = document.getElementById('ar-due-inp').value;
    if (!cp)        { _shake(document.getElementById('ar-cp'));  return; }
    if (!amt||amt<=0){ _shake(document.getElementById('ar-amt')); return; }
    Engine.recordReceivable(cp, amt, nt, due);
    document.getElementById('ar-success').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('ar-success').classList.add('hidden');
      document.getElementById('ar-overlay').classList.remove('open');
    }, 1800);
  }

  function _shake(el) {
    el.style.borderColor='#F44336';
    el.classList.add('shake');
    setTimeout(()=>{ el.classList.remove('shake'); el.style.borderColor=''; }, 600);
  }

  function close() { document.getElementById('ar-overlay').classList.remove('open'); }

  return { open, confirm, close };
})();
window.ARSheet = ARSheet;
function closeARSheet() { ARSheet.close(); }
</script>

const BarcodeDB=(function(){

<script>
// ════════════════════════════════════════════════════════════════════════════
//  Accounting — 收银台 & 库存录入
// ════════════════════════════════════════════════════════════════════════════
const Accounting = (function () {

// ── 收银台 ──────────────────────────────────────────────────────────────────
function renderCashier(container) {
  let cart = [];

  container.innerHTML = `
    <div class="page-cashier">
      <div class="page-title-bar">
        <span class="page-title-icon">🛒</span>
        <span class="page-title-text">开始收银</span>
      </div>
      <div class="search-wrap">
        <div class="search-box" style="position:relative;">
          <span class="search-ico">🔍</span>
          <input id="cashier-search" class="search-inp" type="text"
                 placeholder="搜索商品名称…" autocomplete="off" style="padding-right:52px;">
          <button class="scan-trigger-btn" style="position:absolute;right:6px;"
                  title="扫描条形码" onclick="Accounting._cashierScan()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2"  y="4" width="2"  height="16" rx=".4"/>
              <rect x="6"  y="4" width="1"  height="16" rx=".4"/>
              <rect x="9"  y="4" width="2"  height="16" rx=".4"/>
              <rect x="13" y="4" width="1"  height="16" rx=".4"/>
              <rect x="16" y="4" width="2"  height="16" rx=".4"/>
              <rect x="20" y="4" width="2"  height="16" rx=".4"/>
            </svg>
          </button>
        </div>
        <div id="cashier-dropdown" class="search-dropdown hidden"></div>
      </div>
      <div class="section-label">已选商品</div>
      <div id="cashier-cart" class="cart-list"></div>
      <div class="cashier-total-bar">
        <div class="ct-left">
          <div class="ct-items" id="ct-items">0 件商品</div>
          <div class="ct-total" id="ct-total">¥0.00</div>
        </div>
        <!-- ★ 优惠按钮 -->
        <button class="ct-disc-btn" id="ct-disc-btn" disabled onclick="Accounting._openDiscount()">🏷️ 优惠</button>
        <button class="ct-btn" id="ct-btn" onclick="Accounting._submitSale()" disabled>出售</button>
      </div>
      <!-- ★ 应收快捷入口（独立于收银流程，随时可用）-->
      <div style="text-align:center;margin-top:-4px;margin-bottom:8px">
        <button onclick="ARSheet.open()" style="background:none;border:none;color:var(--orange);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;padding:4px 0">
          📬 登记应收账款（换购差价/厂家补贴）
        </button>
      </div>
      <div id="cashier-success" class="sale-success hidden">
        <div class="ss-icon">🎉</div>
        <div class="ss-text">出售成功！</div>
        <div class="ss-sub" id="ss-sub"></div>
      </div>
    </div>`;

  const inp = container.querySelector('#cashier-search');
  const dd  = container.querySelector('#cashier-dropdown');

  Accounting._cashierScan = () => {
    BarcodeScanner.open((code) => {
      BarcodeScanner.close();
      const prod = Engine.getInventory().filter(p=>parseFloat(p.qty)>0).find(p=>p.barcode===code);
      if (prod) { _pickAndAdd(prod.name); }
      else { _showToast('⚠️ 库存中没有条码 '+code+' 的商品，请先录入'); }
    });
  };

  // ★ 优惠按钮入口
  Accounting._openDiscount = () => {
    if (!cart.length) return;
    DiscountSheet.open(cart, (newCart) => { cart=newCart; renderCart(); });
  };

  inp.addEventListener('input', () => {
    const q   = inp.value.trim().toLowerCase();
    const inv = Engine.getInventory().filter(p=>parseFloat(p.qty)>0);
    if (!q) { dd.classList.add('hidden'); return; }
    const nameMap={};
    inv.forEach(p=>{
      if (!p.name.toLowerCase().includes(q)&&!(p.barcode&&p.barcode.includes(q))) return;
      if (!nameMap[p.name]) nameMap[p.name]={name:p.name,totalQty:0,batches:0};
      nameMap[p.name].totalQty+=parseFloat(p.qty);
      nameMap[p.name].batches++;
    });
    const results=Object.values(nameMap);
    dd.innerHTML=results.length
      ?results.map(r=>`<div class="dd-item" data-name="${r.name}"><span class="dd-name">${r.name}</span><span class="dd-info">库存${r.totalQty}件${r.batches>1?' · '+r.batches+'个批次':''}</span></div>`).join('')
      :'<div class="dd-empty">没有找到商品</div>';
    dd.querySelectorAll('.dd-item').forEach(el=>{
      el.onclick=()=>{inp.value='';dd.classList.add('hidden');_pickAndAdd(el.dataset.name);};
    });
    dd.classList.remove('hidden');
  });

  document.addEventListener('click', e=>{
    if (!container.querySelector('.search-wrap').contains(e.target)) dd.classList.add('hidden');
  });

  function _pickAndAdd(productName) {
    BatchPicker.open(productName, (batch)=>{ if(batch) addToCart(batch); });
  }

  function addToCart(prod) {
    const existing=cart.find(c=>c.productId===prod.id);
    if (existing) { existing.qty=Math.min(existing.qty+1,parseFloat(prod.qty)); }
    else {
      cart.push({ productId:prod.id, name:prod.name, batchNo:prod.batchNo, qty:1,
        costPrice:parseFloat(prod.costPrice), salePrice:parseFloat(prod.salePrice),
        maxQty:parseFloat(prod.qty) });
    }
    renderCart();
  }

  function renderCart() {
    const el=container.querySelector('#cashier-cart');
    el.innerHTML=cart.length
      ?cart.map((item,i)=>`
        <div class="cart-item">
          <div class="ci-info">
            <div class="ci-name">${item.name}${item.batchNo?'<span style="font-size:11px;color:#999;font-weight:700;margin-left:4px">批次'+item.batchNo+'</span>':''}</div>
            <div class="ci-price">
              ${item.origSalePrice&&item.origSalePrice!==item.salePrice
                ?'<span style="text-decoration:line-through;color:#CCC;margin-right:3px">'+Engine.fmtMoney(item.origSalePrice)+'</span><span style="color:var(--red)">'+Engine.fmtMoney(item.salePrice)+'</span>'
                :Engine.fmtMoney(item.salePrice)}/件 · 进价 ${Engine.fmtMoney(item.costPrice)}
            </div>
          </div>
          <div class="ci-qty-ctrl">
            <button class="qty-btn" onclick="Accounting._cartQty(${i},-1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="Accounting._cartQty(${i},1)">+</button>
          </div>
          <div class="ci-subtotal">${Engine.fmtMoney(item.salePrice*item.qty)}</div>
          <button class="ci-del" onclick="Accounting._cartDel(${i})">✕</button>
        </div>`).join('')
      :'<div class="cart-empty">搜索或扫码添加商品 🛍️</div>';
    _updateTotal();
  }

  function _updateTotal() {
    const total=cart.reduce((a,c)=>a+c.salePrice*c.qty,0);
    const count=cart.reduce((a,c)=>a+c.qty,0);
    container.querySelector('#ct-items').textContent=count+' 件商品';
    container.querySelector('#ct-total').textContent=Engine.fmtMoney(total);
    const empty=cart.length===0;
    container.querySelector('#ct-btn').disabled=empty;
    container.querySelector('#ct-disc-btn').disabled=empty;
  }

  Accounting._cartQty=(i,d)=>{cart[i].qty=Math.max(1,Math.min(cart[i].qty+d,cart[i].maxQty));renderCart();};
  Accounting._cartDel=(i)=>{cart.splice(i,1);renderCart();};
  Accounting._submitSale=()=>{
    if(!cart.length)return;
    const record=Engine.recordSale(cart);
    cart=[];renderCart();
    const su=container.querySelector('#cashier-success');
    container.querySelector('#ss-sub').textContent='共收 '+Engine.fmtMoney(record.total)+' · 毛利 '+Engine.fmtMoney(record.profit);
    su.classList.remove('hidden');su.style.animation='none';
    requestAnimationFrame(()=>{su.style.animation='';});
    setTimeout(()=>su.classList.add('hidden'),3000);
    if(window.Dashboard&&window.Dashboard.refresh)window.Dashboard.refresh();
  };

  renderCart();
}

// ── 库存录入 / 进货 ─────────────────────────────────────────────────────────
function renderEntry(container)   { _renderForm(container,'entry',  '库存录入','➕','将现有商品录入库存系统'); }
function renderRestock(container) { _renderForm(container,'restock','进货',    '📦','记录新到货商品，自动补充库存'); }

const CATS = ['食品饮料','日用百货','休闲零食','冷冻冷藏','酒水','烟草','其他'];

function _renderForm(container, source, title, icon, subtitle) {
  container.innerHTML = `
    <div class="page-form">
      <div class="page-title-bar"><span class="page-title-icon">${icon}</span><span class="page-title-text">${title}</span></div>
      <div class="form-subtitle">${subtitle}</div>
      <div class="form-card">
        <div class="form-group">
          <label class="form-lbl">商品名称 *</label>
          <div class="f-name-wrap">
            <input id="f-name" class="form-inp" type="text" placeholder="例：农夫山泉 550ml" autocomplete="off">
            <button class="scan-trigger-btn" title="扫描条形码" onclick="Accounting._openScanner()">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2"  y="4" width="2"  height="16" rx=".4"/><rect x="6"  y="4" width="1"  height="16" rx=".4"/>
                <rect x="9"  y="4" width="2"  height="16" rx=".4"/><rect x="13" y="4" width="1"  height="16" rx=".4"/>
                <rect x="16" y="4" width="2"  height="16" rx=".4"/><rect x="20" y="4" width="2"  height="16" rx=".4"/>
              </svg>
            </button>
          </div>
          <div class="f-barcode-tag" id="f-barcode-tag">条形码：<span id="f-barcode-val"></span></div>
        </div>
        <div class="form-group">
          <label class="form-lbl">商品分类</label>
          <div class="cat-chips" id="cat-chips">
            ${CATS.map((c,i)=>`<button class="cat-chip${i===0?' active':''}" data-cat="${c}">${c}</button>`).join('')}
          </div>
        </div>
        <div class="form-row">
          <div class="form-group half"><label class="form-lbl">进价 (¥) *</label><input id="f-cost" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00"></div>
          <div class="form-group half"><label class="form-lbl">售价 (¥) *</label><input id="f-sale" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00"></div>
        </div>
        <div class="form-row">
          <div class="form-group half"><label class="form-lbl">数量 *</label><input id="f-qty" class="form-inp" type="number" min="1" step="1" placeholder="0"></div>
          <div class="form-group half"><label class="form-lbl">过期日期</label><input id="f-exp" class="form-inp" type="date"></div>
        </div>
        <div class="margin-preview" id="margin-preview" style="display:none">
          <span class="mp-label">毛利预览</span>
          <span class="mp-unit" id="mp-unit">单件毛利 ¥—</span>
          <span class="mp-rate" id="mp-rate">毛利率 —%</span>
        </div>
      </div>
      <button class="form-submit" onclick="Accounting._submitForm('${source}')"><span>${icon}</span> 确认${title}</button>
      <div class="form-success hidden" id="f-success">✅ ${title}成功！</div>
      <div class="section-label" style="margin-top:24px">${title}历史</div>
      <div id="form-history" class="form-history-list"></div>
    </div>`;

  let _currentBarcode = null;

  Accounting._openScanner = () => {
    BarcodeScanner.open(async (code) => {
      BarcodeScanner.close();
      _currentBarcode=code;
      const tg=container.querySelector('#f-barcode-tag'),vl=container.querySelector('#f-barcode-val');
      if(tg&&vl){vl.textContent=code;tg.classList.add('show');}
      try {
        const data=await BarcodeDB.query(code);
        if(data.found){
          const ne=container.querySelector('#f-name'),ce=container.querySelector('#f-cost'),se=container.querySelector('#f-sale');
          if(ne){ne.value=data.name;ne.classList.add('auto-filled');}
          if(ce&&data.costPrice){ce.value=data.costPrice;ce.classList.add('auto-filled');}
          if(se&&data.salePrice){se.value=data.salePrice;se.classList.add('auto-filled');}
          if(data.category)container.querySelectorAll('.cat-chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===data.category));
          _showToast('✅ 已自动填入：'+data.name);
          container.querySelector('#f-cost').dispatchEvent(new Event('input'));
        } else { _showToast('📝 新商品，请填写商品信息后录入'); }
      } catch(e) { _showToast('⚠️ 查询失败，请手动填写商品信息'); }
    });
  };

  container.querySelectorAll('.cat-chip').forEach(btn=>{
    btn.onclick=()=>{container.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
  });

  ['f-cost','f-sale'].forEach(id=>{
    container.querySelector('#'+id).addEventListener('input',()=>{
      const c=parseFloat(container.querySelector('#f-cost').value)||0;
      const s=parseFloat(container.querySelector('#f-sale').value)||0;
      const mp=container.querySelector('#margin-preview');
      if(c>0&&s>0){const p=s-c,r=Math.round(p/s*100);mp.style.display='flex';
        container.querySelector('#mp-unit').textContent='单件毛利 '+Engine.fmtMoney(p);
        const re=container.querySelector('#mp-rate');re.textContent='毛利率 '+r+'%';
        re.style.color=r>=20?'#4CAF50':r>=0?'#FF6B35':'#F44336';}
      else mp.style.display='none';
    });
  });

  Accounting._submitForm = (src) => {
    const name   =container.querySelector('#f-name').value.trim();
    const cost   =parseFloat(container.querySelector('#f-cost').value);
    const sale   =parseFloat(container.querySelector('#f-sale').value);
    const qty    =parseFloat(container.querySelector('#f-qty').value);
    const expDate=container.querySelector('#f-exp').value;
    const cat    =container.querySelector('.cat-chip.active')?.dataset.cat||'其他';
    if(!name)                  return _shake(container.querySelector('#f-name'), '请填写商品名称');
    if(isNaN(cost)||cost<0)    return _shake(container.querySelector('#f-cost'), '请填写有效进价');
    if(isNaN(sale)||sale<0)    return _shake(container.querySelector('#f-sale'), '请填写有效售价');
    if(isNaN(qty)||qty<1)      return _shake(container.querySelector('#f-qty'),  '数量至少为1');
    Engine.addProduct({barcode:_currentBarcode||null,name,category:cat,qty,costPrice:cost,salePrice:sale,expireDate:expDate,source:src,createdAt:new Date().toISOString()});
    BarcodeDB.report({barcode:_currentBarcode,name,category:cat,costPrice:cost,salePrice:sale,qty,expireDate:expDate});
    ['f-name','f-cost','f-sale','f-qty','f-exp'].forEach(id=>container.querySelector('#'+id).value='');
    container.querySelector('#margin-preview').style.display='none';
    const tg=container.querySelector('#f-barcode-tag');if(tg)tg.classList.remove('show');_currentBarcode=null;
    const su=container.querySelector('#f-success');su.classList.remove('hidden');setTimeout(()=>su.classList.add('hidden'),2000);
    renderHistory();
    if(window.Dashboard&&window.Dashboard.refresh)window.Dashboard.refresh();
  };

  function renderHistory() {
    const el=container.querySelector('#form-history');
    const inv=Engine.getInventory().filter(p=>p.source===source).slice(-10).reverse();
    el.innerHTML=inv.length
      ?inv.map(p=>`<div class="hist-item">
          <div class="hi-left">
            <div class="hi-name">${p.name}${p.batchNo?'<span style="font-size:10px;color:#999;margin-left:4px">批次'+p.batchNo+'</span>':''}</div>
            <div class="hi-meta">${p.category} · 进价${Engine.fmtMoney(p.costPrice)} · 售价${Engine.fmtMoney(p.salePrice)}</div>
          </div>
          <div class="hi-right">
            <div class="hi-qty">×${p.qty}</div>
            ${p.expireDate?`<div class="hi-exp">到期${Engine.fmtDate(p.expireDate)}</div>`:''}
          </div>
        </div>`).join('')
      :'<div class="hist-empty">暂无记录</div>';
  }
  renderHistory();
}

function _shake(el,msg){el.style.borderColor='#F44336';el.placeholder=msg;el.classList.add('shake');setTimeout(()=>{el.classList.remove('shake');el.style.borderColor='';},600);}

function _showToast(msg){
  let t=document.getElementById('bco-toast');
  if(!t){t=document.createElement('div');t.id='bco-toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2800);
}

return { renderCashier, renderEntry, renderRestock };
})();
window.Accounting=Accounting;
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  Dashboard — 库存看板、临期货品、排行榜
// ════════════════════════════════════════════════════════════════════════════
const Dashboard = (function () {
  let _inventoryContainer = null;

  function renderInventory(container) { _inventoryContainer=container; _drawInventory(container); }

  function _drawInventory(container) {
    const inv = Engine.getInventory();
    container.innerHTML = `
      <div class="page-dashboard">
        <div class="page-title-bar">
          <span class="page-title-icon">📦</span>
          <span class="page-title-text">库存看板</span>
          <span class="inv-total-chip">${inv.length} 条批次</span>
        </div>
        <div class="inv-summary-row">
          <div class="inv-sc"><div class="inv-sc-val">${inv.reduce((a,p)=>a+(parseFloat(p.qty)||0),0)}</div><div class="inv-sc-lbl">总库存件数</div></div>
          <div class="inv-sc"><div class="inv-sc-val">${Engine.fmtMoney(inv.reduce((a,p)=>a+(parseFloat(p.costPrice)||0)*(parseFloat(p.qty)||0),0))}</div><div class="inv-sc-lbl">库存进价总值</div></div>
          <div class="inv-sc"><div class="inv-sc-val">${Engine.fmtMoney(inv.reduce((a,p)=>a+(parseFloat(p.salePrice)||0)*(parseFloat(p.qty)||0),0))}</div><div class="inv-sc-lbl">库存售价总值</div></div>
        </div>
        <div class="inv-search-wrap"><span class="search-ico">🔍</span><input id="inv-search" class="search-inp" type="text" placeholder="搜索商品名称…"></div>
        ${!inv.length?'<div class="inv-empty">暂无库存商品<br>请先在「库存录入」或「进货」中添加</div>':''}
        <div id="inv-tables"></div>
      </div>`;

    let filterQ='';
    const searchEl=container.querySelector('#inv-search');
    if(searchEl){searchEl.addEventListener('input',()=>{filterQ=searchEl.value.trim().toLowerCase();renderTables();});}

    function renderTables() {
      const tbContainer=container.querySelector('#inv-tables');if(!tbContainer)return;
      const filtered=filterQ?inv.filter(p=>p.name.toLowerCase().includes(filterQ)):inv;
      if(!filtered.length){tbContainer.innerHTML='<div class="inv-empty">没有匹配的商品</div>';return;}
      const grouped={};
      filtered.forEach(p=>{const cat=p.category||'其他';if(!grouped[cat])grouped[cat]=[];grouped[cat].push(p);});
      tbContainer.innerHTML=Object.keys(grouped).sort().map(cat=>{
        const items=grouped[cat];
        const sorted=[...items].sort((a,b)=>a.name.localeCompare(b.name)||(a.batchNo||0)-(b.batchNo||0));
        const nameCount={};sorted.forEach(p=>{nameCount[p.name]=(nameCount[p.name]||0)+1;});
        const nameFirst={};
        const fifoIds=new Set();
        sorted.forEach(p=>{if(!nameFirst[p.name]){nameFirst[p.name]=p.id;fifoIds.add(p.id);}});

        const rows=sorted.map(p=>{
          const dl=Engine.daysUntil(p.expireDate);
          const ec=dl!==null&&dl<=3?'exp-danger':dl!==null&&dl<=7?'exp-warn':'';
          const qc=parseFloat(p.qty)===0?'qty-zero':parseFloat(p.qty)<=5?'qty-low':'';
          const showFifo=nameCount[p.name]>1&&fifoIds.has(p.id);
          return `<tr${showFifo?' class="batch-fifo-row"':''}>
            <td class="inv-td td-name">
              ${p.name}<span class="batch-tag">批${p.batchNo||1}</span>
              ${showFifo?'<span style="font-size:10px;color:var(--green);font-weight:800;margin-left:2px">先出</span>':''}
            </td>
            <td class="inv-td td-qty ${qc}">${p.qty}</td>
            <td class="inv-td td-cost">${Engine.fmtMoney(p.costPrice)}</td>
            <td class="inv-td td-sale">${Engine.fmtMoney(p.salePrice)}</td>
            <td class="inv-td td-exp ${ec}">
              ${p.expireDate?(dl<0?'<span class="expired-badge">已过期</span>':dl===0?'<span class="exp-today">今天到期</span>':Engine.fmtDate(p.expireDate)+'('+dl+'d)'):'—'}
            </td>
            <td class="inv-td td-act"><button class="inv-del-btn" onclick="Dashboard._deleteProduct(${p.id})">🗑</button></td>
          </tr>`;
        }).join('');

        return `<div class="inv-cat-section">
          <div class="inv-cat-header"><span class="inv-cat-name">${cat}</span><span class="inv-cat-count">${items.length} 条</span></div>
          <div class="inv-table-wrap"><table class="inv-table">
            <thead><tr><th class="inv-th">商品名称</th><th class="inv-th">数量</th><th class="inv-th">进价</th><th class="inv-th">售价</th><th class="inv-th">过期日</th><th class="inv-th"></th></tr></thead>
            <tbody>${rows}</tbody>
          </table></div>
        </div>`;
      }).join('');
    }
    renderTables();
    Dashboard._deleteProduct=(id)=>{if(!confirm('确定删除此批次？'))return;Engine.deleteProduct(id);_drawInventory(container);};
  }

  function refresh() { if(_inventoryContainer) _drawInventory(_inventoryContainer); }

  function renderExpiring(container) {
    container.innerHTML = `
      <div class="page-expiring">
        <div class="page-title-bar"><span class="page-title-icon">⏰</span><span class="page-title-text">临期货品</span></div>
        <div class="exp-filter-row">
          <button class="exp-filter-btn active" data-days="7">7天内</button>
          <button class="exp-filter-btn" data-days="14">14天内</button>
          <button class="exp-filter-btn" data-days="30">30天内</button>
          <button class="exp-filter-btn" data-days="0">已过期</button>
        </div>
        <div id="exp-content"></div>
      </div>`;
    let activeDays=7;
    container.querySelectorAll('.exp-filter-btn').forEach(btn=>{
      btn.onclick=()=>{container.querySelectorAll('.exp-filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeDays=parseInt(btn.dataset.days);renderExpContent();};
    });
    function renderExpContent() {
      const el=container.querySelector('#exp-content');
      const items=activeDays===0
        ?Engine.getInventory().filter(p=>p.expireDate&&Engine.daysUntil(p.expireDate)<0).sort((a,b)=>new Date(a.expireDate)-new Date(b.expireDate))
        :Engine.getExpiringProducts(activeDays);
      if(!items.length){el.innerHTML=`<div class="exp-empty"><div class="exp-empty-icon">✨</div><div>暂无${activeDays===0?'过期':activeDays+'天内临期'}商品</div></div>`;return;}
      el.innerHTML=`<div class="exp-summary">共 <b>${items.length}</b> 种商品需要关注</div>`
        +items.map(p=>{
          const d=Engine.daysUntil(p.expireDate);
          const u=d<0?'exp-card-danger':d===0?'exp-card-danger':d<=3?'exp-card-warn':'exp-card-ok';
          const badge=d<0?`已过期 ${Math.abs(d)} 天`:d===0?'今天到期':`还剩 ${d} 天`;
          // ★ 序列化 product 对象用于传参（避免 JSON.stringify 的引号转义问题）
          const prodJson=encodeURIComponent(JSON.stringify(p));
          return `<div class="exp-card ${u}">
            <div class="exp-card-left">
              <div class="exp-card-name">${p.name}${p.batchNo?'<span style="font-size:11px;color:#999;margin-left:4px">批次'+p.batchNo+'</span>':''}</div>
              <div class="exp-card-meta">${p.category||'其他'} · 库存 ${p.qty} 件</div>
              <div class="exp-card-price">进价 ${Engine.fmtMoney(p.costPrice)} · 售价 ${Engine.fmtMoney(p.salePrice)}</div>
              <button class="exp-loss-btn" onclick="LossSheet.open(JSON.parse(decodeURIComponent('${prodJson}')))">📦 记录损耗</button>
            </div>
            <div class="exp-card-right"><div class="exp-badge ${u}">${badge}</div><div class="exp-date">${p.expireDate}</div></div>
          </div>`;
        }).join('');
    }
    renderExpContent();
  }

  function renderSalesRanking(container) {
    const data=Engine.getSalesRanking();
    _renderRanking(container,{title:'销量排行',icon:'📊',subtitle:'统计开业以来累计售出数量',
      data,valueKey:'totalQty',valueFmt:v=>v+' 件',subFmt:item=>'营收 '+Engine.fmtMoney(item.totalRevenue),emptyMsg:'还没有销售记录，快去收银吧！'});
  }

  function renderProfitRanking(container) {
    container.innerHTML=`<div class="page-ranking">
      <div class="page-title-bar"><span class="page-title-icon">💹</span><span class="page-title-text">毛利排行</span></div>
      <div class="rank-tab-row">
        <button class="rank-tab active" id="rtab-sold" onclick="Dashboard._switchRankTab('sold')">已售毛利榜</button>
        <button class="rank-tab" id="rtab-unit" onclick="Dashboard._switchRankTab('unit')">单品毛利榜</button>
      </div>
      <div id="rank-panel-sold"></div><div id="rank-panel-unit" style="display:none"></div>
    </div>`;
    Dashboard._switchRankTab=(tab)=>{['sold','unit'].forEach(t=>{container.querySelector('#rtab-'+t).classList.toggle('active',t===tab);container.querySelector('#rank-panel-'+t).style.display=t===tab?'':'none';});};
    const sd=Engine.getSoldProfitRanking(),ms=sd.length?sd[0].profit:1;
    container.querySelector('#rank-panel-sold').innerHTML=sd.length
      ?`<div class="rank-subtitle">售价×售出量 − 进价×售出量，贡献总毛利</div>${sd.map((it,i)=>_rankCard(it,i,it.profit,ms,Engine.fmtMoney(it.profit),'已售 '+it.qty+' 件')).join('')}`
      :'<div class="rank-empty">暂无销售数据</div>';
    const ud=Engine.getUnitProfitRanking(),mu=ud.length?ud[0].unitProfit:1;
    container.querySelector('#rank-panel-unit').innerHTML=ud.length
      ?`<div class="rank-subtitle">所有商品单件毛利（售价 − 进价），不论是否售出</div>${ud.map((it,i)=>_rankCard(it,i,it.unitProfit,mu,Engine.fmtMoney(it.unitProfit)+'/件','毛利率 '+it.margin+'%')).join('')}`
      :'<div class="rank-empty">请先录入商品</div>';
  }

  function _renderRanking(container,opts) {
    const{title,icon,subtitle,data,valueFmt,subFmt,emptyMsg}=opts;
    const max=data.length?data[0][opts.valueKey]:1;
    container.innerHTML=`<div class="page-ranking">
      <div class="page-title-bar"><span class="page-title-icon">${icon}</span><span class="page-title-text">${title}</span></div>
      <div class="rank-subtitle">${subtitle}</div>
      ${!data.length?`<div class="rank-empty">${emptyMsg}</div>`:data.map((it,i)=>_rankCard(it,i,it[opts.valueKey],max,valueFmt(it[opts.valueKey]),subFmt(it))).join('')}
    </div>`;
  }

  function _rankCard(item,i,val,max,vl,sl) {
    const medals=['🥇','🥈','🥉'],bc=['#FF6B35','#FF9900','#4CAF50','#2196F3','#9C27B0'];
    const pct=max>0?Math.max(4,Math.round(val/max*100)):4;
    const medal=i<3?medals[i]:'<span class="rank-num">'+(i+1)+'</span>';
    return `<div class="rank-card ${i<3?'rank-top-'+(i+1):''}">
      <div class="rc-medal">${medal}</div>
      <div class="rc-body">
        <div class="rc-name">${item.name}</div>
        <div class="rc-bar-wrap"><div class="rc-bar" style="width:${pct}%;background:${bc[Math.min(i,4)]}"></div></div>
        <div class="rc-sub">${sl}</div>
      </div>
      <div class="rc-val">${vl}</div>
    </div>`;
  }

  return { renderInventory, renderExpiring, renderSalesRanking, renderProfitRanking, refresh };
})();
window.Dashboard = Dashboard;
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  主应用逻辑
// ════════════════════════════════════════════════════════════════════════════
var now   = new Date();
var YEAR  = now.getFullYear();
var MONTH = now.getMonth();
var TODAY = now.getDate();
var DAYS  = new Date(YEAR, MONTH+1, 0).getDate();
var MN    = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function dateKey(d) { return new Date(YEAR, MONTH, d).toLocaleDateString(); }

function switchTab(btn, viewId) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn && btn.classList) btn.classList.add('active');
  document.querySelectorAll('.page-view').forEach(v => v.classList.remove('visible'));
  var calView = document.getElementById('view-calendar');
  calView.style.display = 'none';
  if (viewId === 'calendar') {
    calView.style.display = '';
  } else {
    var el = document.getElementById('view-' + viewId);
    if (el) {
      el.classList.add('visible');
      if      (viewId === 'inventory') Dashboard.renderInventory(el);
      else if (viewId === 'expiring')  Dashboard.renderExpiring(el);
      else if (viewId === 'sales')     Dashboard.renderSalesRanking(el);
      else if (viewId === 'profit')    Dashboard.renderProfitRanking(el);
      else if (viewId === 'entry')     Accounting.renderEntry(el);
      else if (viewId === 'restock')   Accounting.renderRestock(el);
      else if (viewId === 'cashier')   Accounting.renderCashier(el);
    }
  }
}

function updateHeader() {
  var s = Engine.getMonthStats(YEAR, MONTH);
  document.getElementById('mh-title').textContent = YEAR+'年'+MN[MONTH];
  document.getElementById('mh-sub').textContent   = '本月已记录 '+s.days+' 天';
  document.getElementById('mh-rev').textContent   = Engine.fmtMoney(s.profit);
}

var X_POSITIONS = [50, 68, 80, 68, 50, 32, 20, 32];
var Y_STEP = 100, Y_START = 70;

function getNodeCoords(index, W) {
  var xPct = X_POSITIONS[index % X_POSITIONS.length];
  return { x: W * xPct / 100, y: Y_START + index * Y_STEP };
}

function buildSnake() {
  var track = document.getElementById('snake-track');
  var svg   = document.getElementById('snake-svg');
  var h     = Engine.getHistory();
  var W     = track.offsetWidth || 375;
  var trackH = Y_START + (DAYS+1) * Y_STEP + 60;
  track.style.height = trackH + 'px';
  svg.setAttribute('height', trackH);
  svg.setAttribute('viewBox', '0 0 '+W+' '+trackH);
  var coords = [];
  for (var i = 0; i <= DAYS; i++) coords.push(getNodeCoords(i, W));
  // 连线
  var pathD = '';
  for (var i = 0; i < coords.length-1; i++) {
    var a=coords[i], b=coords[i+1];
    if (i===0) pathD='M '+a.x+' '+a.y;
    var my=(a.y+b.y)/2;
    pathD+=' Q '+a.x+' '+my+' '+b.x+' '+b.y;
  }
  var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
  pathEl.setAttribute('d',pathD);pathEl.setAttribute('fill','none');
  pathEl.setAttribute('stroke','#E0E0E0');pathEl.setAttribute('stroke-width','8');pathEl.setAttribute('stroke-linecap','round');
  svg.appendChild(pathEl);
  // 日期节点
  for (var day = 1; day <= DAYS; day++) {
    var idx=day-1, pos=coords[idx], key=dateKey(day), data=h[key]||null;
    var hasSales = data && parseFloat(data.revenue)>0;
    var hasLoss  = data && parseFloat(data.loss||0)>0;   // ★ 损耗判断
    var isToday=day===TODAY, isPast=day<TODAY, isFuture=day>TODAY;
    var node=document.createElement('div');
    node.className='day-node';
    node.style.left=pos.x+'px'; node.style.top=pos.y+'px';
    node.style.animationDelay=(idx*35)+'ms';
    if (isToday)            node.classList.add('n-today');
    else if (isFuture)      node.classList.add('n-future');
    else if (hasSales)      node.classList.add('n-done');
    else if (hasLoss)       node.classList.add('n-loss');   // ★ 仅有损耗无销售：红色
    else                    node.classList.add('n-missed');
    if (isToday) {
      var tag=document.createElement('div');tag.className='today-tag';tag.textContent='今天';node.appendChild(tag);
    }
    var numEl=document.createElement('div');numEl.className='nd-num';numEl.textContent=day;node.appendChild(numEl);
    var icoEl=document.createElement('div');icoEl.className='nd-ico';
    icoEl.textContent=isToday?'⭐':hasSales?'✓':hasLoss?'⚠':isPast?'✗':'';  // ★ 损耗图标
    node.appendChild(icoEl);
    (function(d,k,dat,isT,isF,isP,hS,hL){
      node.onclick=function(){ openSheet(d,k,dat,isT,isF,isP,hS,hL); };
    })(day,key,data,isToday,isFuture,isPast,hasSales,hasLoss);
    track.appendChild(node);
  }
  // 吉祥物
  var mi=Math.floor(DAYS/2), mp=coords[mi];
  var mascot=document.createElement('div');mascot.className='mascot-node';
  mascot.style.left=(mp.x+(mp.x>W*.5?-80:80))+'px';mascot.style.top=mp.y+'px';mascot.textContent='🦦';
  track.appendChild(mascot);
  // 宝箱
  var cp=coords[DAYS], chest=document.createElement('div');chest.className='chest-node';
  chest.style.left=cp.x+'px';chest.style.top=cp.y+'px';
  chest.innerHTML='<div class="ch-icon">'+(TODAY>=DAYS?'🏆':'🔒')+'</div><div class="ch-label">月度总结</div>';
  chest.onclick=openChest;track.appendChild(chest);
}

function openSheet(day, key, data, isToday, isFuture, isPast, hasSales, hasLoss) {
  document.getElementById('sh-date').textContent = (MONTH+1)+'月'+day+'日';
  var metrics=document.getElementById('sh-metrics'), btnRow=document.getElementById('sh-btn-row');

  if (isFuture) {
    document.getElementById('sh-status').textContent='还没到这天哦 🔒';
    metrics.innerHTML=''; btnRow.innerHTML='';
  } else if (!hasSales && !hasLoss && !isToday) {
    document.getElementById('sh-status').textContent='这天没有记录';
    metrics.innerHTML='<div class="mc"><div class="mc-lbl">营收</div><div class="mc-val">¥0</div></div><div class="mc"><div class="mc-lbl">经营盈余</div><div class="mc-val">—</div></div>';
    btnRow.innerHTML='';
  } else {
    const cd=Engine.getDay(key)||data||{};
    var rev=parseFloat(cd.revenue)||0, prof=parseFloat(cd.profit)||0;
    var varC=parseFloat(cd.variableCost)||(rev-prof);
    var gm=cd.grossMargin||(rev>0?Math.round(prof/rev*100):null);
    var loss=parseFloat(cd.loss)||0;
    var statusTxt=isToday?'今天 · 进行中':(hasSales?'已完成 ✓':(hasLoss?'有损耗记录 ⚠':'暂无记录'));
    document.getElementById('sh-status').textContent=statusTxt;
    metrics.innerHTML=
      `<div class="mc"><div class="mc-lbl">营收</div><div class="mc-val o">${Engine.fmtMoney(rev)}</div></div>`+
      `<div class="mc"><div class="mc-lbl">毛利</div><div class="mc-val ${prof>=0?'g':'r'}">${Engine.fmtMoney(prof)}</div></div>`+
      `<div class="mc"><div class="mc-lbl">变动成本</div><div class="mc-val">${Engine.fmtMoney(varC)}</div></div>`+
      `<div class="mc"><div class="mc-lbl">损耗成本</div><div class="mc-val r">${loss>0?Engine.fmtMoney(loss):'—'}</div></div>`;
    if (isToday) {
      btnRow.innerHTML=
        '<button class="btn-sh btn-primary" onclick="closeSheet();switchTab(null,\'cashier\')"><span>🛒</span> 开始收银</button>'+
        '<button class="btn-sh btn-stock"   onclick="closeSheet();switchTab(null,\'restock\')"><span>📦</span> 进货</button>';
    } else {
      btnRow.innerHTML='';
    }
  }
  document.getElementById('overlay').classList.add('open');
}

function overlayTap(e) { if(e.target===document.getElementById('overlay')) closeSheet(); }
function closeSheet()  { document.getElementById('overlay').classList.remove('open'); }

function openChest() {
  var s=Engine.getMonthStats(YEAR,MONTH);
  alert('📊 '+(MONTH+1)+'月月度总结\n\n营业天数：'+s.days+' 天\n本月营收：'+Engine.fmtMoney(s.revenue)+'\n本月毛利：'+Engine.fmtMoney(s.profit)+'\n平均毛利率：'+s.gm+'%'+(s.totalLoss>0?'\n本月损耗：'+Engine.fmtMoney(s.totalLoss):''));
}

function scrollToToday() {
  setTimeout(function(){
    var node=document.querySelector('.n-today');
    if(node) node.scrollIntoView({behavior:'smooth',block:'center'});
  },600);
}

document.getElementById('view-calendar').style.display='';
updateHeader();
buildSnake();
scrollToToday();

document.querySelectorAll('.nav-btn').forEach(function(btn){
  var view=btn.getAttribute('data-view');
  if(!view)return;
  btn.onclick=function(){switchTab(btn,view);};
});
</script>
