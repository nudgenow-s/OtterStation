<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#9B2335">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>初始配置 — 主理人工作台</title>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap');

        :root {
            --bg-page:   #F7F3EE;
            --bg-card:   #FFFFFF;
            --bg-surface:#FAF8F5;
            --bg-input:  #F4F0EB;
            --crimson:   #9B2335;
            --crimson-dk:#7A1828;
            --gold:      #B8963E;
            --brown:     #6B4226;
            --text-1:    #1A1208;
            --text-2:    #6B5C4C;
            --text-3:    #A89880;
            --border:    rgba(107,66,38,0.10);
            --border-md: rgba(107,66,38,0.18);
            --shadow-card: 0 4px 24px rgba(107,66,38,0.08), 0 1px 4px rgba(107,66,38,0.04);
            --shadow-btn:  0 4px 16px rgba(155,35,53,0.28);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background: var(--bg-page); min-height: 100%; }
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; min-height: 100dvh;
        }

        .card {
            width: 340px;
            background: var(--bg-card);
            border-radius: 28px;
            padding: 32px 28px 28px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            position: relative;
        }

        /* 顶部酒红短线 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 48px; height: 3px;
            background: var(--crimson);
            border-radius: 0 0 3px 3px;
        }

        /* 品牌头 */
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 46px; display: block; margin-bottom: 10px; transition: 0.4s; }
        .brand-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 13px; letter-spacing: 5px;
            color: var(--gold); text-transform: uppercase; font-weight: 400;
        }

        /* 进度条 */
        .progress {
            height: 3px;
            background: var(--bg-input);
            border-radius: 2px;
            margin: 18px 0 22px;
            overflow: hidden;
        }
        #bar {
            height: 100%; width: 20%;
            background: linear-gradient(90deg, var(--crimson), var(--gold));
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        /* 步骤 */
        .step { display: none; animation: fadeUp 0.35s ease; }
        .step.active { display: block; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .step-tag {
            display: inline-block;
            font-size: 10px; letter-spacing: 2px;
            color: var(--crimson); font-weight: 600;
            background: rgba(155,35,53,0.07);
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 12px;
        }

        h2 { font-size: 19px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
        p  { font-size: 12px; color: var(--text-3); line-height: 1.7; margin-bottom: 20px; }

        /* 行业选择 */
        .industry-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 22px; }
        .industry-item {
            border: 1.5px solid var(--border);
            border-radius: 16px; padding: 14px 8px;
            text-align: center; cursor: pointer;
            background: var(--bg-surface);
            transition: all 0.22s;
        }
        .industry-item:hover {
            border-color: rgba(155,35,53,0.3);
            background: rgba(155,35,53,0.04);
        }
        .industry-item.selected {
            border-color: var(--crimson);
            background: rgba(155,35,53,0.06);
            box-shadow: 0 0 0 3px rgba(155,35,53,0.08);
        }
        .industry-item span   { font-size: 24px; display: block; margin-bottom: 6px; }
        .industry-item label  { font-size: 11px; color: var(--text-2); font-weight: 500; cursor: pointer; }
        .industry-item.selected label { color: var(--crimson); }

        /* 输入框 */
        .input-wrap { position: relative; margin: 14px 0; }
        .input-prefix {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%);
            font-size: 17px; color: var(--text-3); font-weight: 300;
        }
        input[type="number"] {
            width: 100%;
            background: var(--bg-input);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 15px 15px 15px 36px;
            font-size: 20px; color: var(--text-1);
            outline: none; font-weight: 500;
            transition: border-color 0.22s, box-shadow 0.22s, background 0.22s;
        }
        input[type="number"]:focus {
            border-color: var(--crimson);
            box-shadow: 0 0 0 3px rgba(155,35,53,0.08);
            background: #fff;
        }
        input[type="number"]::placeholder { color: var(--text-3); font-size: 15px; font-weight: 400; }

        /* 主按钮 */
        .btn-primary {
            width: 100%;
            background: var(--crimson);
            color: #fff; border: none;
            padding: 16px; border-radius: 50px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 4px;
            letter-spacing: 0.5px;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            box-shadow: var(--shadow-btn);
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .btn-primary:hover { background: var(--crimson-dk); box-shadow: 0 6px 20px rgba(155,35,53,0.35); }
        .btn-primary:active { transform: scale(0.98); box-shadow: none; }

        .back-link {
            display: block; text-align: center;
            font-size: 12px; color: var(--text-3);
            margin-top: 14px; cursor: pointer;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--crimson); }

        /* 分隔线 */
        .rule { height: 1px; background: var(--border); margin: 18px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <span class="logo" id="main-logo">🦦</span>
        <div class="brand-name">Prestige Station</div>
    </div>
    <div class="progress"><div id="bar"></div></div>

    <!-- Step 0 -->
    <div class="step active" id="s0">
        <div class="step-tag">01 / 05</div>
        <h2>🏷️ 选择行业身份</h2>
        <p>我们将根据您的行业定制专属计量与分析模型。</p>
        <div class="industry-grid" id="industry-selector">
            <div class="industry-item selected" onclick="selectType('nail',this)"><span>💅</span><label>美业</label></div>
            <div class="industry-item"          onclick="selectType('food',this)"><span>🌭</span><label>餐饮</label></div>
            <div class="industry-item"          onclick="selectType('retail',this)"><span>👗</span><label>零售</label></div>
        </div>
        <button class="btn-primary" onclick="move(1)">确认身份</button>
    </div>

    <!-- Step 1 -->
    <div class="step" id="s1">
        <div class="step-tag">02 / 05</div>
        <h2>🏠 房租与物业</h2>
        <p>房租是生存的第一道坎。请输入每月固定支出：</p>
        <div class="rule"></div>
        <div class="input-wrap"><span class="input-prefix">¥</span><input type="number" id="rent" placeholder="5000"></div>
        <button class="btn-primary" onclick="move(2)">下一步</button>
        <span class="back-link" onclick="move(0)">返回上一步</span>
    </div>

    <!-- Step 2 -->
    <div class="step" id="s2">
        <div class="step-tag">03 / 05</div>
        <h2>👸 你的专属工资</h2>
        <p>如果你不发工资，那你只是在自我剥削：</p>
        <div class="rule"></div>
        <div class="input-wrap"><span class="input-prefix">¥</span><input type="number" id="salary" placeholder="8000"></div>
        <button class="btn-primary" onclick="move(3)">下一步</button>
        <span class="back-link" onclick="move(1)">返回上一步</span>
    </div>

    <!-- Step 3 -->
    <div class="step" id="s3">
        <div class="step-tag">04 / 05</div>
        <h2>🔋 杂费与折旧</h2>
        <p>水电、材料折旧。算出日均运营成本：</p>
        <div class="rule"></div>
        <div class="input-wrap"><span class="input-prefix">¥</span><input type="number" id="misc" placeholder="1000"></div>
        <button class="btn-primary" onclick="move(4)">最后一步</button>
        <span class="back-link" onclick="move(2)">返回上一步</span>
    </div>

    <!-- Step 4 -->
    <div class="step" id="s4">
        <div class="step-tag">05 / 05</div>
        <h2>🏗️ 初始投入成本</h2>
        <p>装修、设备、加盟费等沉没成本：</p>
        <div class="rule"></div>
        <div class="input-wrap"><span class="input-prefix">¥</span><input type="number" id="startup" placeholder="50000"></div>
        <button class="btn-primary" onclick="save()">完成并进入水獭能量站</button>
        <span class="back-link" onclick="move(3)">返回上一步</span>
    </div>
</div>

<script>
    (function() { if (localStorage.getItem('isActivated') !== 'true') window.location.replace('gate.html'); })();
    if (localStorage.getItem('hasSetup') === 'true') window.location.href = 'main.html';

    let selectedIndustry = 'nail';

    function selectType(type, el) {
        selectedIndustry = type;
        document.querySelectorAll('.industry-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        const cfg = IndustryAdapter.registry[type];
        document.documentElement.style.setProperty('--crimson', cfg.theme);
        // 按钮hover色：比主色深15%，用简单暗化
        document.documentElement.style.setProperty('--crimson-dk', cfg.theme);
        // 同步 theme-color meta（状态栏颜色）
        let metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute('content', cfg.theme);
        document.getElementById('main-logo').innerText = cfg.icon;
    }

    function move(s) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('s' + s).classList.add('active');
        document.getElementById('bar').style.width = ((s + 1) / 5 * 100) + '%';
        window.scrollTo(0, 0);
    }

    function save() {
        const rent    = Number(document.getElementById('rent').value)    || 0;
        const salary  = Number(document.getElementById('salary').value)  || 0;
        const misc    = Number(document.getElementById('misc').value)    || 0;
        const startup = Number(document.getElementById('startup').value) || 0;
        localStorage.setItem('monthlyRent',   rent);
        localStorage.setItem('monthlySalary', salary);
        localStorage.setItem('monthlyOther',  misc);
        localStorage.setItem('startupCost',   startup);
        localStorage.setItem('dailyCost', ((rent + salary + misc) / 30).toFixed(2));
        localStorage.setItem('industry_type', selectedIndustry);
        localStorage.setItem('hasSetup', 'true');
        localStorage.setItem('todayRev', '0');
        localStorage.setItem('last_active_date', new Date().toLocaleDateString());
        window.location.href = 'main.html';
    }
</script>
<script src="i18n-engine.js"></script>
</body>
</html>
