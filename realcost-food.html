<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E8601C">
<title>真实成本 · 餐饮版</title>
<script src="config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --primary:#9B2335; --primary-dk:#7A1828; --yellow:#FFD000; --yellow-dk:#BF9B00;
  --green:#2D7D52; --red:#F44336; --gold:#B8963E;
  --bg:#F7F3EE; --bg-card:#FFFFFF; --bg-surface:#FAF8F5; --bg-input:#F4F0EB;
  --border:rgba(107,66,38,0.10); --border-md:rgba(107,66,38,0.18);
  --text:#1A1208; --text-2:#6B5C4C; --text-3:#A89880;
  --shadow:0 2px 12px rgba(107,66,38,0.08); --shadow-btn:0 4px 16px rgba(155,35,53,0.28);
}
body { font-family:'PingFang SC','Helvetica Neue',sans-serif; background:var(--bg); min-height:100vh; max-width:480px; margin:0 auto; display:flex; flex-direction:column; overflow-x:hidden; }
.topbar { background:var(--bg-card); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(107,66,38,0.06); }
.topbar-back { display:flex; align-items:center; gap:4px; font-size:14px; font-weight:700; color:var(--primary); background:none; border:none; cursor:pointer; font-family:inherit; padding:4px 0; }
.month-header { background:var(--primary); margin:14px 16px 0; border-radius:20px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 5px 0 var(--primary-dk); }
.mh-title { color:#fff; font-size:18px; font-weight:900; }
.mh-sub { color:rgba(255,255,255,.72); font-size:11px; font-weight:700; margin-top:3px; }
.mh-rev { color:#fff; font-size:24px; font-weight:900; text-align:right; }
.mh-rlbl { color:rgba(255,255,255,.65); font-size:10px; font-weight:700; text-align:right; }
.main-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.calendar-view { padding:24px 0 160px; }
.page-view { padding:16px 16px 160px; display:none; }
.page-view.visible { display:block; }
.snake-track { position:relative; width:100%; }
.snake-svg { position:absolute; top:0; left:0; width:100%; pointer-events:none; z-index:0; }
.day-node { position:absolute; width:74px; height:74px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; z-index:2; transform:translate(-50%,-50%); opacity:0; animation:popIn .38s ease forwards; }
@keyframes popIn { 0%{opacity:0;transform:translate(-50%,-50%) scale(.35)} 70%{transform:translate(-50%,-50%) scale(1.1)} 100%{opacity:1;transform:translate(-50%,-50%) scale(1)} }
.n-future { background:#EEE; box-shadow:0 5px 0 #C8C8C8; border:3px solid #C8C8C8; }
.n-future .nd-num { color:#AAA; }
.n-done { background:var(--primary); box-shadow:0 5px 0 var(--primary-dk); border:3px solid var(--primary-dk); }
.n-done .nd-num { color:#fff; }
.n-missed { background:#fff; box-shadow:0 5px 0 #C8C8C8; border:3px solid #DDD; }
.n-missed .nd-num { color:#C0C0C0; }
.n-today { background:var(--yellow); box-shadow:0 5px 0 var(--yellow-dk); border:3px solid var(--yellow-dk); animation:popIn .38s ease forwards,todayPulse 2.2s .5s ease-in-out infinite; }
.n-today .nd-num { color:#333; }
@keyframes todayPulse { 0%,100%{box-shadow:0 5px 0 var(--yellow-dk),0 0 0 0 rgba(255,208,0,.5)} 50%{box-shadow:0 5px 0 var(--yellow-dk),0 0 0 14px rgba(255,208,0,0)} }
.nd-num { font-size:23px; font-weight:900; line-height:1; }
.nd-ico { width:16px; height:16px; display:flex; align-items:center; justify-content:center; margin-top:3px; }
.nd-ico svg { width:14px; height:14px; }
.n-done .nd-ico svg { stroke:#fff; }
.n-missed .nd-ico svg { stroke:#CCC; }
.n-today .nd-ico svg { stroke:#555; }
.n-future .nd-ico svg { stroke:#BBB; }
.today-tag { position:absolute; top:-26px; left:50%; transform:translateX(-50%); background:var(--yellow); color:#333; font-size:10px; font-weight:900; padding:3px 9px; border-radius:8px; white-space:nowrap; box-shadow:0 2px 0 var(--yellow-dk); z-index:3; }
.today-tag::after { content:''; position:absolute; bottom:-5px; left:50%; transform:translateX(-50%); border:4px solid transparent; border-top-color:var(--yellow); }
.chest-node { position:absolute; width:82px; height:82px; background:#fff; border-radius:20px; border:3px solid #DDD; box-shadow:0 5px 0 #C4C4C4; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; z-index:2; transform:translate(-50%,-50%); }
.ch-icon { font-size:34px; }
.ch-label { font-size:10px; font-weight:800; color:#999; margin-top:4px; }
.mascot-node { position:absolute; font-size:60px; transform:translate(-50%,-50%); z-index:1; animation:mFloat 3s ease-in-out infinite; pointer-events:none; }
@keyframes mFloat { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-10px)} }
.bottom-nav { position:fixed; bottom:env(safe-area-inset-bottom,0px); left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--bg-card); border-top:1px solid var(--border); display:flex; z-index:200; padding-bottom:8px; overflow-x:auto; box-shadow:0 -2px 12px rgba(107,66,38,0.08); }
.nav-btn { flex:1; min-width:52px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:9px 2px 7px; border:none; background:none; cursor:pointer; gap:3px; }
.nav-ico { width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
.nav-ico svg { width:22px; height:22px; stroke:var(--text-3); transition:stroke .15s; }
.nav-btn.active .nav-ico svg { stroke:var(--primary); }
.nav-lbl { font-size:8px; font-weight:800; color:var(--text-3); }
.nav-btn.active .nav-lbl { color:var(--primary); }
.nav-btn.active .nav-ico { transform:scale(1.18); }
.overlay { display:none; position:fixed; inset:0; background:rgba(26,18,8,0.48); z-index:500; align-items:flex-end; }
.overlay.open { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.sheet { background:var(--bg-card); width:100%; border-radius:28px 28px 0 0; padding:0 24px 44px; animation:sheetUp .3s ease; max-height:82vh; overflow-y:auto; }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sh-handle { width:44px; height:5px; background:var(--border-md); border-radius:3px; margin:14px auto 20px; }
.sh-date { font-size:22px; font-weight:900; color:var(--text); }
.sh-status { font-size:13px; font-weight:700; color:var(--text-3); margin:4px 0 18px; }
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.mc { background:var(--bg-surface); border-radius:16px; padding:14px 12px; }
.mc-lbl { font-size:11px; font-weight:700; color:var(--text-3); margin-bottom:5px; }
.mc-val { font-size:20px; font-weight:900; color:var(--text); }
.mc-val.g { color:var(--green); } .mc-val.p { color:var(--primary); } .mc-val.r { color:var(--red); }
.btn-row { display:flex; gap:10px; margin-bottom:10px; }
.btn-sh { flex:1; padding:15px 8px; border:none; border-radius:18px; font-size:14px; font-weight:900; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn-primary { background:var(--primary); color:#fff; box-shadow:0 5px 0 var(--primary-dk); }
.btn-ghost { background:var(--bg-input); color:var(--text-2); box-shadow:0 4px 0 var(--border-md); width:100%; }

/* ── 通用组件 ── */
.page-title-bar { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.page-title-text { font-size:20px; font-weight:900; color:var(--text); flex:1; }
.page-title-icon { width:20px; height:20px; display:flex; align-items:center; flex-shrink:0; }
.page-title-icon svg { width:20px; height:20px; stroke:var(--primary); }
.page-subtitle { font-size:12px; color:var(--text-3); margin-bottom:18px; line-height:1.5; }
.section-label { font-size:10px; font-weight:800; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin:20px 0 10px; }
.form-card { background:var(--bg-card); border-radius:14px; padding:16px; margin-bottom:10px; box-shadow:var(--shadow); border:1px solid var(--border); }
.form-group { margin-bottom:12px; }
.form-group.half { flex:1; }
.form-row { display:flex; gap:10px; }
.form-lbl { display:block; font-size:10px; font-weight:800; color:var(--text-3); margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
.form-inp { width:100%; padding:10px 12px; border:1px solid var(--border-md); border-radius:9px; font-size:14px; font-family:inherit; outline:none; color:var(--text); background:var(--bg-input); transition:border-color .2s,box-shadow .2s; }
.form-inp:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px rgba(155,35,53,0.06); }
.form-inp::placeholder { color:var(--text-3); }
.cat-chip { padding:6px 12px; border-radius:6px; border:1px solid var(--border-md); background:var(--bg-card); font-size:12px; font-weight:700; color:var(--text-2); cursor:pointer; transition:all .15s; font-family:inherit; }
.cat-chip.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.cat-chips { display:flex; flex-wrap:wrap; gap:6px; }
.form-submit { width:100%; padding:13px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:800; cursor:pointer; box-shadow:var(--shadow-btn); font-family:inherit; display:flex; align-items:center; justify-content:center; gap:7px; }
.form-submit:active { transform:translateY(2px); box-shadow:none; }
.form-success { display:flex; align-items:center; gap:7px; padding:11px 14px; background:rgba(45,125,82,0.07); color:var(--green); border-radius:9px; font-weight:700; margin-top:10px; font-size:13px; border:1px solid rgba(45,125,82,0.15); }
.form-success svg { width:14px; height:14px; stroke:var(--green); flex-shrink:0; }
.hidden { display:none !important; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
.shake { animation:shake .35s ease; border-color:var(--red) !important; }
.divider { height:1px; background:var(--border); margin:14px 0; }
.count-badge { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px; padding:0 5px; background:var(--bg-surface); border:1px solid var(--border-md); border-radius:10px; font-size:11px; font-weight:800; color:var(--text-3); }
.inline-btn { display:inline-flex; align-items:center; gap:5px; padding:9px 14px; border-radius:8px; border:1.5px solid var(--border-md); background:var(--bg-card); font-size:12px; font-weight:800; color:var(--text-2); cursor:pointer; font-family:inherit; }
.inline-btn svg { width:13px; height:13px; stroke:currentColor; }
.inline-btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
.empty-state { text-align:center; padding:36px 20px; }
.empty-state-icon { width:36px; height:36px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; opacity:.25; }
.empty-state-icon svg { width:36px; height:36px; stroke:var(--text-3); }
.empty-state-text { font-size:12px; color:var(--text-3); line-height:1.7; }

/* ── 成本预览 ── */
.cost-preview { background:var(--bg-surface); border:1px solid var(--border); border-radius:11px; padding:13px 15px; margin-top:10px; }
.cp-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:13px; }
.cp-row.total { border-top:1px solid var(--border-md); margin-top:6px; padding-top:9px; font-weight:800; }
.cp-label { color:var(--text-3); }
.cp-val { font-weight:700; color:var(--text); }
.cp-val.profit { color:var(--green); font-size:15px; }
.cp-val.loss { color:var(--red); font-size:15px; }

/* ── BOM行 ── */
.bom-row { display:flex; align-items:center; gap:8px; padding:9px 11px; background:var(--bg-surface); border-radius:9px; margin-bottom:5px; border:1px solid var(--border); }
.bom-name { flex:1; font-size:13px; font-weight:700; color:var(--text); }
.bom-qty { font-size:11px; color:var(--text-3); min-width:52px; }
.bom-cost { font-size:12px; font-weight:700; color:var(--text-2); min-width:48px; text-align:right; }
.bom-del { background:none; border:none; cursor:pointer; padding:2px; display:flex; align-items:center; }
.bom-del svg { width:13px; height:13px; stroke:var(--text-3); }

/* ── 产品行 ── */
.prod-row { display:flex; align-items:center; gap:6px; padding:9px 11px; background:var(--bg-surface); border-radius:9px; margin-bottom:5px; border:1px solid var(--border); }
.prod-row-info { flex:1; }
.prod-row-name { font-size:13px; font-weight:800; color:var(--text); }
.prod-row-sub { font-size:10px; color:var(--text-3); margin-top:2px; }
.prod-row-qty { width:44px; padding:6px 4px; border:1px solid var(--border-md); border-radius:8px; font-size:13px; text-align:center; font-family:inherit; background:var(--bg-card); color:var(--text); outline:none; }
.prod-row-qty:focus { border-color:var(--primary); }
.prod-row-subtotal { font-size:12px; font-weight:800; color:var(--primary); min-width:44px; text-align:right; }
.prod-row-del { background:none; border:none; cursor:pointer; display:flex; align-items:center; }
.prod-row-del svg { width:14px; height:14px; stroke:var(--text-3); }

/* ── 订单卡片 ── */
.order-card { background:var(--bg-card); border-radius:12px; padding:14px 15px; margin-bottom:8px; box-shadow:var(--shadow); border-left:3px solid var(--primary); border-top:1px solid var(--border); border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.order-card.takeout { border-left-color:var(--gold); }
.oc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:9px; }
.oc-name { font-size:14px; font-weight:800; color:var(--text); }
.oc-date { font-size:11px; color:var(--text-3); margin-top:3px; }
.oc-profit { font-size:18px; font-weight:900; }
.oc-profit.g { color:var(--green); } .oc-profit.r { color:var(--red); }
.oc-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:9px; }
.oc-tag { padding:3px 8px; border-radius:5px; font-size:11px; font-weight:700; background:var(--bg-surface); color:var(--text-2); border:1px solid var(--border); }
.oc-tag.dine { background:rgba(155,35,53,0.07); color:var(--primary); border-color:rgba(155,35,53,0.15); }
.oc-tag.takeout { background:rgba(184,150,62,0.07); color:var(--gold); border-color:rgba(184,150,62,0.15); }
.oc-costs { display:flex; gap:6px; flex-wrap:wrap; padding-top:9px; border-top:1px solid var(--border); }
.oc-cost-item { flex:1; min-width:50px; text-align:center; }
.oc-cost-lbl { font-size:10px; color:var(--text-3); margin-bottom:2px; }
.oc-cost-val { font-size:12px; font-weight:800; color:var(--text); }

/* ── 排行 ── */
.rank-card { background:var(--bg-card); border-radius:12px; padding:13px 15px; margin-bottom:7px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow); border:1px solid var(--border); }
.rank-top-1 { border-color:rgba(255,215,0,0.4); }
.rank-top-2 { border-color:rgba(192,192,192,0.4); }
.rank-top-3 { border-color:rgba(205,127,50,0.3); }
.rc-medal-top { font-size:20px; min-width:24px; text-align:center; }
.rc-medal-num { font-size:12px; font-weight:900; color:var(--text-3); min-width:24px; text-align:center; }
.rc-body { flex:1; }
.rc-name { font-size:13px; font-weight:800; color:var(--text); margin-bottom:5px; }
.rc-bar-wrap { background:var(--bg-surface); border-radius:3px; height:4px; overflow:hidden; margin-bottom:5px; }
.rc-bar { height:100%; border-radius:3px; transition:width .6s cubic-bezier(.34,1.56,.64,1); }
.rc-sub { font-size:11px; color:var(--text-3); }
.rc-val { font-size:14px; font-weight:900; color:var(--primary); min-width:50px; text-align:right; }
.rank-tab-row { display:flex; gap:6px; margin-bottom:12px; }
.rank-tab { flex:1; padding:9px; border-radius:8px; border:1px solid var(--border-md); background:var(--bg-card); font-size:12px; font-weight:800; color:var(--text-2); cursor:pointer; font-family:inherit; }
.rank-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.rank-empty { text-align:center; color:var(--text-3); padding:40px 20px; font-size:13px; }

/* ── 获客 ── */
.acq-card { background:var(--bg-card); border-radius:11px; padding:13px 15px; margin-bottom:7px; box-shadow:var(--shadow); border:1px solid var(--border); }
.acq-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.acq-platform { font-size:13px; font-weight:800; color:var(--text); }
.acq-amount { font-size:16px; font-weight:900; color:var(--primary); }
.acq-meta { font-size:11px; color:var(--text-3); }
.acq-del { background:none; border:none; cursor:pointer; display:flex; align-items:center; }
.acq-del svg { width:14px; height:14px; stroke:var(--text-3); }

/* ════════════════════════
   库存页
════════════════════════ */
.stock-summary { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px; }
.stock-stat { background:var(--bg-card); border-radius:11px; padding:13px; box-shadow:var(--shadow); border:1px solid var(--border); }
.stock-stat-label { font-size:10px; font-weight:800; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; }
.stock-stat-value { font-size:20px; font-weight:900; color:var(--text); }
.stock-stat-value.accent { color:var(--primary); }
.stock-stat-sub { font-size:11px; color:var(--text-3); margin-top:2px; }

/* 步骤引导 */
.guide-steps { display:flex; align-items:center; margin-bottom:14px; }
.guide-step { display:flex; align-items:center; gap:5px; }
.guide-step-num { width:21px; height:21px; border-radius:50%; background:var(--primary); color:#fff; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.guide-step-num.done { background:var(--green); }
.guide-step-num.inactive { background:var(--border-md); color:var(--text-3); }
.guide-step-label { font-size:11px; font-weight:700; color:var(--text-2); }
.guide-step-label.inactive { color:var(--text-3); }
.guide-step-sep { flex:1; height:1px; background:var(--border-md); margin:0 6px; min-width:10px; }

/* 单位换算预览 */
.unit-calc { background:rgba(155,35,53,0.04); border:1px solid rgba(155,35,53,0.12); border-radius:9px; padding:11px 13px; margin-top:10px; }
.unit-calc-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:3px 0; }
.unit-calc-label { color:var(--text-3); }
.unit-calc-value { font-weight:700; color:var(--text); }
.unit-calc-value.hi { color:var(--primary); font-size:13px; }

/* 调味杂项包 */
.misc-pack { background:var(--bg-surface); border:1px dashed var(--border-md); border-radius:11px; padding:14px 15px; margin-bottom:8px; }
.misc-pack-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.misc-pack-title { font-size:13px; font-weight:800; color:var(--text-2); display:flex; align-items:center; gap:6px; }
.misc-pack-title svg { width:13px; height:13px; stroke:var(--gold); }
.misc-pack-cost { font-size:13px; font-weight:900; color:var(--gold); }

/* 数据反哺 */
.feedback-hint { background:rgba(45,125,82,0.05); border:1px solid rgba(45,125,82,0.2); border-radius:11px; padding:13px 15px; margin-bottom:10px; }
.feedback-hint-header { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
.feedback-hint-icon svg { width:15px; height:15px; stroke:var(--green); }
.feedback-hint-title { font-size:12px; font-weight:800; color:var(--green); }
.feedback-hint-body { font-size:12px; color:var(--text-2); line-height:1.6; }
.feedback-hint-actions { display:flex; gap:7px; margin-top:10px; }
.feedback-btn { padding:7px 12px; border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; border:none; }
.feedback-btn-accept { background:var(--green); color:#fff; }
.feedback-btn-reject { background:var(--bg-input); color:var(--text-2); }

/* 库存列表 */
.stock-item { background:var(--bg-card); border-radius:11px; padding:13px 15px; margin-bottom:7px; box-shadow:var(--shadow); border:1px solid var(--border); }
.stock-item-header { display:flex; align-items:flex-start; justify-content:space-between; }
.stock-item-name { font-size:14px; font-weight:800; color:var(--text); margin-bottom:4px; }
.stock-item-qty { font-size:18px; font-weight:900; color:var(--primary); }

<script>

var I = {

  trending: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
  zap: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
  book: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  box: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>',
  clip: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>',
  mega: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>',
  bar: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
};

// ── 主题 ──
(function(){ try{ var c=IndustryAdapter.getCurrent(); if(c&&c.theme){ document.documentElement.style.setProperty('--primary',c.theme); document.documentElement.style.setProperty('--primary-dk',c.theme); var m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute('content',c.theme); } }catch(e){} })();
(function(){ if(localStorage.getItem('isActivated')!=='true') window.location.replace('gate.html'); })();

// ══════════════════════════════════════════════════════
//  FoodEngine
// ══════════════════════════════════════════════════════
var FoodEngine=(function(){
  var K={history:'food_history',menu:'food_menu',ingredients:'food_ingredients',orders:'food_orders',acquire:'food_acquire',stock:'food_stock',staff:'food_staff',misc:'food_misc_pack',ledger:'food_purchase_ledger'};
  function ld(k){ try{ return JSON.parse(localStorage.getItem(k))||null; }catch(e){ return null; } }
  function sv(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

  function getHistory(){ return ld(K.history)||{}; }
  function getDay(k){ return getHistory()[k]||null; }
  function setDay(k,d){ var h=getHistory(); h[k]=Object.assign(h[k]||{},d); sv(K.history,h); }

  function getIngredients(){ return ld(K.ingredients)||[]; }
  function addIngredient(item){ var l=getIngredients(); item.id=Date.now()+Math.random(); item.unitCostCalc=item.pricePerUnit; l.push(item); sv(K.ingredients,l); return l; }
  function deleteIngredient(id){ sv(K.ingredients,getIngredients().filter(function(i){ return i.id!=id; })); }
  function updateIngredientCost(id,cost){ var l=getIngredients(); var it=l.find(function(i){ return i.id==id; }); if(it){ it.pricePerUnit=cost; it.unitCostCalc=cost; sv(K.ingredients,l); } }

  var DEFAULT_MISC=[{id:'m1',name:'葱姜蒜',costPerServing:0.30},{id:'m2',name:'酱油料酒',costPerServing:0.25},{id:'m3',name:'盐糖调味',costPerServing:0.10}];
  function getMisc(){ return ld(K.misc)||DEFAULT_MISC; }
  function saveMisc(p){ sv(K.misc,p); }
  function getMiscTotal(){ return getMisc().reduce(function(a,i){ return a+(parseFloat(i.costPerServing)||0); },0); }

  function getLedger(){ return ld(K.ledger)||[]; }
  function addLedger(r){ var l=getLedger(); r.id=Date.now(); r.ts=Date.now(); l.unshift(r); sv(K.ledger,l); }
  function calcFeedback(name){
    var recs=getLedger().filter(function(r){ return r.name===name; });
    if(recs.length<3) return null;
    var n=recs.slice(0,6); var tc=n.reduce(function(a,r){ return a+(r.totalCost||0); },0); var tq=n.reduce(function(a,r){ return a+(r.qty||0); },0);
    return tq>0?tc/tq:null;
  }

  function getMenu(){ return ld(K.menu)||[]; }
  function calcIngCost(bom,wr){ var b=(bom||[]).reduce(function(a,i){ return a+(parseFloat(i.cost)||0); },0); return b*(1+(parseFloat(wr)||0)/100); }
  function addMenuItem(item){ var l=getMenu(); item.id=Date.now()+Math.random(); item.ingredientCost=calcIngCost(item.bom,item.wastageRate); item.miscCost=item.includeMisc?getMiscTotal():0; item.totalCost=item.ingredientCost+item.miscCost; l.push(item); sv(K.menu,l); return l; }
  function deleteMenuItem(id){ sv(K.menu,getMenu().filter(function(m){ return m.id!=id; })); }

  function getStaff(){ return ld(K.staff)||[]; }
  function addStaff(s){ var l=getStaff(); s.id=Date.now()+Math.random(); l.push(s); sv(K.staff,l); return l; }
  function deleteStaff(id){ sv(K.staff,getStaff().filter(function(s){ return s.id!=id; })); }

  function getOrders(){ return ld(K.orders)||[]; }
  function recordOrder(o){
    var l=getOrders(); o.id=Date.now()+Math.random(); o.createdAt=new Date().toISOString(); o.date=new Date().toLocaleDateString();
    o.ingredientCost=o.items.reduce(function(a,i){ return a+(parseFloat(i.totalCost)||parseFloat(i.ingredientCost)||0)*i.qty; },0);
    o.totalRevenue=o.items.reduce(function(a,i){ return a+(parseFloat(i.salePrice)||0)*i.qty; },0);
    o.techCost=o.totalRevenue*((parseFloat(o.techRate)||0)/100);
    o.platformFee=o.totalRevenue*((parseFloat(o.commRate)||0)/100);
    o.packFee=parseFloat(o.packFee)||0; o.deliveryFee=parseFloat(o.deliveryFee)||0;
    o.totalCost=o.ingredientCost+o.techCost+o.platformFee+o.packFee+o.deliveryFee;
    o.profit=o.totalRevenue-o.totalCost; o.grossMargin=o.totalRevenue>0?(o.profit/o.totalRevenue*100):0;
    l.unshift(o); sv(K.orders,l); _syncDay(o.date); return o;
  }
  function _syncDay(dk){ var os=getOrders().filter(function(o){ return o.date===dk; }); var rev=os.reduce(function(a,o){ return a+o.totalRevenue; },0); var prf=os.reduce(function(a,o){ return a+o.profit; },0); setDay(dk,{revenue:rev,profit:prf,grossMargin:rev>0?(prf/rev*100):0,orderCount:os.length,variableCost:rev-prf}); }

  // ── 库存（FIFO批次结构）──
  // 每条stock记录: { id, name, tier, purchaseUnit, baseUnit,
  //   batches: [ { batchId, unitCostPerBase, totalBaseQty, purchasePrice, purchaseUnit, addedAt } ]
  //   totalBaseQty: 所有批次合计（冗余，方便显示）
  //   unitCostPerBase: 当前FIFO头批次成本（BOM展示用）
  // }
  function getStock(){ return ld(K.stock)||[]; }

  function addStock(item){
    var l=getStock();
    var unitCost=item.baseQtyPerPurchase>0?item.purchasePrice/item.baseQtyPerPurchase:item.purchasePrice;
    var newQty=item.baseQtyPerPurchase*(item.purchaseQty||1);
    var newBatch={ batchId:Date.now()+Math.random(), unitCostPerBase:unitCost,
      totalBaseQty:newQty, purchasePrice:item.purchasePrice,
      purchaseUnit:item.purchaseUnit, addedAt:Date.now() };

    var ex=l.find(function(s){ return s.name===item.name; });
    if(ex){
      // FIFO：新批次追加到队列末尾
      if(!ex.batches) ex.batches=[{batchId:'legacy',unitCostPerBase:ex.unitCostPerBase||0,totalBaseQty:ex.totalBaseQty||0,purchasePrice:ex.purchasePrice||0,purchaseUnit:ex.purchaseUnit||'',addedAt:0}];
      ex.batches.push(newBatch);
      // 更新冗余字段
      ex.totalBaseQty=ex.batches.reduce(function(a,b){ return a+(parseFloat(b.totalBaseQty)||0); },0);
      ex.unitCostPerBase=ex.batches.find(function(b){ return (parseFloat(b.totalBaseQty)||0)>0; })
        ? ex.batches.find(function(b){ return (parseFloat(b.totalBaseQty)||0)>0; }).unitCostPerBase : unitCost;
      ex.purchasePrice=item.purchasePrice; ex.purchaseUnit=item.purchaseUnit;
    } else {
      item.id=Date.now()+Math.random();
      item.unitCostPerBase=unitCost;
      item.totalBaseQty=newQty;
      item.batches=[newBatch];
      l.push(item);
    }
    sv(K.stock,l);
    addLedger({name:item.name,qty:newQty,totalCost:item.purchasePrice*(item.purchaseQty||1),unit:item.baseUnit||item.purchaseUnit});
    var cost=item.purchasePrice*(item.purchaseQty||1);
    if(cost>0){
      var c=parseFloat(localStorage.getItem('finance_cash'))||0;
      localStorage.setItem('finance_cash',String(c-cost));
      var assets=parseFloat(localStorage.getItem('food_goods_assets'))||0;
      localStorage.setItem('food_goods_assets',String(assets+cost));
    }
    return l;
  }

  function deleteStock(id){ sv(K.stock,getStock().filter(function(s){ return s.id!=id; })); }

  function adjustStock(id,delta){
    var l=getStock(); var it=l.find(function(s){ return s.id==id; });
    if(!it) return;
    if(!it.batches) it.batches=[{batchId:'legacy',unitCostPerBase:it.unitCostPerBase||0,totalBaseQty:it.totalBaseQty||0,purchasePrice:it.purchasePrice||0,purchaseUnit:it.purchaseUnit||'',addedAt:0}];
    if(delta>0){
      // 补货直接加到最后批次
      it.batches[it.batches.length-1].totalBaseQty=(parseFloat(it.batches[it.batches.length-1].totalBaseQty)||0)+delta;
    } else {
      // 减少：从最早批次开始扣（FIFO）
      var toDeduct=Math.abs(delta);
      for(var bi=0;bi<it.batches.length&&toDeduct>0;bi++){
        var bq=parseFloat(it.batches[bi].totalBaseQty)||0;
        if(bq>=toDeduct){ it.batches[bi].totalBaseQty=bq-toDeduct; toDeduct=0; }
        else { toDeduct-=bq; it.batches[bi].totalBaseQty=0; }
      }
    }
    it.totalBaseQty=it.batches.reduce(function(a,b){ return a+(parseFloat(b.totalBaseQty)||0); },0);
    var firstLive=it.batches.find(function(b){ return (parseFloat(b.totalBaseQty)||0)>0; });
    it.unitCostPerBase=firstLive?firstLive.unitCostPerBase:(it.batches.length?it.batches[it.batches.length-1].unitCostPerBase:0);
    sv(K.stock,l);
  }

  // FIFO扣减并计算实际成本（返回该批次加权平均成本用于BOM）
  function _fifoDeduct(stockItem, qty){
    if(!stockItem.batches) stockItem.batches=[{batchId:'legacy',unitCostPerBase:stockItem.unitCostPerBase||0,totalBaseQty:stockItem.totalBaseQty||0,purchasePrice:stockItem.purchasePrice||0,purchaseUnit:stockItem.purchaseUnit||'',addedAt:0}];
    var remaining=qty, totalCostDeducted=0;
    for(var bi=0;bi<stockItem.batches.length&&remaining>0;bi++){
      var bq=parseFloat(stockItem.batches[bi].totalBaseQty)||0;
      var uc=parseFloat(stockItem.batches[bi].unitCostPerBase)||0;
      if(bq<=0) continue;
      var take=Math.min(bq,remaining);
      stockItem.batches[bi].totalBaseQty=bq-take;
      totalCostDeducted+=take*uc;
      remaining-=take;
    }

        var qty=bomLine.qty*orderItem.qty;
        var stockItem=l.find(function(s){ return s.name===bomLine.name; });

          var deductedCost=_fifoDeduct(stockItem,qty);

  function getProfitRanking(){ var m={}; getOrders().forEach(function(o){ o.items.forEach(function(i){ if(!m[i.name]) m[i.name]={name:i.name,qty:0,profit:0}; m[i.name].qty+=i.qty; m[i.name].profit+=(i.salePrice-(i.totalCost||i.ingredientCost||0))*i.qty; }); }); return Object.values(m).sort(function(a,b){ return b.profit-a.profit; }); }

  function getMonthStats(yr,mo){ var h=getHistory(),rev=0,prf=0,days=0; Object.keys(h).forEach(function(k){ var d=new Date(k); if(d.getFullYear()===yr&&d.getMonth()===mo){ rev+=parseFloat(h[k].revenue)||0; prf+=parseFloat(h[k].profit)||0; if((parseFloat(h[k].revenue)||0)>0) days++; } }); return {revenue:rev,profit:prf,days:days,gm:rev>0?(prf/rev*100):0}; }

  function fmtM(v){ v=parseFloat(v)||0; if(Math.abs(v)>=10000) return (v<0?'-':'')+'¥'+(Math.abs(v)/10000).toFixed(1)+'w'; return (v<0?'-¥':'¥')+Math.abs(v).toFixed(2).replace(/\.00$/,''); }

function syncToMain(addProfit,actualRevenue){
  if(addProfit===undefined||addProfit===null) return;
  var today=new Date().toLocaleDateString();
  var current=parseFloat(localStorage.getItem('todayRev'))||0;
  var newRev=current+addProfit;
  localStorage.setItem('todayRev',String(newRev));
  try{
    var dc=parseFloat(localStorage.getItem('dailyCost'))||0;
    var history=JSON.parse(localStorage.getItem('revenue_history'))||{};
    if(!history[today]) history[today]={};
    history[today].revenue=newRev.toFixed(2); history[today].profit=(newRev-dc).toFixed(2);
    history[today].achievement=dc>0?Math.floor((newRev/dc)*100):100;
    var r=parseFloat(localStorage.getItem('monthlyRent'))||0,s=parseFloat(localStorage.getItem('monthlySalary'))||0,o=parseFloat(localStorage.getItem('monthlyOther'))||0;
    var dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
    history[today].costSnapshot={rent:(r/dim).toFixed(2),salary:(s/dim).toFixed(2),other:(o/dim).toFixed(2)};
    localStorage.setItem('revenue_history',JSON.stringify(history));
  }catch(e){}
  var cashAdd=(actualRevenue!==undefined)?actualRevenue:addProfit;
  localStorage.setItem('finance_cash',String((parseFloat(localStorage.getItem('finance_cash'))||0)+cashAdd));
  localStorage.setItem('realcost_trigger',JSON.stringify({amount:addProfit,todayRev:newRev,timestamp:Date.now()}));
}

      var bq=parseFloat(container.querySelector('#sbq').value)||0;
      var bu=(container.querySelector('#sbu').value||'').trim();
      var pu=(container.querySelector('#spu').value||'份').trim();
      sStep();
      if(!pr||!qt){ container.querySelector('#s-preview').style.display='none'; return; }
      var total=pr*qt,stockQty=bq>0?bq*qt:qt,unit=bu||pu,unitCost=bq>0?pr/bq:pr;
      container.querySelector('#s-preview').style.display='block';
      container.querySelector('#sc-total').textContent='¥'+total.toFixed(2);
      container.querySelector('#sc-stock').textContent=stockQty.toFixed(2)+unit;
      container.querySelector('#sc-unit').textContent='¥'+unitCost.toFixed(4)+'/'+unit+' — BOM将用此值';
    };
    window.sSubmit=function(){
      var name=(container.querySelector('#sn').value||'').trim();
      var tier=container.querySelector('#stier').value;
      var pu=(container.querySelector('#spu').value||'份').trim();
      var pr=parseFloat(container.querySelector('#spr').value)||0;
      var qt=parseFloat(container.querySelector('#sqt').value)||0;
      var bq=parseFloat(container.querySelector('#sbq').value)||0;
      var bu=(container.querySelector('#sbu').value||pu).trim();
      if(!name){ shake(container.querySelector('#sn')); return; }
      if(!pr){ shake(container.querySelector('#spr')); return; }
      if(!qt){ shake(container.querySelector('#sqt')); return; }
      if(tier==='misc'){
        var pack=FoodEngine.getMisc();
        if(!pack.find(function(p){ return p.name===name; })){ pack.push({id:'m'+Date.now(),name:name,costPerServing:0.20}); FoodEngine.saveMisc(pack); }
        alert(name+' 已归入调味杂项包，可在下方设定每份成本');
        draw(); return;
      }
      FoodEngine.addStock({name:name,tier:tier,purchaseUnit:pu,purchasePrice:pr,purchaseQty:qt,baseUnit:bu,baseQtyPerPurchase:bq>0?bq:1});
      var unitCost=bq>0?pr/bq:pr;
      var ings=FoodEngine.getIngredients();
      if(!ings.find(function(i){ return i.name===name; })){
        FoodEngine.addIngredient({name:name,pricePerUnit:unitCost,unitCostCalc:unitCost,unit:bu||pu,totalPrice:pr,totalQty:bq||1});
      } else {
        FoodEngine.updateIngredientCost(ings.find(function(i){ return i.name===name; }).id, unitCost);
      }
      ['sn','spu','spr','sqt','sbq','sbu'].forEach(function(id){ var el=container.querySelector('#'+id); if(el) el.value=''; });
      container.querySelector('#s-preview').style.display='none';
      var ok=container.querySelector('#s-ok'); ok.classList.remove('hidden'); setTimeout(function(){ ok.classList.add('hidden'); },2500);
      draw();
    };
    window.doFeedback=function(ingId,cost){
      FoodEngine.updateIngredientCost(ingId,cost); draw();
    };
    window.stockAdj=function(id,d){ FoodEngine.adjustStock(id,d); draw(); };
    window.stockDel=function(id){ if(!confirm('确定删除？')) return; FoodEngine.deleteStock(id); draw(); };
    window.miscCostChg=function(id,v){
      var p=FoodEngine.getMisc(),it=p.find(function(x){ return x.id===id; }); if(it) it.costPerServing=parseFloat(v)||0; FoodEngine.saveMisc(p);
      var el=document.getElementById('misc-total'); if(el) el.textContent='¥'+FoodEngine.getMiscTotal().toFixed(2)+'/份';
    };
    window.miscDel=function(id){
      FoodEngine.saveMisc(FoodEngine.getMisc().filter(function(p){ return p.id!==id; }));
      container.querySelector('#misc-card').innerHTML=renderMiscCard();
    };
  }

  function renderMiscCard(){
    var p=FoodEngine.getMisc(),total=FoodEngine.getMiscTotal();
    return '<div class="misc-pack-header"><span class="misc-pack-title">'+I.zap+' 调味杂项包</span><span class="misc-pack-cost" id="misc-total">¥'+total.toFixed(2)+'/份</span></div>'+
      '<div style="font-size:11px;color:var(--text-3);margin-bottom:10px;line-height:1.6">这些少量调味料按固定成本计入每份菜品，无需精确称量</div>'+
      p.map(function(item){
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'+
          '<span style="flex:1;font-size:12px;font-weight:700;color:var(--text-2)">'+item.name+'</span>'+
          '<span style="font-size:11px;color:var(--text-3)">每份 ¥</span>'+
          '<input type="number" step="0.05" min="0" value="'+item.costPerServing+'" style="width:58px;padding:5px 8px;border:1px solid var(--border-md);border-radius:7px;font-size:13px;font-weight:700;text-align:right;background:var(--bg-card);color:var(--text);font-family:inherit;outline:none" onchange="miscCostChg(\''+item.id+'\',this.value)">'+
          '<button class="stock-del-btn" onclick="miscDel(\''+item.id+'\')" style="border:none">'+I.trash+'</button>'+
        '</div>';
      }).join('')+
      '<div style="font-size:11px;color:var(--text-3);padding-top:8px;border-top:1px solid var(--border)">录入调味料时选「调味香料（归入杂项包）」即可添加新项目</div>';
  }

  function renderStockItem(s){
    var val=(parseFloat(s.totalBaseQty)||0)*(parseFloat(s.unitCostPerBase)||0);
    var tierCls=s.tier==='precise'?'tier-precise':s.tier==='misc'?'tier-misc':'tier-bulk';
    var tierTxt=s.tier==='precise'?'精确':s.tier==='misc'?'杂项':'普通';
    var batches=s.batches||[{unitCostPerBase:s.unitCostPerBase,totalBaseQty:s.totalBaseQty}];
    var liveBatches=batches.filter(function(b){ return (parseFloat(b.totalBaseQty)||0)>0; });
    var batchHtml='';
    if(liveBatches.length>1){
      batchHtml='<div style="margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)">'+
        '<div style="font-size:10px;font-weight:800;color:var(--text-3);letter-spacing:.05em;margin-bottom:5px">FIFO批次</div>'+
        liveBatches.map(function(b,bi){
          return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0">'+
            '<span style="color:var(--text-3)">批次'+(bi+1)+(bi===0?' <span style="color:var(--primary);font-weight:800">当前</span>':'')+'</span>'+
            '<span style="color:var(--text-2);font-weight:700">'+parseFloat(b.totalBaseQty).toFixed(1)+(s.baseUnit||'')+' @ ¥'+parseFloat(b.unitCostPerBase).toFixed(4)+'</span>'+
          '</div>';
        }).join('')+
      '</div>';
    }
    return '<div class="stock-item">'+
      '<div class="stock-item-header">'+
        '<div><div class="stock-item-name">'+s.name+'</div><div style="margin-top:3px"><span class="ing-tier '+tierCls+'">'+tierTxt+'</span></div></div>'+
        '<div style="text-align:right"><div class="stock-item-qty">'+Number(parseFloat(s.totalBaseQty)||0).toFixed(1)+(s.baseUnit||s.purchaseUnit||'')+'</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">库存剩余</div></div>'+
      '</div>'+
      '<div class="stock-item-body">'+
        '<div class="stock-item-meta">采购价 ¥'+s.purchasePrice+'/'+s.purchaseUnit+'<br>当前BOM成本 ¥'+(parseFloat(s.unitCostPerBase)||0).toFixed(4)+'/'+(s.baseUnit||s.purchaseUnit||'')+(liveBatches.length>1?' · '+liveBatches.length+'批':'')+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<span style="font-size:11px;color:var(--text-3)">账面 '+FoodEngine.fmtM(val)+'</span>'+
          '<div class="stock-item-actions">'+
            '<button class="stock-action-btn" onclick="stockAdj(\''+s.id+'\',-1)">'+I.minus+'</button>'+
            '<button class="stock-action-btn" onclick="stockAdj(\''+s.id+'\',1)">'+I.plus+'</button>'+
            '<button class="stock-del-btn" onclick="stockDel(\''+s.id+'\')" style="border:none">'+I.trash+'</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
      batchHtml+
    '</div>';
  }

  draw();
}

// ══════════════════════════════════════════════════════
//  菜单页
// ══════════════════════════════════════════════════════
function renderMenu(container){
  var _bom=[],_curIng=null,_catFilter='all';

  function draw(){
    var menu=FoodEngine.getMenu(),ings=FoodEngine.getIngredients(),misc=FoodEngine.getMisc(),miscTotal=FoodEngine.getMiscTotal();
    var cats=['all']; menu.forEach(function(m){ if(m.category&&cats.indexOf(m.category)<0) cats.push(m.category); });

      '<div class="section-label">添加菜品</div>'+
      '<div class="form-card">'+
        '<div class="form-row">'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">菜品名称</label><input id="mn" class="form-inp" type="text" placeholder="红烧肉"></div>'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">分类</label><input id="mc" class="form-inp" type="text" placeholder="热菜 / 主食 / 饮品"></div>'+
        '</div>'+
        '<div class="form-row" style="margin-top:8px">'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">分类</label><input id="mc" class="form-inp" type="text" placeholder="热菜 / 主食 / 饮品"></div>'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">损耗率 (%)</label><input id="mw" class="form-inp" type="number" step="1" min="0" max="50" placeholder="5" oninput="mPrev()"></div>'+
        '</div>'+

        '<div class="divider"></div>'+
        '<div style="font-size:10px;font-weight:800;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px">渠道售价</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+
          '<div><label class="form-lbl">堂食</label><input id="mp-dine" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="mPrev()"></div>'+
          '<div><label class="form-lbl">美团外卖</label><input id="mp-meituan" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="mPrev()"></div>'+
          '<div><label class="form-lbl">饿了么</label><input id="mp-eleme" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="mPrev()"></div>'+
          '<div><label class="form-lbl">抖音团购</label><input id="mp-douyin" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="mPrev()"></div>'+
        '</div>'+
        '<div style="background:rgba(184,150,62,0.06);border:1px solid rgba(184,150,62,0.2);border-radius:9px;padding:10px 12px;margin-bottom:2px">'+
          '<div style="font-size:10px;font-weight:800;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">活动/引流价（可选）</div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">'+
            '<div style="grid-column:span 1"><label class="form-lbl">活动名称</label><input id="mp-promo-name" class="form-inp" type="text" placeholder="限时特惠"></div>'+
            '<div><label class="form-lbl">活动价</label><input id="mp-promo-price" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="mPrev()"></div>'+
            '<div><label class="form-lbl">截止日期</label><input id="mp-promo-end" class="form-inp" type="date"></div>'+
          '</div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--text-3);margin-top:6px;margin-bottom:2px">毛利预览基于堂食价。下单时按选择的渠道自动带入对应价格。</div>'+
        '<div style="font-size:10px;font-weight:800;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px">食材 BOM</div>'+
        '<div style="display:flex;gap:7px;align-items:center;margin-bottom:7px">'+
          '<div style="flex:2"><select id="mi-pick" class="form-inp" style="font-size:13px" onchange="mIngPick()">'+ingOpts+'</select></div>'+
          '<div style="width:68px"><input id="mi-qty" class="form-inp" type="number" step="0.01" min="0" placeholder="用量" style="text-align:center" oninput="mIngPrev()"></div>'+
          '<span id="mi-unit" style="font-size:12px;color:var(--text-3);min-width:18px"></span>'+
          '<button class="inline-btn primary" onclick="mBomAdd()" style="height:39px;padding:0 11px">'+I.plus+'</button>'+
        '</div>'+
        '<div id="mi-prev" class="bom-preview-inline" style="display:none"></div>'+
        '<div id="m-bom-rows"></div>'+

        '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg-surface);border-radius:9px;border:1px solid var(--border);margin-bottom:7px">'+
          '<label style="display:flex;align-items:center;gap:7px;cursor:pointer">'+
            '<input type="checkbox" id="m-misc" onchange="mPrev()" style="accent-color:var(--primary);width:15px;height:15px">'+
            '<span style="font-size:13px;font-weight:700;color:var(--text-2)">含调味杂项包</span>'+
          '</label>'+
          '<span style="font-size:12px;color:var(--text-3)">¥'+miscTotal.toFixed(2)+'/份 · '+misc.map(function(p){ return p.name; }).join(' · ')+'</span>'+
        '</div>'+

        '<div id="m-prev" style="display:none"></div>'+
        '<div style="height:10px"></div>'+
        '<button class="form-submit" onclick="mSubmit()">保存菜品</button>'+
        '<div class="form-success hidden" id="m-ok">'+I.check+' 已保存</div>'+
      '</div>'+

      '<div class="section-label" style="display:flex;align-items:center;gap:7px">当前菜单<span class="count-badge">'+menu.length+'</span></div>'+
      (cats.length>1?'<div class="cat-filter-row">'+cats.map(function(c){ return '<button class="cat-filter-btn'+(c===_catFilter?' active':'')+'" onclick="mCatF(\''+c+'\')"><'+(c==='all'?'全部':c)+'</button>'; }).join('')+'</div>':'')+
      '<div class="menu-list">'+
        (filtered.length?filtered.map(renderMenuCard).join(''):
          '<div class="empty-state"><div class="empty-state-icon">'+I.book+'</div><div class="empty-state-text">暂无菜品<br>添加第一道菜开始计算成本</div></div>'
        )+
      '</div>';

    // 事件绑定
    window.mIngPick=function(){
      var sel=container.querySelector('#mi-pick'),opt=sel.options[sel.selectedIndex];
      if(!opt||!opt.value){ _curIng=null; container.querySelector('#mi-unit').textContent=''; return; }
      _curIng={id:opt.value,name:opt.text.split(' · ')[0],pricePerUnit:parseFloat(opt.dataset.price)||0,unit:opt.dataset.unit||''};
      container.querySelector('#mi-unit').textContent=_curIng.unit; mIngPrev();
    };
    window.mIngPrev=function(){
      if(!_curIng){ container.querySelector('#mi-prev').style.display='none'; return; }
      var q=parseFloat(container.querySelector('#mi-qty').value)||0,el=container.querySelector('#mi-prev');
      if(q>0){ el.style.display='block'; el.textContent=_curIng.name+' '+q+_curIng.unit+' → 成本 ¥'+(_curIng.pricePerUnit*q).toFixed(3); } else el.style.display='none';
    };
    window.mBomAdd=function(){
      if(!_curIng){ shake(container.querySelector('#mi-pick')); return; }
      var q=parseFloat(container.querySelector('#mi-qty').value)||0;
      if(!q){ shake(container.querySelector('#mi-qty')); return; }

      container.querySelector('#mi-pick').value=''; container.querySelector('#mi-qty').value=''; container.querySelector('#mi-unit').textContent=''; _curIng=null;
      renderBomRows(); mPrev();
    };
    window.bomDel=function(i){ _bom.splice(i,1); renderBomRows(); mPrev(); };
    function renderBomRows(){
      container.querySelector('#m-bom-rows').innerHTML=_bom.map(function(it,i){
        return '<div class="bom-row"><div class="bom-name">'+it.name+'</div><div class="bom-qty">'+it.qty+it.unit+'</div><div class="bom-cost">¥'+it.cost.toFixed(3)+'</div><button class="bom-del" onclick="bomDel('+i+')">'+I.x+'</button></div>';
      }).join('');
    }
    window.mPrev=function(){
      var sale=parseFloat(container.querySelector('#mp-dine').value)||0;
      var wr=parseFloat(container.querySelector('#mw').value)||0;
      var incM=container.querySelector('#m-misc').checked;
      var ingC=FoodEngine.calcIngCost(_bom,wr),miscC=incM?FoodEngine.getMiscTotal():0,totC=ingC+miscC,prf=sale-totC,mgn=sale>0?(prf/sale*100):0;
      var pv=container.querySelector('#m-prev');
      if(sale>0||ingC>0){
        pv.style.display='block';
        var h='<div class="cost-preview">'+
          '<div class="cp-row"><span class="cp-label">堂食售价</span><span class="cp-val">'+(sale>0?'¥'+sale.toFixed(2):'—')+'</span></div>'+
          '<div class="cp-row"><span class="cp-label">食材BOM成本</span><span class="cp-val">¥'+ingC.toFixed(3)+'</span></div>'+
          (incM?'<div class="cp-row"><span class="cp-label">调味杂项包</span><span class="cp-val">¥'+miscC.toFixed(2)+'</span></div>':'')+
          '<div class="cp-row total"><span class="cp-label">单品毛利（堂食）</span><span class="cp-val '+(prf>=0?'profit':'loss')+'">'+(prf>=0?'¥':'-¥')+Math.abs(prf).toFixed(2)+'</span></div>'+
          '<div class="cp-row"><span class="cp-label">毛利率</span><span class="cp-val" style="color:'+(mgn>=60?'var(--green)':mgn>=40?'var(--gold)':'var(--red)')+'">'+FoodEngine.fmtP(mgn)+'</span></div>'+
        '</div>';
        pv.innerHTML=h;
      } else pv.style.display='none';
    };
    window.mSubmit=function(){
      var n=(container.querySelector('#mn').value||'').trim();
      var dinePr=parseFloat(container.querySelector('#mp-dine').value)||0;
      if(!n){ shake(container.querySelector('#mn')); return; }
      if(!dinePr){ shake(container.querySelector('#mp-dine')); return; }
      var prices={
        dine: dinePr,
        meituan: parseFloat(container.querySelector('#mp-meituan').value)||dinePr,
        eleme:   parseFloat(container.querySelector('#mp-eleme').value)||dinePr,
        douyin:  parseFloat(container.querySelector('#mp-douyin').value)||dinePr,
      };
      var promoName=(container.querySelector('#mp-promo-name').value||'').trim();
      var promoPrice=parseFloat(container.querySelector('#mp-promo-price').value)||0;
      var promoEnd=container.querySelector('#mp-promo-end').value||'';
      if(promoPrice>0) prices.promo={name:promoName||'活动价',price:promoPrice,endDate:promoEnd};
      FoodEngine.addMenuItem({name:n,category:(container.querySelector('#mc').value||'').trim(),
        salePrice:dinePr, prices:prices,
        bom:_bom.slice(),wastageRate:parseFloat(container.querySelector('#mw').value)||0,
        includeMisc:container.querySelector('#m-misc').checked});
      _bom=[]; draw();
      var ok=container.querySelector('#m-ok'); ok.classList.remove('hidden'); setTimeout(function(){ ok.classList.add('hidden'); },2200);
    };
    window.mDel=function(id){ if(!confirm('确定删除？')) return; FoodEngine.deleteMenuItem(id); draw(); };
    window.mCatF=function(cat){ _catFilter=cat; draw(); };
  }

  function renderMenuCard(m){
    var tc=m.totalCost||m.ingredientCost||0,mgn=m.salePrice>0?((m.salePrice-tc)/m.salePrice*100):0;
    var mgCls=mgn>=60?'mg-good':mgn>=40?'mg-warn':'mg-bad';
    var barC=mgn>=60?'var(--green)':mgn>=40?'var(--gold)':'var(--red)';
    var prices=m.prices||{dine:m.salePrice};
    // 活动价是否有效
    var promoActive=prices.promo&&prices.promo.price>0&&(!prices.promo.endDate||new Date(prices.promo.endDate)>=new Date());
    var priceTagsHtml='';
    var platMap={meituan:'美团',eleme:'饿了么',douyin:'抖音'};
    Object.keys(platMap).forEach(function(k){
      if(prices[k]&&prices[k]!==prices.dine){
        priceTagsHtml+='<span style="font-size:10px;color:var(--text-3);padding:1px 5px;background:var(--bg-surface);border-radius:4px;border:1px solid var(--border)">'+platMap[k]+' ¥'+prices[k]+'</span>';
      }
    });
    if(promoActive) priceTagsHtml+='<span style="font-size:10px;color:var(--gold);padding:1px 5px;background:rgba(184,150,62,0.08);border-radius:4px;border:1px solid rgba(184,150,62,0.2)">'+prices.promo.name+' ¥'+prices.promo.price+'</span>';
    return '<div class="menu-card">'+
      '<div class="menu-card-left">'+
        '<div class="menu-card-name">'+m.name+'</div>'+
        '<div class="menu-card-cat">'+(m.category||'未分类')+'</div>'+
        (priceTagsHtml?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px">'+priceTagsHtml+'</div>':'')+
        '<div class="menu-card-cost-detail">成本 ¥'+tc.toFixed(2)+(m.wastageRate?'+'+m.wastageRate+'%损耗':'')+(m.includeMisc?'+杂项':'')+' / BOM '+m.bom.length+'项</div>'+
        '<div class="margin-bar-wrap"><div class="margin-bar" style="width:'+Math.max(0,Math.min(100,mgn))+'%;background:'+barC+'"></div></div>'+
      '</div>'+
      '<div class="menu-card-right"><div class="menu-card-price">¥'+m.salePrice+'</div><div style="font-size:10px;color:var(--text-3);margin-top:1px">堂食</div><div class="menu-card-margin '+mgCls+'">'+FoodEngine.fmtP(mgn)+'</div></div>'+
      '<button class="menu-del" onclick="mDel(\''+m.id+'\')">'+I.trash+'</button>'+

  }

}

// ══════════════════════════════════════════════════════
//  新建订单
// ══════════════════════════════════════════════════════
function renderNewOrder(container){
  var menu=FoodEngine.getMenu(),staff=FoodEngine.getStaff(),orderItems=[];

  function getChannelPrice(m, channel, platform){
    var prices=m.prices||{dine:m.salePrice};
    // 检查活动价是否有效
    var promoActive=prices.promo&&prices.promo.price>0&&(!prices.promo.endDate||new Date(prices.promo.endDate)>=new Date());
    if(channel==='takeout'){
      if(platform==='meituan'&&prices.meituan) return {price:prices.meituan,label:'美团价',promo:promoActive?prices.promo:null};
      if(platform==='eleme'&&prices.eleme)   return {price:prices.eleme,  label:'饿了么价',promo:promoActive?prices.promo:null};
      if(platform==='douyin'&&prices.douyin) return {price:prices.douyin, label:'抖音价',promo:promoActive?prices.promo:null};
      return {price:prices.dine||m.salePrice,label:'外卖价',promo:promoActive?prices.promo:null};
    }
    return {price:prices.dine||m.salePrice,label:'堂食价',promo:promoActive?prices.promo:null};
  }

  function buildMenuOpts(channel, platform){
    return '<option value="">选择菜品</option>'+menu.map(function(m){
      var tc=m.totalCost||m.ingredientCost||0;
      var cp=getChannelPrice(m,channel,platform);
      return '<option value="'+m.id+'" data-price="'+cp.price+'" data-cost="'+tc.toFixed(4)+'" data-name="'+m.name+'" data-promo="'+(cp.promo?cp.promo.price:'')+'" data-promoname="'+(cp.promo?cp.promo.name:'')+'">'+
        m.name+' ¥'+cp.price+(cp.promo?' / 活动¥'+cp.promo.price:'')+
      '</option>';
    }).join('');
  }

  var staffOpts='<option value="">不分配</option>'+staff.map(function(s){ return '<option value="'+s.id+'" data-rate="'+s.commRate+'">'+s.name+' '+s.commRate+'%</option>'; }).join('');

  container.innerHTML='<div>'+
    '<div class="page-title-bar"><span class="page-title-icon">'+I.clip+'</span><span class="page-title-text">新建订单</span></div>'+
    '<p class="page-subtitle">记录一笔销售，自动计算毛利</p>'+
    '<div class="form-card">'+
      '<div class="section-label">渠道</div>'+
      '<div class="form-row">'+
        '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">就餐方式</label><div class="cat-chips" id="cc"><button class="cat-chip active" data-val="dine">堂食</button><button class="cat-chip" data-val="takeout">外卖</button></div></div>'+
        '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">负责员工</label><select id="o-staff" class="form-inp" onchange="oCalc()">'+staffOpts+'</select></div>'+
      '</div>'+
      '<div id="pblock" style="display:none;margin-top:10px">'+
        '<div class="form-row"><div class="form-group half" style="margin-bottom:0"><label class="form-lbl">平台</label><select id="o-plat" class="form-inp" onchange="oPlatChg()"><option value="meituan" data-comm="18">美团外卖 18%</option><option value="eleme" data-comm="20">饿了么 20%</option><option value="douyin" data-comm="8">抖音团购 8%</option><option value="custom" data-comm="0">自定义</option></select></div>'+
        '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">佣金率 (%)</label><input id="o-comm" class="form-inp" type="number" step="0.1" min="0" value="18" oninput="oCalc()"></div></div>'+
        '<div class="form-row" style="margin-top:8px"><div class="form-group half" style="margin-bottom:0"><label class="form-lbl">打包费 (¥)</label><input id="o-pack" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="oCalc()"></div>'+
        '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">配送费 (¥)</label><input id="o-deli" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00" oninput="oCalc()"></div></div>'+
      '</div>'+
    '</div>'+
    '<div class="form-card">'+
      '<div class="section-label">点餐</div>'+
      '<div style="display:flex;gap:7px;align-items:center;margin-bottom:4px">'+
        '<div style="flex:2"><select id="o-pick" class="form-inp" onchange="oMenuPick()"><option value="">选择菜品</option></select></div>'+
        '<div style="width:48px"><input id="o-qty" class="form-inp" type="number" min="1" step="1" value="1" style="padding:10px 5px;text-align:center"></div>'+
        '<button class="inline-btn primary" onclick="oAdd()">'+I.plus+'</button>'+
      '</div>'+
      // 活动价提示
      '<div id="o-promo-hint" style="display:none;font-size:11px;color:var(--gold);padding:5px 8px;background:rgba(184,150,62,0.07);border-radius:7px;margin-bottom:6px"></div>'+
      '<div id="o-items"></div>'+
      (menu.length?'':'<div style="font-size:12px;color:var(--text-3)">请先在菜单管理中添加菜品</div>')+
    '</div>'+
    '<div class="form-card" id="o-prev-card" style="display:none"><div class="section-label">成本预览</div><div id="o-prev"></div></div>'+
    '<div class="form-card">'+
      '<div class="section-label">员工管理</div>'+
      '<div class="form-row"><div class="form-group half" style="margin-bottom:0"><label class="form-lbl">员工姓名</label><input id="s-n" class="form-inp" type="text" placeholder="张师傅"></div>'+
      '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">提成比例 (%)</label><input id="s-r" class="form-inp" type="number" step="0.5" min="0" placeholder="5"></div></div>'+
      '<div style="height:8px"></div>'+
      '<button class="inline-btn" onclick="staffAdd()" style="width:100%;justify-content:center">'+I.plus+' 添加员工</button>'+
      '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px" id="sl">'+
        (staff.length?staff.map(function(s){ return '<span class="ing-lib-item">'+s.name+' '+s.commRate+'%<button class="ing-lib-item-del" onclick="staffDel(\''+s.id+'\')">'+I.x+'</button></span>'; }).join(''):'<span style="font-size:12px;color:var(--text-3)">暂无员工</span>')+
      '</div>'+
    '</div>'+
    '<button class="form-submit" onclick="oSubmit()">保存订单</button>'+
    '<div class="form-success hidden" id="o-ok">'+I.check+' 订单已记录</div>'+
    '<div style="height:20px"></div>'+
  '</div>';

  function getCurrentChannel(){
    var active=container.querySelector('#cc .cat-chip.active');
    return active?active.dataset.val:'dine';
  }
  function getCurrentPlatform(){
    var sel=container.querySelector('#o-plat');
    return sel?sel.value:'';
  }
  function refreshMenuOpts(){
    var ch=getCurrentChannel(),pl=getCurrentPlatform();
    container.querySelector('#o-pick').innerHTML=buildMenuOpts(ch,pl);
    _cm=null;
  }

  container.querySelectorAll('#cc .cat-chip').forEach(function(btn){
    btn.onclick=function(){
      container.querySelectorAll('#cc .cat-chip').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      container.querySelector('#pblock').style.display=btn.dataset.val==='takeout'?'block':'none';
      refreshMenuOpts(); oCalc();
    };
  });
  window.oPlatChg=function(){
    var sel=container.querySelector('#o-plat'),opt=sel.options[sel.selectedIndex];
    if(opt.dataset.comm!=='0') container.querySelector('#o-comm').value=opt.dataset.comm;
    refreshMenuOpts(); oCalc();
  };

  // 初始化菜品选项
  refreshMenuOpts();

  var _cm=null;
  window.oMenuPick=function(){
    var sel=container.querySelector('#o-pick'),opt=sel.options[sel.selectedIndex];
    if(!opt||!opt.value){ _cm=null; container.querySelector('#o-promo-hint').style.display='none'; return; }
    _cm={id:opt.value,name:opt.dataset.name,salePrice:parseFloat(opt.dataset.price)||0,totalCost:parseFloat(opt.dataset.cost)||0,ingredientCost:parseFloat(opt.dataset.cost)||0};
    // 活动价提示
    var promoPrice=parseFloat(opt.dataset.promo)||0;
    var promoHint=container.querySelector('#o-promo-hint');
    if(promoPrice>0&&opt.dataset.promoname){
      promoHint.style.display='block';
      promoHint.innerHTML='活动"'+opt.dataset.promoname+'" 价格 ¥'+promoPrice+
        ' · <button onclick="usePromoPrice('+promoPrice+')" style="background:none;border:none;cursor:pointer;color:var(--gold);font-weight:800;font-size:11px;font-family:inherit;text-decoration:underline">使用活动价</button>';
    } else promoHint.style.display='none';
  };
  window.usePromoPrice=function(p){ if(_cm) _cm.salePrice=p; };

  window.oAdd=function(){
    if(!_cm){ shake(container.querySelector('#o-pick')); return; }
    var q=Math.max(1,parseInt(container.querySelector('#o-qty').value)||1);
    var ex=orderItems.find(function(i){ return i.id===_cm.id; }); if(ex) ex.qty+=q; else orderItems.push(Object.assign({qty:q},_cm));
    container.querySelector('#o-pick').value=''; container.querySelector('#o-qty').value='1';
    container.querySelector('#o-promo-hint').style.display='none'; _cm=null; rItems(); oCalc();
  };
  function rItems(){
    container.querySelector('#o-items').innerHTML=orderItems.map(function(it,i){
      return '<div class="prod-row"><div class="prod-row-info"><div class="prod-row-name">'+it.name+'</div><div class="prod-row-sub">成本 ¥'+it.totalCost.toFixed(2)+' · 售价 ¥'+it.salePrice+'</div></div><input class="prod-row-qty" type="number" min="1" step="1" value="'+it.qty+'" oninput="orderItems['+i+'].qty=Math.max(1,parseInt(this.value)||1);oCalc()"><div class="prod-row-subtotal">¥'+(it.salePrice*it.qty).toFixed(2)+'</div><button class="prod-row-del" onclick="orderItems.splice('+i+',1);rItems();oCalc()">'+I.x+'</button></div>';
    }).join('');
  }
  window.orderItems=orderItems; window.rItems=rItems;
  window.oCalc=function(){
    if(!orderItems.length){ container.querySelector('#o-prev-card').style.display='none'; return; }
    var isTakeout=getCurrentChannel()==='takeout';
    var commRate=isTakeout?(parseFloat(container.querySelector('#o-comm').value)||0):0;
    var packFee=isTakeout?(parseFloat(container.querySelector('#o-pack').value)||0):0;
    var delivFee=isTakeout?(parseFloat(container.querySelector('#o-deli').value)||0):0;
    var staffOpt=container.querySelector('#o-staff').options[container.querySelector('#o-staff').selectedIndex];
    var techRate=staffOpt?parseFloat(staffOpt.dataset.rate||0):0;
    var rev=orderItems.reduce(function(a,i){ return a+i.salePrice*i.qty; },0);
    var ingC=orderItems.reduce(function(a,i){ return a+(i.totalCost||0)*i.qty; },0);
    var techC=rev*(techRate/100),platF=rev*(commRate/100),totC=ingC+techC+platF+packFee+delivFee,prf=rev-totC,gm=rev>0?(prf/rev*100):0;
    container.querySelector('#o-prev-card').style.display='block';
    function row(l,v,big,col){ return '<div class="cp-row'+(big?' total':'')+'"><span class="cp-label">'+l+'</span><span class="cp-val'+(col?' '+(prf>=0?'profit':'loss'):'')+'" style="'+(big?'font-size:15px':'')+'">'+v+'</span></div>'; }
    var h=row('总营收','¥'+rev.toFixed(2))+row('食材成本','¥'+ingC.toFixed(2));
    if(techC>0) h+=row('员工提成 '+techRate+'%','¥'+techC.toFixed(2));
    if(platF>0) h+=row('平台佣金 '+commRate+'%','¥'+platF.toFixed(2));
    if(packFee>0) h+=row('打包费','¥'+packFee.toFixed(2));
    if(delivFee>0) h+=row('配送费','¥'+delivFee.toFixed(2));
    h+=row('变动成本合计','¥'+totC.toFixed(2),true)+row('毛利',(prf>=0?'¥':'-¥')+Math.abs(prf).toFixed(2),true,true);
    h+='<div class="cp-row"><span class="cp-label">毛利率</span><span class="cp-val" style="color:'+(gm>=60?'var(--green)':gm>=40?'var(--gold)':'var(--red)')+'">'+FoodEngine.fmtP(gm)+'</span></div>';
    container.querySelector('#o-prev').innerHTML='<div class="cost-preview">'+h+'</div>';
  };
  window.oSubmit=function(){
    if(!orderItems.length){ alert('请先添加菜品'); return; }
    var isTakeout=getCurrentChannel()==='takeout';
    var commRate=isTakeout?(parseFloat(container.querySelector('#o-comm').value)||0):0;
    var packFee=isTakeout?(parseFloat(container.querySelector('#o-pack').value)||0):0;
    var delivFee=isTakeout?(parseFloat(container.querySelector('#o-deli').value)||0):0;
    var staffOpt=container.querySelector('#o-staff').options[container.querySelector('#o-staff').selectedIndex];
    var techRate=staffOpt?parseFloat(staffOpt.dataset.rate||0):0;
    var platform=isTakeout?getCurrentPlatform():'';
    FoodEngine.recordOrder({channel:isTakeout?'takeout':'dine',platform:platform,items:orderItems.map(function(i){ return Object.assign({},i); }),techRate:techRate,commRate:commRate,packFee:packFee,deliveryFee:delivFee});
    FoodEngine.deductStockByBOM(orderItems.map(function(i){ return Object.assign({},i); }));
    var rev=orderItems.reduce(function(a,i){ return a+i.salePrice*i.qty; },0);
    var ingC=orderItems.reduce(function(a,i){ return a+(i.totalCost||0)*i.qty; },0);
    var techC=rev*(techRate/100),platF=rev*(commRate/100);
    var prf=rev-ingC-techC-platF-packFee-delivFee;
    syncToMain(prf,rev-platF);
    orderItems.length=0; rItems(); oCalc(); container.querySelector('#o-prev-card').style.display='none';
    var ok=container.querySelector('#o-ok'); ok.classList.remove('hidden'); setTimeout(function(){ ok.classList.add('hidden'); },2500);
    updateHeader();
  };
  window.staffAdd=function(){ var n=(container.querySelector('#s-n').value||'').trim(); if(!n){ shake(container.querySelector('#s-n')); return; } FoodEngine.addStaff({name:n,commRate:parseFloat(container.querySelector('#s-r').value)||0}); renderNewOrder(container); };
  window.staffDel=function(id){ if(!confirm('确定删除？')) return; FoodEngine.deleteStaff(id); renderNewOrder(container); };
}

function renderRanking(container){

    '<div id="rp" style="display:none">'+( pD.length?pD.map(function(it,i){ return card(it,i,Math.max(it.profit,0),pM,FoodEngine.fmtM(it.profit),it.qty+'份已售'); }).join(''):'<div class="rank-empty">暂无数据</div>')+'</div>'+
    '<div id="rm" style="display:none">'+( mD.length?mD.map(function(it,i){

function renderAcquire(container){

  function draw(){
    var list=FoodEngine.getAcquire(),total=list.reduce(function(a,i){ return a+(parseFloat(i.amount)||0); },0);
    container.innerHTML='<div>'+
      '<div class="page-title-bar"><span class="page-title-icon">'+I.mega+'</span><span class="page-title-text">获客成本</span></div>'+
      '<p class="page-subtitle">记录推广支出，从毛利中扣除</p>'+
      '<div style="background:var(--primary);border-radius:12px;padding:15px 18px;margin-bottom:14px;box-shadow:var(--shadow-btn)">'+
        '<div style="font-size:10px;color:rgba(255,255,255,.65);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">累计获客投入</div>'+
        '<div style="font-size:26px;font-weight:900;color:#fff">'+FoodEngine.fmtM(total)+'</div>'+
      '</div>'+
      '<div class="form-card">'+
        '<div class="section-label">记录费用</div>'+
        '<div class="form-row"><div class="form-group half" style="margin-bottom:0"><label class="form-lbl">平台</label><select id="ap" class="form-inp">'+PL.map(function(p){ return '<option value="'+p.val+'">'+p.label+'</option>'; }).join('')+'</select></div>'+
        '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">金额 (¥)</label><input id="aa" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00"></div></div>'+
        '<div class="form-row" style="margin-top:8px"><div class="form-group half" style="margin-bottom:0"><label class="form-lbl">日期</label><input id="ad" class="form-inp" type="date"></div>'+
        '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">备注</label><input id="an" class="form-inp" type="text" placeholder="活动名称"></div></div>'+
        '<div style="height:10px"></div>'+
        '<button class="form-submit" onclick="acqSub()">'+I.plus+' 记录费用</button>'+
        '<div class="form-success hidden" id="a-ok">'+I.check+' 已记录</div>'+
      '</div>'+
      '<div class="section-label" style="display:flex;align-items:center;gap:7px">投流记录<span class="count-badge">'+list.length+'</span></div>'+
      (list.length?list.map(function(a){ var pf=PL.find(function(p){ return p.val===a.platform; }); return '<div class="acq-card"><div class="acq-header"><div class="acq-platform">'+(pf?pf.label:a.platform)+'</div><div style="display:flex;align-items:center;gap:8px"><div class="acq-amount">'+FoodEngine.fmtM(a.amount)+'</div><button class="acq-del" onclick="acqDel(\''+a.id+'\')">'+I.trash+'</button></div></div><div class="acq-meta">'+(a.date||'')+(a.note?' · '+a.note:'')+'</div></div>'; }).join(''):'<div class="rank-empty">暂无记录</div>')+
    '</div>';
    var de=container.querySelector('#ad'); if(de){ var d=new Date(); de.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    window.acqSub=function(){ var amt=parseFloat(container.querySelector('#aa').value)||0; if(!amt){ shake(container.querySelector('#aa')); return; } FoodEngine.addAcquire({platform:container.querySelector('#ap').value,amount:amt,date:container.querySelector('#ad').value,note:container.querySelector('#an').value}); syncToMain(-amt); draw(); var ok=container.querySelector('#a-ok'); ok.classList.remove('hidden'); setTimeout(function(){ ok.classList.add('hidden'); },2000); };
    window.acqDel=function(id){ if(!confirm('确定删除？')) return; FoodEngine.deleteAcquire(id); draw(); };
  }
  draw();
}

// ── 初始化 ──
document.getElementById('view-calendar').style.display='';
updateHeader();
buildSnake();
setTimeout(function(){ var n=document.querySelector('.n-today'); if(n) n.scrollIntoView({behavior:'smooth',block:'center'}); },600);
</script>
