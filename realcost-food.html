          (o.techCost>0?'<div class="oc-cost-item"><div class="oc-cost-lbl">提成</div><div class="oc-cost-val">¥'+o.techCost.toFixed(2)+'</div></div>':'')+
          (o.platformFee>0?'<div class="oc-cost-item"><div class="oc-cost-lbl">佣金</div><div class="oc-cost-val">¥'+o.platformFee.toFixed(2)+'</div></div>':'')+
          (o.packFee>0?'<div class="oc-cost-item"><div class="oc-cost-lbl">打包</div><div class="oc-cost-val">¥'+o.packFee.toFixed(2)+'</div></div>':'')+
          (o.deliveryFee>0?'<div class="oc-cost-item"><div class="oc-cost-lbl">配送</div><div class="oc-cost-val">¥'+o.deliveryFee.toFixed(2)+'</div></div>':'')+
        '</div>'+
      '</div>';
    }).join(''):'<div class="rank-empty">暂无订单记录</div>')+
  '</div>';
}

// ══════════════════════════════════════════════════════
//  排行
// ══════════════════════════════════════════════════════
function renderRanking(container){
  var medals=['🥇','🥈','🥉'];
  var colors=['var(--primary)','var(--gold)','var(--green)','#9C27B0','#2196F3'];
  function card(item,i,val,max,valLabel,subLabel){
    var pct=max>0?Math.max(4,Math.round(val/max*100)):4;
    return '<div class="rank-card '+(i<3?'rank-top-'+(i+1):'')+'">'+
      (i<3?'<div class="rc-medal-top">'+medals[i]+'</div>':'<div class="rc-medal-num">'+(i+1)+'</div>')+
      '<div class="rc-body">'+
        '<div class="rc-name">'+item.name+'</div>'+
        '<div class="rc-bar-wrap"><div class="rc-bar" style="width:'+pct+'%;background:'+colors[Math.min(i,4)]+'"></div></div>'+
        '<div class="rc-sub">'+subLabel+'</div>'+
      '</div>'+
      '<div class="rc-val">'+valLabel+'</div>'+
    '</div>';
  }
  var qData=FoodEngine.getMenuRanking(), qMax=qData.length?qData[0].qty:1;
  var pData=FoodEngine.getProfitRanking(), pMax=pData.length?Math.max(pData[0].profit,1):1;
  container.innerHTML='<div>'+
    '<div class="page-title-bar"><span class="page-title-icon">'+ICO.bar+'</span><span class="page-title-text">菜品排行</span></div>'+
    '<p class="page-subtitle">基于所有订单数据自动统计</p>'+
    '<div class="rank-tab-row">'+
      '<button class="rank-tab active" onclick="rankSwitch(\'qty\',this)">销量榜</button>'+
      '<button class="rank-tab" onclick="rankSwitch(\'profit\',this)">毛利榜</button>'+
    '</div>'+
    '<div id="rank-qty">'+
      (qData.length?qData.map(function(item,i){ return card(item,i,item.qty,qMax,item.qty+'份','营收 '+FoodEngine.fmtMoney(item.revenue)); }).join(''):'<div class="rank-empty">暂无数据</div>')+
    '</div>'+
    '<div id="rank-profit" style="display:none">'+
      (pData.length?pData.map(function(item,i){ return card(item,i,Math.max(item.profit,0),pMax,FoodEngine.fmtMoney(item.profit),item.qty+'份已售'); }).join(''):'<div class="rank-empty">暂无数据</div>')+
    '</div>'+
  '</div>';
  window.rankSwitch=function(tab,btn){
    container.querySelectorAll('.rank-tab').forEach(function(b){ b.classList.remove('active'); }); btn.classList.add('active');
    container.querySelector('#rank-qty').style.display=tab==='qty'?'':'none';
    container.querySelector('#rank-profit').style.display=tab==='profit'?'':'none';
  };
}

// ══════════════════════════════════════════════════════
//  获客/投流
// ══════════════════════════════════════════════════════
function renderAcquire(container){
  var PLATFORMS=[
    { val:'meituan_rank', label:'美团排名费' },
    { val:'eleme_rank',   label:'饿了么推广' },
    { val:'douyin_feed',  label:'抖音投流' },
    { val:'wechat',       label:'微信推广' },
    { val:'other',        label:'其他' },
  ];
  function draw(){
    var list=FoodEngine.getAcquire();
    var total=list.reduce(function(a,i){ return a+(parseFloat(i.amount)||0); },0);
    container.innerHTML='<div>'+
      '<div class="page-title-bar"><span class="page-title-icon">'+ICO.megaphone+'</span><span class="page-title-text">获客成本</span></div>'+
      '<p class="page-subtitle">记录投流与推广支出，从毛利中扣除</p>'+
      '<div style="background:var(--primary);border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow-btn)">'+
        '<div style="font-size:10px;color:rgba(255,255,255,.65);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">累计获客投入</div>'+
        '<div style="font-size:26px;font-weight:900;color:#fff">'+FoodEngine.fmtMoney(total)+'</div>'+
      '</div>'+
      '<div class="form-card">'+
        '<div class="section-label">记录费用</div>'+
        '<div class="form-row">'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">平台</label>'+
            '<select id="acq-platform" class="form-inp">'+
              PLATFORMS.map(function(p){ return '<option value="'+p.val+'">'+p.label+'</option>'; }).join('')+
            '</select></div>'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">金额 (¥)</label>'+
            '<input id="acq-amount" class="form-inp" type="number" step="0.01" min="0" placeholder="0.00"></div>'+
        '</div>'+
        '<div class="form-row" style="margin-top:10px">'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">日期</label>'+
            '<input id="acq-date" class="form-inp" type="date"></div>'+
          '<div class="form-group half" style="margin-bottom:0"><label class="form-lbl">备注</label>'+
            '<input id="acq-note" class="form-inp" type="text" placeholder="活动名称"></div>'+
        '</div>'+
        '<div style="height:12px"></div>'+
        '<button class="form-submit" onclick="acqSubmit()">'+ICO.plus+' 记录费用</button>'+
        '<div class="form-success hidden" id="acq-succ">'+ICO.check+' 已记录</div>'+
      '</div>'+
      '<div class="section-label" style="display:flex;align-items:center;gap:8px">投流记录<span class="count-badge">'+list.length+'</span></div>'+
      (list.length?list.map(function(a){
        var pf=PLATFORMS.find(function(p){ return p.val===a.platform; });
        return '<div class="acq-card">'+
          '<div class="acq-header">'+
            '<div class="acq-platform">'+(pf?pf.label:a.platform)+'</div>'+
            '<div style="display:flex;align-items:center;gap:10px">'+
              '<div class="acq-amount">'+FoodEngine.fmtMoney(a.amount)+'</div>'+
              '<button class="acq-del" onclick="acqDel(\''+a.id+'\')">'+ICO.trash+'</button>'+
            '</div>'+
          '</div>'+
          '<div class="acq-meta">'+(a.date||'')+(a.note?' · '+a.note:'')+'</div>'+
        '</div>';
      }).join(''):'<div class="rank-empty">暂无记录</div>')+
    '</div>';
    var dateEl=container.querySelector('#acq-date');
    if(dateEl){ var d=new Date(); dateEl.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    window.acqSubmit=function(){
      var amount=parseFloat(container.querySelector('#acq-amount').value)||0;
      if(!amount){ shake(container.querySelector('#acq-amount')); return; }
      FoodEngine.addAcquire({ platform:container.querySelector('#acq-platform').value, amount:amount,
        date:container.querySelector('#acq-date').value, note:container.querySelector('#acq-note').value });
      syncToMain(-amount); draw();
      var su=container.querySelector('#acq-succ'); su.classList.remove('hidden');
      setTimeout(function(){ su.classList.add('hidden'); },2000);
    };
    window.acqDel=function(id){ if(!confirm('确定删除？')) return; FoodEngine.deleteAcquire(id); draw(); };
  }
  draw();
}

</script>
