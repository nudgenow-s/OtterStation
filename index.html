<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#9B2335">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>主理人工作台</title>
    <style>
        :root {
            --bg-page: #F7F3EE;
            --crimson:  #9B2335;
            --gold:     #B8963E;
            --text-secondary: #6B5C4C;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: var(--bg-page); min-height: 100%; }
        body {
            background: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; height: 100dvh;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
        }
        .wrap { text-align: center; }

        .logo { font-size: 48px; animation: float 2s ease-in-out infinite; display: block; margin-bottom: 28px; }

        /* 品牌名 */
        .brand { font-size: 11px; letter-spacing: 5px; color: var(--gold); font-weight: 500; margin-bottom: 32px; }

        /* 进度条 */
        .bar-track {
            width: 120px; height: 2px;
            background: rgba(107,66,38,0.12);
            border-radius: 1px;
            margin: 0 auto;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--crimson), var(--gold));
            border-radius: 1px;
            animation: load 1.4s ease-in-out infinite;
        }
        .tip { margin-top: 16px; font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; }

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes load  { 0%{width:0;opacity:1} 80%{width:100%;opacity:1} 100%{width:100%;opacity:0} }
    </style>
</head>
<body>
<div class="wrap">
    <span class="logo">🦦</span>
    <div class="brand">PRESTIGE STATION</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="tip">正在同步数据...</div>
</div>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(r => r.update());
    }
    (function() {
        if (localStorage.getItem('isActivated') !== 'true') { window.location.replace('gate.html'); return; }
        setTimeout(() => {
            window.location.replace(localStorage.getItem('hasSetup') === 'true' ? 'main.html' : 'setup.html');
        }, 300);
    })();
</script>
</body>
</html>
