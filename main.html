   (function resetNewDay(){

    // ====== 每日激励智能版 ======
function getYesterdayProfit(){
    const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
    
    // 获取真正的昨天日期字符串（确保与你存入时的格式一致）
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toLocaleDateString();

    AccountingEngine.saveDailySnapshot(yesterdayRev,yesterdayStr);
    

    // 直接从对象中精准提取昨天的记录
    if(history[yesterdayStr]){
        return parseFloat(history[yesterdayStr].profit) || 0;
    }

    // 如果昨天没记录，再退而求其次寻找最近的一个历史记录
    const keys = Object.keys(history).sort((a, b) => new Date(a) - new Date(b));
    if(keys.length === 0) return null;
    
    // 排除掉今天的 key，找到最后一个历史 key
    const todayStr = new Date().toLocaleDateString();
    const historyKeys = keys.filter(k => k !== todayStr);
    
    if(historyKeys.length === 0) return null;
    const lastKey = historyKeys[historyKeys.length - 1];
    return parseFloat(history[lastKey].profit) || 0;
}


function buildMotivation(){
    const daily = parseFloat(localStorage.getItem('dailyCost')) || 0;
    const yProfit = getYesterdayProfit();

    // 无成本
    if(!daily){
        return `还没设定成本哦～  
先点右上角 🔒 成本  
我才能帮你算「今日达成率」🧮`;
    }

    // 无历史
    if(yProfit === null){
        return `今天目标：  
👉 ¥${daily.toFixed(2)} = 已打平成本  
再多一块，都是你抢来的利润 💰`;
    }

    // 昨天亏
    if(yProfit < 0){
        return `昨天小亏 ¥${Math.abs(yProfit).toFixed(2)}  
👉 今天只要比昨天多【1笔】就是反杀  
不要完美，只要开始 🔥`;
    }

    // 昨天赚
    return `昨天已盈利 ¥${yProfit.toFixed(2)} 🎉  
👉 今天核心：保持节奏  
👉 先完成 ¥${daily.toFixed(2)} 基础线`;
}

        // ====== 追加在原有代码最底部，确保不影响顶部的安全校验 ======
    const StellarockDataHub = {

    // ======================================================



    function saveCostDetails() {
    // ✅ 先读取旧值，用于补全历史快照
    const oldR = (parseFloat(localStorage.getItem('monthlyRent')) / 30).toFixed(2);
    const oldS = (parseFloat(localStorage.getItem('monthlySalary')) / 30).toFixed(2);
    const oldO = (parseFloat(localStorage.getItem('monthlyOther')) / 30).toFixed(2);

    // ✅ 把所有缺失 costSnapshot 的历史记录，用旧值补全固化
    const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
    let changed = false;
    Object.keys(history).forEach(date => {
        if (!history[date].costSnapshot) {
            history[date].costSnapshot = { rent: oldR, salary: oldS, other: oldO };
            changed = true;
        }
    });
    if (changed) localStorage.setItem('revenue_history', JSON.stringify(history));

    // 原有逻辑不变，写入新值
    const r = parseFloat(document.getElementById('edit-rent').value) || 0;
    const s = parseFloat(document.getElementById('edit-salary').value) || 0;
    const o = parseFloat(document.getElementById('edit-other').value) || 0;
    const st = parseFloat(document.getElementById('edit-startup').value) || 0;
    
    localStorage.setItem('monthlyRent', r); 
    localStorage.setItem('monthlySalary', s);
    localStorage.setItem('monthlyOther', o);
    localStorage.setItem('startupCost', st);
    localStorage.setItem('dailyCost', ((r+s+o)/30).toFixed(2));
    location.reload();
}

        const todayRev = parseFloat(localStorage.getItem('todayRev')) || 0;

 function calculateForecast() {
    const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
    const dates = Object.keys(history).sort(); // 确保日期有序
    if (dates.length === 0) return;

    const now = new Date();
    const todayStr = now.toLocaleDateString();
    const totalDaysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const currentDay = now.getDate();
    const remainingDays = totalDaysInMonth - currentDay;

    // 1. 计算本月已实现的真实利润 (本月 1 号至今)
    const currentMonthPrefix = `${now.getFullYear()}/${now.getMonth() + 1}/`; 
    // 注意：根据你的日期格式调整匹配逻辑，这里假设是 YYYY/M/D
    
    let currentMonthProfit = 0;
    let last7DaysProfits = [];

    dates.forEach(d => {
        const h = history[d];
        const p = parseFloat(h.profit) || 0;
        // 如果日期属于本月
        if (d.includes(currentMonthPrefix) || new Date(d).getMonth() === now.getMonth()) {
            currentMonthProfit += p;
        }
        // 记录所有历史利润用于计算近期惯性
        last7DaysProfits.push(p);
    });

    // 2. 计算近期惯性 (取最近 7 次记录的平均值，消除单日爆发或低谷的干扰)
    const recentSample = last7DaysProfits.slice(-7);
    const avgDailyInertia = recentSample.reduce((a, b) => a + b, 0) / (recentSample.length || 1);

    // 3. 智算总额 = 既定事实 + (近期惯性 × 剩余天数)
    const estimatedTotal = currentMonthProfit + (avgDailyInertia * remainingDays);

    // 4. UI 震慑力呈现
    const forecastEl = document.getElementById('forecast-val');
    forecastEl.innerText = `¥ ${estimatedTotal.toFixed(2)}`;
    
    // 增加颜色反馈：如果预测值超过上月或目标，显示绿色，否则保持冷静蓝
    forecastEl.style.color = estimatedTotal > 0 ? "#4facfe" : "#ff85a2";

     document.getElementById('trend-icon').innerText = avgDailyInertia > 0 ? "📈" : "📉";

    // 联动计算 ROI 进度
    calculateROI(avgDailyInertia, currentMonthProfit);
}


    function calculateROI(avgDailyProfit) {
    const startup = parseFloat(localStorage.getItem('startupCost')) || 0;
    const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
    
    // 核心修复：不再依赖传入的局部 totalProfit，而是计算全量历史纯利
    let cumulativeProfit = 0;
    Object.values(history).forEach(day => {
        cumulativeProfit += (parseFloat(day.profit) || 0);
    });

    const progress = startup > 0 ? Math.min((cumulativeProfit / startup) * 100, 100).toFixed(1) : 100;
    const remainingCost = Math.max(startup - cumulativeProfit, 0);

    let countdownText = "";
    if (remainingCost <= 0) {
        countdownText = "🎉 恭喜！已完全回本";
    } else if (avgDailyProfit <= 0) {
        countdownText = "⏳ 需保持盈利以预测回本期";
    } else {
        const daysToROI = Math.ceil(remainingCost / avgDailyProfit);
        const roiDate = new Date();
        roiDate.setDate(roiDate.getDate() + daysToROI);
        countdownText = `预计还需 **${daysToROI}** 天回本 (约 ${roiDate.toLocaleDateString()})`;
    }

    document.getElementById('roi-total').innerText = startup.toLocaleString();
    document.getElementById('roi-progress').style.width = progress + '%';
    document.getElementById('roi-desc').innerHTML = `累计纯利 ¥${cumulativeProfit.toFixed(2)}，进度 ${progress}%<br>${countdownText}`;
}



function exportCSV() {
    const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
    
    // 兜底数据（仅用于处理没有快照的老数据）
    const curR = (parseFloat(localStorage.getItem('monthlyRent')) / 30).toFixed(2);
    const curS = (parseFloat(localStorage.getItem('monthlySalary')) / 30).toFixed(2);
    const curO = (parseFloat(localStorage.getItem('monthlyOther')) / 30).toFixed(2);

    let csv = "日期,总营收,达成率,日均房租,日均人工,日均杂费,绝对净利\n";
    
    const sortedDates = Object.keys(history).sort((a, b) => new Date(a) - new Date(b));

    sortedDates.forEach(d => {
        const h = history[d];
        const rev = parseFloat(h.revenue) || 0;
        const net = parseFloat(h.profit) || 0;
        const ach = h.achievement || 0;

        // 优先读取存证，没存证则用当前值兜底
        const r = h.costSnapshot ? h.costSnapshot.rent : curR;
        const s = h.costSnapshot ? h.costSnapshot.salary : curS;
        const o = h.costSnapshot ? h.costSnapshot.other : curO;

        csv += `${d},${rev},${ach}%,${r},${s},${o},${net}\n`;
    });

    const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `Precision_Report_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}




    function renderChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const trend = AccountingEngine.getTrendData();
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: trend.labels,
                datasets: [{ label: '营收', data: trend.data, borderColor: '#ff85a2', tension: 0.4, fill: true, backgroundColor: 'rgba(255,133,162,0.1)' }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

   function renderHistoryList() {
        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};

        // 稳定按日期排序
        const dates = Object.keys(history).sort((a,b)=>{
            return new Date(b) - new Date(a);
        });

        let html = '<h3 style="font-size:14px; margin:20px 0 10px; color:#666;">历史账单</h3>';

        dates.forEach(date => {

           const h = history[date] || {};

           const rev = parseFloat(h.revenue) || 0;
           const ach = parseFloat(h.achievement) || 0;

           html += `
          <div class="history-item">
            <span>${date}</span>
            <strong>
                ¥${rev.toFixed(2)} (${ach}%)
            </strong>
        </div>`;
    });

    document.getElementById('history-list').innerHTML = html;
}

    function render() {
        const rev = parseFloat(localStorage.getItem('todayRev')) || 0;
        const daily = parseFloat(localStorage.getItem('dailyCost')) || 1;
        const score = Math.floor((rev / daily) * 100);
        document.getElementById('health-score').innerText = score + '%';
        document.getElementById('date-display').innerText = new Date().toLocaleDateString();
        const emoji = document.getElementById('emoji-status');
        if(score === 0) emoji.innerText = "😴";
        else if(score < 100) emoji.innerText = "🦦";
        else emoji.innerText = "💎";

        // 【增强】勋章渲染
        const earned = JSON.parse(localStorage.getItem('earned_badges')) || [];
        document.querySelectorAll('.badge-wall span').forEach(el => el.classList.remove('active-badge'));
        earned.forEach(id => { 
            const badgeEl = document.getElementById('badge-'+id);
            if(badgeEl) badgeEl.classList.add('active-badge'); 
        });
    }

    const config = IndustryAdapter.getCurrent();
    document.documentElement.style.setProperty('--primary-pink', config.theme);
    document.getElementById('industry-logo').innerText = `🦦 ${config.icon} ${config.name.toUpperCase()} STATION`;

    window.onload = render;
</script>
