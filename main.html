<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>水獭能量站</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; --bg: #fff9fa; --success-green: #58cc02; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { width: 340px; background: #fff; border-radius: 35px; box-shadow: 0 20px 40px rgba(255,133,162,0.1); padding: 25px; text-align: center; position: relative; }
        .top-nav { display: flex; justify-content: space-between; font-size: 11px; color: #ccc; margin-bottom: 10px; }
        #emoji-status { font-size: 90px; margin: 15px 0; transition: 0.5s; cursor: pointer; }
        .health-score { font-size: 50px; font-weight: bold; color: var(--primary-pink); line-height: 1; }
        .health-label { color: #999; font-size: 12px; margin-top: 5px; }
        .input-card { background: #fef0f3; padding: 20px; border-radius: 25px; margin: 20px 0; }
        input { border: none; background: transparent; font-size: 28px; width: 100%; text-align: center; color: var(--primary-pink); border-bottom: 2px solid #ffdae3; outline: none; }
        .btn-main { background: var(--primary-pink); color: white; border: none; padding: 16px; border-radius: 50px; font-size: 18px; width: 100%; cursor: pointer; font-weight: bold; box-shadow: 0 6px #ffdae3; transition: 0.1s; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 3px #ffdae3; }
        .badge-wall { display: flex; justify-content: center; gap: 12px; margin-top: 20px; font-size: 22px; background: #fcfcfc; padding: 10px; border-radius: 15px; }
        .badge-wall span { filter: grayscale(1); opacity: 0.15; }
        /*  勋章激活样式增强 */
        .active-badge { filter: none !important; opacity: 1 !important; transform: scale(1.1); }
        #profit-tip { font-size: 12px; color: var(--success-green); margin-top: 8px; font-weight: bold; height: 18px; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center; }
        #report-modal { background:white; width:100%; height:100%; padding:25px; box-sizing:border-box; overflow-y:auto; animation: slideUp 0.4s ease; display:none; position:fixed; top:0; left:0; z-index:2500; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dotted #eee; font-size: 14px; }
        .forecast-card { background: #f8f9ff; padding: 15px; border-radius: 20px; margin: 15px 0; border-left: 5px solid #4facfe; text-align: left; }
        .roi-bar-container { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #roi-progress { height: 100%; background: var(--success-green); width: 0%; transition: 1s; }
    </style>
</head>
<body>

    <!-- ===== 每日激励弹窗 ===== -->
<div id="motivation-modal" class="modal-overlay" style="z-index:3000;">
  <div style="
      background:white;
      padding:22px;
      border-radius:26px;
      width:300px;
      box-shadow:0 20px 40px rgba(255,133,162,0.2);
      animation: slideUp 0.35s ease;
  ">
    <div style="font-size:16px;margin-bottom:12px;color:#ff85a2;font-weight:bold;">
      🦦 今日行动建议
    </div>

    <div id="motivation-text"
         style="font-size:13px;color:#555;line-height:1.6;margin-bottom:16px;">
    </div>

    <button class="btn-main"
            style="font-size:14px;margin-bottom:10px;"
            onclick="jumpToRecord()">
      ✍️ 直接记一笔
    </button>

    <button class="btn-main"
            style="background:#eee;color:#666;font-size:13px;box-shadow:none;"
            onclick="closeMotivation()">
      我知道了
    </button>
  </div>
</div>
    
<div class="app-container">
    <div class="top-nav">
        <span id="date-display"></span>
        <div>
            <span onclick="StellarockDataHub.exportData()" style="cursor:pointer; margin-right:12px;color:var(--primary-pink);font-weight:bold;">📤备份</span>
            <span onclick="validateBoss('cost')" style="cursor:pointer; margin-right:12px;">🔒 成本</span>
            <span onclick="validateBoss('report')" style="cursor:pointer">📊 报表</span>
        </div>
    </div>
    <div id="industry-logo" style="font-size: 13px; color: var(--primary-pink); font-weight: bold;">🦦 STATION</div>
    <div id="health-score" class="health-score">0%</div>
    <div class="health-label">今日目标达成率</div>
    <div id="emoji-status">😴</div>
    <div class="input-card">
        <input type="number" id="revenue-input" inputmode="decimal" placeholder="¥ 0.00">
        <div id="unit-tip" style="font-size: 12px; color: #ccabb3; margin-top: 10px;">记录成交金额</div>
        <div id="profit-tip"></div>
    </div>
    <button class="btn-main" onclick="record()">记录成交</button>
    <div class="badge-wall" id="badges">
        <span id="badge-first_blood">💰</span><span id="badge-profitable_king">👑</span><span id="badge-smart_buyer">🦊</span><span id="badge-anti_procrastination">🔥</span><a href="https://nudgenow-s.github.io/Otter-miner/"> <span id="badge-otterminer">🦦</span></a><a href="https://nudgenow-s.github.io/Gaaame/"> <span id="badge-game">🎮</span></a>


    </div>
</div>

<div id="report-modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--primary-pink); margin:0;">数据复盘</h2>
        <button onclick="toggleReport()" style="border:none; background:none; font-size:28px;">×</button>
    </div>
    
    <div class="forecast-card" style="border-left-color: var(--success-green);">
        <div style="font-size: 11px; color: #666; font-weight: bold;">💰 回本进度 (总投入: ¥<span id="roi-total">0</span>)</div>
        <div class="roi-bar-container"><div id="roi-progress"></div></div>
        <div id="roi-desc" style="font-size: 10px; color: #999; line-height: 1.5;">累计纯利 ¥0，还需 ¥0 回本</div>
    </div>

    <div class="forecast-card">
        <div style="font-size: 11px; color: #666; font-weight: bold;">🔮 智能月度利润预测<span id="trend-icon"></span></div>
        <div id="forecast-val" style="font-size: 20px; color: #4facfe; font-weight: bold; margin-top: 5px;">计算中...</div>
        <div style="font-size: 10px; color: #999; margin-top: 3px;">基于近7日表现预测本月净盈余</div>
    </div>
    
    <canvas id="trendChart" style="margin:20px 0;"></canvas>
    <div id="history-list"></div>
    <button class="btn-main" style="margin-top:20px; font-size:14px;" onclick="exportCSV()">导出全维度 CSV 报表</button>
</div>

<div id="cost-detail-modal" class="modal-overlay">
    <div style="background:white; padding:25px; border-radius:30px; width:300px;">
        <h3 style="margin:0 0 15px; color:var(--primary-pink);">⚙️ 成本细项微调</h3>
        <input type="number" id="edit-rent" placeholder="月房租"><br>
        <input type="number" id="edit-salary" placeholder="月工资"><br>
        <input type="number" id="edit-other" placeholder="月杂费"><br>
        <input type="number" id="edit-startup" placeholder="初始总投入"><br>
        <button class="btn-main" onclick="saveCostDetails()">保存</button>
        <button class="btn-main" style="background:#ccc; margin-top:10px;" onclick="closeCostModal()">取消</button>
    </div>
</div>

<script src="accounting.js"></script>

<script src="achievement.js"></script>

<script>
    // 路由守卫：检查是否激活
    (function securityCheck() {
        const isActivated = localStorage.getItem('isActivated');
        if (isActivated !== 'true') {
            window.location.replace('gate.html');
        }
    })();

    if (localStorage.getItem('hasSetup') !== 'true') window.location.href = 'index.html';

    // ====== 跨天自动重置 ======
    (function resetNewDay() {
        const today = new Date().toLocaleDateString();
        const lastDate = localStorage.getItem('lastVisitDate');

        if (lastDate && lastDate !== today) {
            const yesterdayRev = parseFloat(localStorage.getItem('todayRev')) || 0;

            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString();
            AccountingEngine.saveDailySnapshot(yesterdayRev, yesterdayStr);

            localStorage.setItem('todayRev', '0');
            localStorage.setItem('todayRecordCount', '0');
            localStorage.removeItem('earned_badges');

            try {
                let stats = JSON.parse(localStorage.getItem('user_stats')) || {};
                stats.isDailyGoalMet = false;
                stats.totalSales = 0;
                stats.recordCount = 0;
                localStorage.setItem('user_stats', JSON.stringify(stats));
            } catch (e) {}
        }

        localStorage.setItem('lastVisitDate', today);
    })();

    // ====== 每日激励 ======
    function getYesterdayProfit() {
        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toLocaleDateString();

        if (history[yesterdayStr]) {
            return parseFloat(history[yesterdayStr].profit) || 0;
        }

        const keys = Object.keys(history).sort((a, b) => new Date(a) - new Date(b));
        if (keys.length === 0) return null;

        const todayStr = new Date().toLocaleDateString();
        const historyKeys = keys.filter(k => k !== todayStr);

        if (historyKeys.length === 0) return null;
        const lastKey = historyKeys[historyKeys.length - 1];
        return parseFloat(history[lastKey].profit) || 0;
    }

    function buildMotivation() {
        const daily = parseFloat(localStorage.getItem('dailyCost')) || 0;
        const yProfit = getYesterdayProfit();

        if (!daily) {
            return `还没设定成本哦～\n先点右上角 🔒 成本\n我才能帮你算「今日达成率」🧮`;
        }
        if (yProfit === null) {
            return `今天目标：\n👉 ¥${daily.toFixed(2)} = 已打平成本\n再多一块，都是你抢来的利润 💰`;
        }
        if (yProfit < 0) {
            return `昨天小亏 ¥${Math.abs(yProfit).toFixed(2)}\n👉 今天只要比昨天多【1笔】就是反杀\n不要完美，只要开始 🔥`;
        }
        return `昨天已盈利 ¥${yProfit.toFixed(2)} 🎉\n👉 今天核心：保持节奏\n👉 先完成 ¥${daily.toFixed(2)} 基础线`;
    }

    (function dailyMotivationUI() {
        const today = new Date().toLocaleDateString();
        if (localStorage.getItem('motivationShown') === today) return;

        const text = buildMotivation();
        document.getElementById('motivation-text').innerText = text;

        setTimeout(() => {
            document.getElementById('motivation-modal').style.display = 'flex';
        }, 600);

        localStorage.setItem('motivationShown', today);
    })();

    function closeMotivation() {
        document.getElementById('motivation-modal').style.display = 'none';
    }

    function jumpToRecord() {
        closeMotivation();
        document.getElementById('revenue-input').focus();
        document.getElementById('revenue-input').style.transform = 'scale(1.05)';
        setTimeout(() => {
            document.getElementById('revenue-input').style.transform = '';
        }, 300);
    }

    function validateBoss(target) {
        if (prompt("请输入密码：") === "0000") {
            if (target === 'cost') {
                document.getElementById('edit-rent').value = localStorage.getItem('monthlyRent');
                document.getElementById('edit-salary').value = localStorage.getItem('monthlySalary');
                document.getElementById('edit-other').value = localStorage.getItem('monthlyOther');
                document.getElementById('edit-startup').value = localStorage.getItem('startupCost');
                document.getElementById('cost-detail-modal').style.display = 'flex';
            } else {
                toggleReport();
            }
        }
    }

    // ====== 备份 ======
    const StellarockDataHub = {
        exportData: function () {
            try {
                const allData = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    allData[key] = localStorage.getItem(key);
                }
                if (Object.keys(allData).length === 0) {
                    alert("🦦 财库空空，先记几笔再备份吧！");
                    return;
                }
                const backupDate = new Date().toISOString().slice(0, 10);
                const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Stellarock_Vault_${backupDate}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert("🦦 备份成功！请妥善保存该 JSON 文件。");
            } catch (e) {
                alert("❌ 备份失败，请检查浏览器权限。");
            }
        }
    };

    // ====== 成本修改 ======
    function saveCostDetails() {
        const oldR = (parseFloat(localStorage.getItem('monthlyRent')) / 30).toFixed(2);
        const oldS = (parseFloat(localStorage.getItem('monthlySalary')) / 30).toFixed(2);
        const oldO = (parseFloat(localStorage.getItem('monthlyOther')) / 30).toFixed(2);

        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};

        Object.keys(history).forEach(date => {
            if (!history[date].costSnapshot) {
                history[date].costSnapshot = { rent: oldR, salary: oldS, other: oldO };
            }
        });

        const r = parseFloat(document.getElementById('edit-rent').value) || 0;
        const s = parseFloat(document.getElementById('edit-salary').value) || 0;
        const o = parseFloat(document.getElementById('edit-other').value) || 0;
        const st = parseFloat(document.getElementById('edit-startup').value) || 0;
        const newDailyCost = (r + s + o) / 30;
        const newR = (r / 30).toFixed(2);
        const newS = (s / 30).toFixed(2);
        const newO = (o / 30).toFixed(2);

        const today = new Date().toLocaleDateString();
        if (history[today]) {
            const todayRev = parseFloat(localStorage.getItem('todayRev')) || 0;
            history[today].costSnapshot = { rent: newR, salary: newS, other: newO };
            history[today].profit = (todayRev - newDailyCost).toFixed(2);
            history[today].achievement = newDailyCost > 0 ? Math.floor((todayRev / newDailyCost) * 100) : 100;
        }

        localStorage.setItem('revenue_history', JSON.stringify(history));
        localStorage.setItem('monthlyRent', r);
        localStorage.setItem('monthlySalary', s);
        localStorage.setItem('monthlyOther', o);
        localStorage.setItem('startupCost', st);
        localStorage.setItem('dailyCost', newDailyCost.toFixed(2));
        location.reload();
    }

    function closeCostModal() {
        document.getElementById('cost-detail-modal').style.display = 'none';
    }

    // ====== 记录成交 ======
    function record() {
        const input = document.getElementById('revenue-input');
        const val = parseFloat(input.value);
        if (val > 0) {
            let rev = parseFloat(localStorage.getItem('todayRev')) || 0;
            rev += val;
            localStorage.setItem('todayRev', rev);

            AccountingEngine.calculateProfit(val);
            AccountingEngine.saveDailySnapshot(rev);

            try {
                if (typeof AchievementEngine !== 'undefined') {
                    AchievementEngine.check(val);
                } else {
                    console.error("勋章引擎尚未加载");
                }
            } catch (e) {
                console.error("勋章判定执行出错:", e);
            }

            const todayRev = parseFloat(localStorage.getItem('todayRev')) || 0;
            const dailyCost = parseFloat(localStorage.getItem('dailyCost')) || 0;
            let tip = "";

            if (todayRev === 0) {
                tip = "";
            } else if (todayRev < dailyCost) {
                tip = `⏳ 距离打平还差 ¥${(dailyCost - todayRev).toFixed(2)}`;
            } else if (todayRev === dailyCost) {
                tip = "🎯 已打平成本！从现在开始都是利润";
            } else {
                tip = `✨ 纯赚 ¥${(todayRev - dailyCost).toFixed(2)}`;
            }

            document.getElementById('profit-tip').innerText = tip;
            setTimeout(() => {
                document.getElementById('profit-tip').innerText = "";
            }, 3000);

            input.value = '';
            render();
        }
    }

    // ====== 报表 ======
    function toggleReport() {
        const modal = document.getElementById('report-modal');
        const isOpening = modal.style.display !== 'block';
        modal.style.display = isOpening ? 'block' : 'none';
        if (isOpening) {
            renderChart();
            renderHistoryList();
            calculateForecast();
        }
    }

    // ====== 月度预测 ======
    function calculateForecast() {
        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
        const dates = Object.keys(history).sort();
        if (dates.length === 0) return;

        const now = new Date();
        const totalDaysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const remainingDays = totalDaysInMonth - now.getDate();

        let currentMonthProfit = 0;
        let last7DaysProfits = [];

        dates.forEach(d => {
            const h = history[d];
            const p = parseFloat(h.profit) || 0;
            if (new Date(d).getMonth() === now.getMonth() && new Date(d).getFullYear() === now.getFullYear()) {
                currentMonthProfit += p;
            }
            last7DaysProfits.push(p);
        });

        const recentSample = last7DaysProfits.slice(-7);
        const avgDailyInertia = recentSample.reduce((a, b) => a + b, 0) / (recentSample.length || 1);
        const estimatedTotal = currentMonthProfit + (avgDailyInertia * remainingDays);

        const forecastEl = document.getElementById('forecast-val');
        forecastEl.innerText = `¥ ${estimatedTotal.toFixed(2)}`;
        forecastEl.style.color = estimatedTotal > 0 ? "#4facfe" : "#ff85a2";
        document.getElementById('trend-icon').innerText = avgDailyInertia > 0 ? "📈" : "📉";

        calculateROI(avgDailyInertia);
    }

    // ====== ROI 回本计算 ======
    function calculateROI(avgDailyProfit) {
        const startup = parseFloat(localStorage.getItem('startupCost')) || 0;
        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};

        const sortedDates = Object.keys(history).sort((a, b) => new Date(a) - new Date(b));
        if (sortedDates.length === 0) {
            document.getElementById('roi-total').innerText = startup.toLocaleString();
            document.getElementById('roi-progress').style.width = '0%';
            document.getElementById('roi-desc').innerHTML = '暂无数据';
            return;
        }

        const startDate = new Date(sortedDates[0]);
        const endDate = new Date();
        let lastSnapshot = {
            rent: parseFloat(localStorage.getItem('monthlyRent')) / 30 || 0,
            salary: parseFloat(localStorage.getItem('monthlySalary')) / 30 || 0,
            other: parseFloat(localStorage.getItem('monthlyOther')) / 30 || 0
        };

        let cumulativeProfit = 0;

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            const dateStr = d.toLocaleDateString();
            const h = history[dateStr];

            if (h) {
                if (h.costSnapshot) lastSnapshot = h.costSnapshot;
                cumulativeProfit += parseFloat(h.profit) || 0;
            } else {
                const dailyCost = parseFloat(lastSnapshot.rent) +
                                  parseFloat(lastSnapshot.salary) +
                                  parseFloat(lastSnapshot.other);
                cumulativeProfit -= dailyCost;
            }
        }

        const progress = startup > 0 ? Math.min((cumulativeProfit / startup) * 100, 100).toFixed(1) : 100;
        const remainingCost = Math.max(startup - cumulativeProfit, 0);

        let countdownText = "";
        if (remainingCost <= 0) {
            countdownText = "🎉 恭喜！已完全回本";
        } else if (avgDailyProfit <= 0) {
            countdownText = "⏳ 需保持盈利以预测回本期";
        } else {
            const daysToROI = Math.ceil(remainingCost / avgDailyProfit);
            const roiDate = new Date();
            roiDate.setDate(roiDate.getDate() + daysToROI);
            countdownText = `预计还需 <strong>${daysToROI}</strong> 天回本 (约 ${roiDate.toLocaleDateString()})`;
        }

        document.getElementById('roi-total').innerText = startup.toLocaleString();
        document.getElementById('roi-progress').style.width = progress + '%';
        document.getElementById('roi-desc').innerHTML = `累计纯利 ¥${cumulativeProfit.toFixed(2)}，进度 ${progress}%<br>${countdownText}`;
    }

    // ====== CSV 导出 ======
    function exportCSV() {
        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};

        let csv = "日期,总营收,达成率,日均房租,日均人工,日均杂费,绝对净利\n";
        const sortedDates = Object.keys(history).sort((a, b) => new Date(a) - new Date(b));

        if (sortedDates.length === 0) return;

        const startDate = new Date(sortedDates[0]);
        const endDate = new Date();
        const allDates = [];
        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            allDates.push(new Date(d).toLocaleDateString());
        }

        let lastSnapshot = {
            rent: (parseFloat(localStorage.getItem('monthlyRent')) / 30).toFixed(2),
            salary: (parseFloat(localStorage.getItem('monthlySalary')) / 30).toFixed(2),
            other: (parseFloat(localStorage.getItem('monthlyOther')) / 30).toFixed(2)
        };

        allDates.forEach(d => {
            const h = history[d];
            if (h) {
                const rev = parseFloat(h.revenue) || 0;
                const net = parseFloat(h.profit) || 0;
                const ach = h.achievement || 0;
                const snap = h.costSnapshot || lastSnapshot;
                if (h.costSnapshot) lastSnapshot = h.costSnapshot;
                csv += `${d},${rev},${ach}%,${snap.rent},${snap.salary},${snap.other},${net}\n`;
            } else {
                const dailyCost = parseFloat(lastSnapshot.rent) + parseFloat(lastSnapshot.salary) + parseFloat(lastSnapshot.other);
                csv += `${d},0,0%,${lastSnapshot.rent},${lastSnapshot.salary},${lastSnapshot.other},${(-dailyCost).toFixed(2)}\n`;
            }
        });

        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Precision_Report_${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // ====== 图表 ======
    function renderChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const trend = AccountingEngine.getTrendData();
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: trend.labels,
                datasets: [{
                    label: '营收',
                    data: trend.data,
                    borderColor: '#ff85a2',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(255,133,162,0.1)'
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    // ====== 历史账单 ======
    function renderHistoryList() {
        const history = JSON.parse(localStorage.getItem('revenue_history')) || {};
        const dates = Object.keys(history).sort((a, b) => new Date(b) - new Date(a));

        let html = '<h3 style="font-size:14px; margin:20px 0 10px; color:#666;">历史账单</h3>';
        dates.forEach(date => {
            const h = history[date] || {};
            const rev = parseFloat(h.revenue) || 0;
            const ach = parseFloat(h.achievement) || 0;
            html += `
                <div class="history-item">
                    <span>${date}</span>
                    <strong>¥${rev.toFixed(2)} (${ach}%)</strong>
                </div>`;
        });

        document.getElementById('history-list').innerHTML = html;
    }

    // ====== 主渲染 ======
    function render() {
        const rev = parseFloat(localStorage.getItem('todayRev')) || 0;
        const daily = parseFloat(localStorage.getItem('dailyCost')) || 1;
        const score = Math.floor((rev / daily) * 100);
        document.getElementById('health-score').innerText = score + '%';
        document.getElementById('date-display').innerText = new Date().toLocaleDateString();

        const emoji = document.getElementById('emoji-status');
        if (score === 0) emoji.innerText = "😴";
        else if (score < 100) emoji.innerText = "🦦";
        else emoji.innerText = "💎";

        const earned = JSON.parse(localStorage.getItem('earned_badges')) || [];
        document.querySelectorAll('.badge-wall span').forEach(el => el.classList.remove('active-badge'));
        earned.forEach(id => {
            const badgeEl = document.getElementById('badge-' + id);
            if (badgeEl) badgeEl.classList.add('active-badge');
        });
    }

    const config = IndustryAdapter.getCurrent();
    document.documentElement.style.setProperty('--primary-pink', config.theme);
    document.getElementById('industry-logo').innerText = `🦦 ${config.icon} ${config.name.toUpperCase()} STATION`;

    window.onload = render;
</script>
    <script src="i18n-engine.js"></script>
    


</body>
