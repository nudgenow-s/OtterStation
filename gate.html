<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#9B2335">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>主理人工作台</title>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap');

        :root {
            --bg-page:   #F7F3EE;
            --bg-card:   #FFFFFF;
            --bg-input:  #F4F0EB;
            --crimson:   #9B2335;
            --crimson-dk:#7A1828;
            --gold:      #B8963E;
            --gold-lt:   #D4AC5A;
            --brown:     #6B4226;
            --text-1:    #1A1208;
            --text-2:    #6B5C4C;
            --text-3:    #A89880;
            --border:    rgba(107,66,38,0.10);
            --border-md: rgba(107,66,38,0.18);
            --shadow-card: 0 4px 24px rgba(107,66,38,0.08), 0 1px 4px rgba(107,66,38,0.04);
            --shadow-btn:  0 4px 16px rgba(155,35,53,0.28);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background: var(--bg-page); min-height: 100%; }
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── 卡片 ── */
        .container {
            width: 320px;
            background: var(--bg-card);
            border-radius: 28px;
            padding: 36px 28px 32px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        /* 顶部酒红细线 */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 56px; height: 3px;
            background: var(--crimson);
            border-radius: 0 0 3px 3px;
        }

        /* 语言切换 */
        .lang-toggle {
            position: absolute;
            top: 18px; right: 22px;
            font-size: 11px; font-weight: 600;
            color: var(--text-3);
            cursor: pointer; letter-spacing: 1px;
            transition: color 0.2s;
        }
        .lang-toggle:hover { color: var(--crimson); }

        /* Logo区 */
        .logo-area { text-align: center; margin-bottom: 24px; }
        .logo-icon {
            font-size: 52px; display: block;
            margin-bottom: 14px;
            animation: float 3s ease-in-out infinite;
        }
        .brand-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 22px; font-weight: 400;
            color: var(--crimson);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .brand-sub {
            font-size: 10px; letter-spacing: 3px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        /* 分隔 */
        .rule {
            height: 1px;
            background: var(--border);
            margin: 22px 0;
            position: relative;
        }
        .rule::after {
            content: '';
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 5px; height: 5px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-md);
            border-radius: 1px;
            rotate: 45deg;
        }

        /* 标题 */
        .section-title {
            text-align: center;
            font-size: 15px; font-weight: 500;
            color: var(--text-1);
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        /* 输入框 */
        input[type="text"] {
            width: 100%;
            background: var(--bg-input);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 15px 18px;
            font-size: 17px;
            text-align: center;
            color: var(--text-1);
            letter-spacing: 4px;
            font-weight: 600;
            outline: none;
            font-family: 'Courier New', monospace;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        input[type="text"]:focus {
            border-color: var(--crimson);
            box-shadow: 0 0 0 3px rgba(155,35,53,0.08);
            background: #fff;
        }
        input[type="text"]::placeholder {
            color: var(--text-3);
            font-size: 12px; letter-spacing: 2px;
        }

        /* 主按钮 */
        .btn-go {
            width: 100%;
            background: var(--crimson);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 15px; font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            letter-spacing: 1px;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            box-shadow: var(--shadow-btn);
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .btn-go:hover {
            background: var(--crimson-dk);
            box-shadow: 0 6px 20px rgba(155,35,53,0.35);
        }
        .btn-go:active { transform: scale(0.98); box-shadow: none; }

        /* 恢复链接 */
        .recovery-link {
            display: block; text-align: center;
            margin-top: 18px;
            font-size: 12px; color: var(--text-3);
            cursor: pointer; letter-spacing: 0.3px;
            transition: color 0.2s;
            text-decoration: underline;
            text-decoration-color: transparent;
            text-underline-offset: 3px;
        }
        .recovery-link:hover { color: var(--crimson); text-decoration-color: var(--crimson); }

        /* 说明盒子 */
        #guide-box { display: none; }
        .instruction {
            background: var(--bg-input);
            border-radius: 16px;
            padding: 18px 20px;
            margin: 16px 0;
            font-size: 13px;
            color: var(--text-2);
            line-height: 2;
            text-align: left;
        }
        .highlight { color: var(--crimson); font-weight: 600; }

        /* 账号设置区 */
        #account-setup { display: none; }
        #cloud-restore-ui { display: none; }

        .user-id-box {
            background: var(--bg-input);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            margin: 14px 0;
            position: relative;
        }
        .user-id-label {
            font-size: 10px; letter-spacing: 2px;
            color: var(--text-3); text-transform: uppercase;
            margin-bottom: 6px;
        }
        .user-id-value {
            font-size: 26px; font-weight: 700;
            color: var(--crimson); letter-spacing: 4px;
            font-family: 'Courier New', monospace;
        }
        .copy-btn {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: 1px solid var(--border-md);
            border-radius: 8px; padding: 5px 10px;
            font-size: 11px; color: var(--text-2);
            cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--crimson); color: #fff; border-color: var(--crimson); }

        input[type="password"] {
            width: 100%;
            background: var(--bg-input);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 16px;
            color: var(--text-1);
            outline: none;
            font-family: 'PingFang SC', sans-serif;
            transition: border-color 0.25s, box-shadow 0.25s;
            margin-top: 10px;
        }
        input[type="password"]:focus {
            border-color: var(--crimson);
            box-shadow: 0 0 0 3px rgba(155,35,53,0.08);
            background: #fff;
        }
        input[type="password"]::placeholder { color: var(--text-3); font-size: 13px; }

        .switch-link {
            display: block; text-align: center;
            font-size: 12px; color: var(--text-3);
            margin-top: 14px; cursor: pointer;
            transition: color 0.2s;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: transparent;
        }
        .switch-link:hover { color: var(--crimson); text-decoration-color: var(--crimson); }

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    </style>
</head>
<body>
<div class="container">
    <div class="lang-toggle" onclick="toggleLang()" id="lang-btn">EN</div>

    <!-- 激活区 -->
    <div id="auth-ui">
        <div class="logo-area">
            <span class="logo-icon">🦦</span>
            <div class="brand-name">Prestige</div>
            <div class="brand-sub">Business Station</div>
        </div>
        <div class="rule"></div>
        <div class="section-title" id="t-auth-title">激活您的专属能量站</div>
        <input type="text" id="activation-code" placeholder="ENTER CODE">
        <button class="btn-go" onclick="handleVerify()" id="t-auth-btn">立即验证</button>
        <div class="recovery-link" onclick="showCloudRestore()" id="t-recover">已有账号？输入 UserID 恢复数据</div>
        <div class="recovery-link" style="margin-top:6px;" onclick="document.getElementById('restore-file').click()" id="t-recover-file">通过备份文件复原数据</div>
        <input type="file" id="restore-file" accept=".json" onchange="importStellarockData(event)" style="display:none;">
    </div>

    <!-- 账号设置区（激活成功后） -->
    <div id="account-setup">
        <div class="logo-area">
            <span class="logo-icon">🔐</span>
            <div class="brand-name">Account</div>
            <div class="brand-sub">Set Your Password</div>
        </div>
        <div class="rule"></div>
        <div class="section-title">您的专属 UserID</div>
        <div class="user-id-box">
            <div class="user-id-label">USER ID</div>
            <div class="user-id-value" id="display-user-id">--------</div>
            <button class="copy-btn" onclick="copyUserId()">复制</button>
        </div>
        <input type="password" id="new-password" placeholder="设置登录密码（至少4位）">
        <input type="password" id="confirm-password" placeholder="再次确认密码">
        <button class="btn-go" onclick="saveAccount()" style="margin-top:14px;">保存并继续</button>
        <span class="switch-link" onclick="skipAccount()">跳过，稍后再说</span>
    </div>

    <!-- 云端恢复区 -->
    <div id="cloud-restore-ui">
        <div class="logo-area">
            <span class="logo-icon">☁️</span>
            <div class="brand-name">Restore</div>
            <div class="brand-sub">Cloud Recovery</div>
        </div>
        <div class="rule"></div>
        <div class="section-title">输入账号恢复数据</div>
        <input type="text" id="restore-user-id" placeholder="UserID（8位数字）" style="letter-spacing:4px;font-size:20px;text-align:center;">
        <input type="password" id="restore-password" placeholder="登录密码">
        <button class="btn-go" onclick="doCloudRestore()" style="margin-top:14px;">恢复数据</button>
        <span class="switch-link" onclick="showAuthUi()">← 返回激活</span>
    </div>

    <!-- 引导区 -->
    <div id="guide-box">
        <div class="logo-area">
            <span class="logo-icon">📱</span>
            <div class="brand-name">Install</div>
            <div class="brand-sub">Add to Home Screen</div>
        </div>
        <div class="rule"></div>
        <div class="section-title" id="t-guide-title">使用说明</div>
        <div class="instruction" id="t-instruction">
            1️⃣ 点击浏览器底部的 <span class="highlight">分享按钮</span><br>
            2️⃣ 找到 <span class="highlight">"添加到主屏幕"</span><br>
            3️⃣ 点击右上角 <span class="highlight">"添加"</span><br><br>
            完成后从桌面图标进入。
        </div>
        <button class="btn-go" onclick="enterApp()" id="t-guide-btn">进入系统</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }

    const PRIVATE_SALT = "INTJ_ARCHITECT_2026_PRO";
    let currentLang = localStorage.getItem('lang') || 'zh';

    const translations = {
        zh: {
            btn:'EN', authTitle:'激活您的专属能量站', authBtn:'立即验证',
            recover:'通过备份文件复原数据', guideTitle:'使用说明', guideBtn:'进入系统',
            instruction:'为了获得 <span class="highlight">APP</span> 体验：<br><br>1️⃣ 点击浏览器底部的 <span class="highlight">分享按钮</span><br>2️⃣ 向上滑动找到 <span class="highlight">"添加到主屏幕"</span><br>3️⃣ 点击右上角 <span class="highlight">"添加"</span><br><br>完成后从桌面图标进入。',
            error:'激活码错误 🦦', importSuccess:'✅ 资产还原成功，欢迎回来！', importError:'❌ 无效的备份文件。'
        },
        en: {
            btn:'中文', authTitle:'Activate Your Station', authBtn:'Verify Now',
            recover:'Restore from Backup File', guideTitle:'Instructions', guideBtn:'Enter System',
            instruction:'To get the <span class="highlight">App</span> experience:<br><br>1️⃣ Tap the <span class="highlight">Share Icon</span> at bottom<br>2️⃣ Find <span class="highlight">"Add to Home Screen"</span><br>3️⃣ Tap <span class="highlight">"Add"</span> on top right.<br><br>Then open from your home screen.',
            error:'Invalid Code. 🦦', importSuccess:'✅ Assets Restored! Welcome back.', importError:'❌ Invalid Backup File.'
        }
    };

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('lang-btn').innerText = t.btn;
        document.getElementById('t-auth-title').innerText = t.authTitle;
        document.getElementById('t-auth-btn').innerText = t.authBtn;
        document.getElementById('t-recover').innerText = t.recover;
        document.getElementById('t-guide-title').innerText = t.guideTitle;
        document.getElementById('t-guide-btn').innerText = t.guideBtn;
        document.getElementById('t-instruction').innerHTML = t.instruction;
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('lang', currentLang);
        updateUI();
    }

    function generateDeviceFingerprint() {
        const info = [navigator.userAgent, screen.width + 'x' + screen.height, navigator.language].join('|');
        let hash = 0;
        for (let i = 0; i < info.length; i++) { hash = ((hash << 5) - hash) + info.charCodeAt(i); hash |= 0; }
        return Math.abs(hash).toString(36).toUpperCase();
    }

    async function validateLicense(code) {
        if (!code || code.length !== 20) return false;
        const prefix = code.substring(0,12).toUpperCase();
        const suffix = code.substring(12).toLowerCase();
        const msgUint8 = new TextEncoder().encode(prefix + PRIVATE_SALT);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const expectedSuffix = hashArray.map(b => b.toString(16).padStart(2,'0')).join('').substring(0,8);
        return suffix === expectedSuffix;
    }

    async function handleVerify() {
        const input = document.getElementById('activation-code');
        const btn   = document.getElementById('t-auth-btn');
        if (btn.disabled) return;
        const code = input.value.trim().toUpperCase();
        const isValid = await validateLicense(code);
        if (isValid) {
            try {
                btn.disabled = true;
                const deviceID = generateDeviceFingerprint();
                const response = await fetch('https://auth.nudgenow.xyz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, deviceID })
                });
                const result = await response.json();
                if (response.ok && result.status === 'success') {
                    localStorage.setItem('isActivated', 'true');
                    localStorage.setItem('license_key', code);
                    localStorage.setItem('bound_device_id', generateDeviceFingerprint());
                    // 激活成功后进入账号设置流程
                    showAccountSetup(code);
                } else {
                    alert(translations[currentLang].error);
                    btn.disabled = false;
                }
            } catch (err) {
                alert(currentLang === 'zh' ? '请检查网络连接' : 'Network required.');
                btn.disabled = false;
            }
        } else {
            alert(translations[currentLang].error);
        }
    }

    function importStellarockData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.isActivated === 'true' || data.revenue_history) {
                    localStorage.clear();
                    for (let key in data) localStorage.setItem(key, data[key]);
                    localStorage.setItem('isActivated', 'true');
                    alert(translations[currentLang].importSuccess);
                    enterApp();
                } else throw new Error();
            } catch { alert(translations[currentLang].importError); }
        };
        reader.readAsText(file);
    }

    // ── 面板切换 ──────────────────────────────────────────
    function hideAll() {
        ['auth-ui','account-setup','cloud-restore-ui','guide-box']
            .forEach(id => document.getElementById(id).style.display = 'none');
    }
    function showAuthUi()       { hideAll(); document.getElementById('auth-ui').style.display = 'block'; }
    function showCloudRestore() { hideAll(); document.getElementById('cloud-restore-ui').style.display = 'block'; }
    function showGuide()        { hideAll(); document.getElementById('guide-box').style.display = 'block'; }
    function enterApp()         { window.location.replace('index.html'); }

    // ── 账号设置流程 ──────────────────────────────────────
    const API_BASE = 'https://api.nudgenow.xyz'; // 替换为你的 Worker 域名

    async function showAccountSetup(licenseKey) {
        hideAll();
        document.getElementById('account-setup').style.display = 'block';

        // 先向 Worker 注册，拿到 UserID（用默认空密码占位，稍后更新）
        // 这里先生成一个随机临时 userId 展示，实际在 saveAccount 时正式注册
        const tempId = String(Math.floor(10000000 + Math.random() * 90000000));
        document.getElementById('display-user-id').innerText = tempId;
        localStorage.setItem('_tmp_pending_license', licenseKey);
        localStorage.setItem('_tmp_pending_uid', tempId);
    }

    function copyUserId() {
        const uid = document.getElementById('display-user-id').innerText;
        navigator.clipboard.writeText(uid).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = '已复制 ✓';
            setTimeout(() => { btn.innerText = '复制'; }, 2000);
        });
    }

    async function saveAccount() {
        const pwd1 = document.getElementById('new-password').value;
        const pwd2 = document.getElementById('confirm-password').value;
        if (!pwd1 || pwd1.length < 4) { alert('密码至少4位'); return; }
        if (pwd1 !== pwd2)             { alert('两次密码不一致'); return; }

        const licenseKey = localStorage.getItem('_tmp_pending_license');
        const deviceId   = localStorage.getItem('bound_device_id');

        try {
            const res  = await fetch(`${API_BASE}/register`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ licenseKey, deviceId, password: pwd1 })
            });
            const data = await res.json();

            if (data.status === 'success' || data.status === 'exists') {
                localStorage.setItem('ps_user_id',  data.userId);
                localStorage.setItem('ps_password', pwd1);
                // 显示正式 UserID
                document.getElementById('display-user-id').innerText = data.userId;
                localStorage.removeItem('_tmp_pending_license');
                localStorage.removeItem('_tmp_pending_uid');
                // 短暂展示 UserID 后进入引导
                setTimeout(showGuide, 1800);
            } else {
                alert('注册失败：' + (data.error || '未知错误'));
            }
        } catch {
            alert('网络错误，请检查连接');
        }
    }

    function skipAccount() {
        localStorage.removeItem('_tmp_pending_license');
        localStorage.removeItem('_tmp_pending_uid');
        showGuide();
    }

    // ── 云端恢复流程 ──────────────────────────────────────
    async function doCloudRestore() {
        const userId   = document.getElementById('restore-user-id').value.trim();
        const password = document.getElementById('restore-password').value;
        if (!userId || !password) { alert('请填写 UserID 和密码'); return; }

        const btn = document.querySelector('#cloud-restore-ui .btn-go');
        btn.disabled = true;
        btn.innerText = '恢复中...';

        try {
            const res  = await fetch(`${API_BASE}/restore`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ userId, password })
            });
            const data = await res.json();

            if (data.status === 'success') {
                localStorage.clear();
                for (const [k, v] of Object.entries(data.snapshot)) {
                    localStorage.setItem(k, v);
                }
                localStorage.setItem('isActivated', 'true');
                localStorage.setItem('ps_user_id',  userId);
                localStorage.setItem('ps_password', password);
                alert('✅ 数据恢复成功！');
                enterApp();
            } else {
                alert('❌ ' + (data.error || '恢复失败，请检查 UserID 和密码'));
                btn.disabled = false;
                btn.innerText = '恢复数据';
            }
        } catch {
            alert('网络错误，请检查连接');
            btn.disabled = false;
            btn.innerText = '恢复数据';
        }
    }

    // ── 初始化 ────────────────────────────────────────────
    if (localStorage.getItem('isActivated') === 'true') showGuide();
    updateUI();
</script>
</body>
</html>
